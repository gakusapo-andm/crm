function generatePreInputToken(id){
var s=id+'gksp2026';
var h=0;
for(var i=0;i<s.length;i++){
h=(h<<5)-h+s.charCodeAt(i);
h=h&h;
}

}

function getIndustryCode(industry){

if(lower.includes('コンサル'))return'12';

const[tab,setTab]=useState(0);

const[filterStatus,setFilterStatus]=useState("active");
const[showRelostModal,setShowRelostModal]=useState(false);
const[relostForm,setRelostForm]=useState({catKey:"",reason:"",detail:""});
const[noteText,setNoteText]=useState("");
const[actionForm,setActionForm]=useState({date:"",time:"",content:"",reminder:false});
const[searchText,setSearchText]=useState("");

const[dateField,setDateField]=useState("recontactStartDate");
const[dateFrom,setDateFrom]=useState("");
const[dateTo,setDateTo]=useState("");
const[showDateFilter,setShowDateFilter]=useState(false);

const myList=isAdmin?recontacts:recontacts.filter((r)=>r.owner===user.name);
const owners=[...new Set(recontacts.map((r)=>r.owner))];


function getDateVal(r){
if(dateField==="recontactStartDate")return r.recontactStartDate||"";
if(dateField==="nextAction.date")return r.nextAction?.date||"";
if(dateField==="prevLostDate")return r.prevLostDate||"";
return"";
}

const filtered=myList.filter((r)=>{
const matchO=filterOwner==="all"||r.owner===filterOwner;
const matchS=filterStatus==="all"||r.status===filterStatus;
const q=searchText.toLowerCase();
const matchQ=!q||r.company.toLowerCase().includes(q)||r.contact.toLowerCase().includes(q);
const dv=getDateVal(r);
const matchFrom=!dateFrom||dv>=dateFrom;
const matchTo=!dateTo||dv<=dateTo;
return matchO&&matchS&&matchQ&&matchFrom&&matchTo;
});


function exportCSV(){
const LABEL={
recontactStartDate:"追客開始日",
"nextAction.date":"次アクション日",
prevLostDate:"前回失注日"
};
const headers=[
"会社名","担当者名","役職","担当者","現ステージ",
"ステータス","前回失注カテゴリ","前回失注理由","前回失注日",
"追客開始日","追客メモ","次アクション日","次アクション内容"];

const rows=filtered.map((r)=>{
const cat=LOST_CATEGORIES.find((c)=>c.key===r.prevLostCategory);
return[
r.company,r.contact,r.title||"",r.owner,r.stage,
r.status==="active"?"追客中":"再失注",
cat?.label||"",r.prevLostReason||"",r.prevLostDate||"",
r.recontactStartDate||"",r.recontactNote||"",
r.nextAction?.date||"",r.nextAction?.content||""].
map((v)=>'"'+String(v).replace(/"/g,'""')+'"');
});
const bom="\uFEFF";
const csv=bom+[headers.map((h)=>'"'+h+'"'),...rows].map((r)=>r.join(",")).join("\n");
const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download=`追客リスト_${new Date().toISOString().slice(0,10)}.csv`;
a.click();
URL.revokeObjectURL(url);
}

const dateFieldActive=dateFrom||dateTo;

function updateRecontact(updated){
setRecontacts((rs)=>rs.map((r)=>r.id===updated.id?updated:r));
setSelected(updated);

_asyncToGenerator(function*(){
const sb=yield getSupabase();
if(!sb)return;
const row=recontactToRow(updated);
row.updated_at=new Date().toISOString();
yield sb.from("recontacts").update(row).eq("id",updated.id);
})();
}

function changeStage(newStage){
if(!selected)return;
const today=new Date().toISOString().slice(0,10);
const updated={
...selected,stage:newStage,
stageHistory:[...selected.stageHistory,{stage:newStage,date:today,note:"ステージ更新",by:user.name}]
};
updateRecontact(updated);
}

function addNote(){
if(!noteText.trim()||!selected)return;
const updated={...selected,notes:[...selected.notes,{id:Date.now(),date:new Date().toISOString().slice(0,10),content:noteText.trim(),by:user.name}]};
updateRecontact(updated);
setNoteText("");
}

function saveAction(){
if(!selected)return;
updateRecontact({...selected,nextAction:actionForm});
}

function submitRelost(){
if(!selected||!relostForm.catKey||!relostForm.reason||relostForm.detail.trim().length<10)return;
const today=new Date().toISOString().slice(0,10);
const entry={date:today,category:relostForm.catKey,reason:relostForm.reason,detail:relostForm.detail.trim(),stage:selected.stage};
const updated={...selected,status:"relost",relostHistory:[...selected.relostHistory,entry]};
updateRecontact(updated);
onRelost&&onRelost(updated);
setShowRelostModal(false);
setRelostForm({catKey:"",reason:"",detail:""});
setSelected(null);
}

function getPeriodRange(preset){
const now=new Date();

const fmt=(d)=>{
const y=d.getFullYear();
const m=String(d.getMonth()+1).padStart(2,"0");
const day=String(d.getDate()).padStart(2,"0");
return`${y}-${m}-${day}`;
};

const monday=(d)=>{
const x=new Date(d);
x.setDate(d.getDate()-(d.getDay()+6)%7);
x.setHours(0,0,0,0);
return x;
};
switch(preset){
case"today":return{from:fmt(now),to:fmt(now)};
case"week":{
const m=monday(now);
const s=new Date(m);s.setDate(m.getDate()+6);
return{from:fmt(m),to:fmt(s)};
}
case"lastweek":{
const m=monday(now);
const prev=new Date(m);prev.setDate(m.getDate()-7);
const end=new Date(m);end.setDate(m.getDate()-1);
return{from:fmt(prev),to:fmt(end)};
}
case"month":{
const f=new Date(now.getFullYear(),now.getMonth(),1);
const l=new Date(now.getFullYear(),now.getMonth()+1,0);
return{from:fmt(f),to:fmt(l)};
}
case"lastmonth":{
const f=new Date(now.getFullYear(),now.getMonth()-1,1);
const l=new Date(now.getFullYear(),now.getMonth(),0);
return{from:fmt(f),to:fmt(l)};
}
default:return{from:"",to:""};
}
}

function parseCSV(text){
const lines=text.split(/\r?\n/).filter((l)=>l.trim());
if(lines.length<2)return[];
const headers=lines[0].split(",").map((h)=>h.trim().replace(/^"|"$/g,""));
const colMap={
company:headers.findIndex((h)=>/会社|company/i.test(h)),
contact:headers.findIndex((h)=>/担当|contact|氏名|名前/i.test(h)),
title:headers.findIndex((h)=>/役職|title/i.test(h)),
phone:headers.findIndex((h)=>/電話|phone|tel/i.test(h)),
industry:headers.findIndex((h)=>/業種|industry/i.test(h)),
prefecture:headers.findIndex((h)=>/都道府県|prefecture|地域/i.test(h)),
owner:headers.findIndex((h)=>/担当者|owner|担当営業/i.test(h)),
source:headers.findIndex((h)=>/媒体|source|リスト元|出典/i.test(h))
};
return lines.slice(1).map((line,i)=>{
const cols=line.split(",").map((c)=>c.trim().replace(/^"|"$/g,""));
const ownerVal=colMap.owner>=0?cols[colMap.owner]:"";
const srcRaw=colMap.source>=0?cols[colMap.source]:"";

const srcMatch=sourceList.find((s)=>s.key===srcRaw||s.label===srcRaw);
return{
id:Date.now()+i,
company:colMap.company>=0?cols[colMap.company]:"",
contact:colMap.contact>=0?cols[colMap.contact]:"",
title:colMap.title>=0?cols[colMap.title]:"",
phone:colMap.phone>=0?cols[colMap.phone]:"",
industry:colMap.industry>=0?cols[colMap.industry]:"",
prefecture:colMap.prefecture>=0?cols[colMap.prefecture]:"",
url:"",revenue:"",address:"",employees:"",
owner:ownerVal||user.name,
source:srcMatch?srcMatch.key:srcRaw||"",
callTags:[],callCount:0,callLogs:[],
comments:[],flagClaim:false,flagBanned:false,adminNotes:[],
createdAt:today,updatedAt:today
};
}).filter((r)=>r.company);
}

function handleCSVUpload(e){
const file=e.target.files?.[0];
if(!file)return;
const reader=new FileReader();
reader.onload=(ev)=>{
const parsed=parseCSV(ev.target.result);
let mergeCount=0,newCount=0;
const newRows=[];
const mergedUpdates=[];
setLists((prev)=>{
const next=[...prev];
parsed.forEach((newRow)=>{
const dupIdx=next.findIndex((r)=>r.company===newRow.company&&r.phone===newRow.phone);
if(dupIdx>=0){
mergeCount++;
const mergedFields={contact:newRow.contact,title:newRow.title,
industry:newRow.industry,prefecture:newRow.prefecture,
owner:newRow.owner||next[dupIdx].owner};
next[dupIdx]={...next[dupIdx],...mergedFields,updatedAt:today};
mergedUpdates.push({id:next[dupIdx].id,fields:mergedFields});
}else{
newCount++;
next.push(newRow);
newRows.push(newRow);
}
});
return next;
});

if(newRows.length>0)dbInsertTeleapoRows(newRows);
mergedUpdates.forEach((u)=>dbUpdateTeleapoItem(u.id,u.fields));
showNotif(`新規${newCount}件追加、${mergeCount}件マージ（ログ保持）`);
};
reader.readAsText(file,"UTF-8");
e.target.value="";
}

r.flagClaim?"有":"",r.flagBanned?"有":"",r.updatedAt]
);
const csv=[headers,...rows].map((r)=>r.map((c)=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});

function buildMonthDays(year,month){
const first=new Date(year,month,1);
const last=new Date(year,month+1,0);
const sdow=dowMon(first);
const days=[];
for(let i=0;i<sdow;i++)
days.push({date:new Date(year,month,-sdow+i+1),cur:false});
for(let d=1;d<=last.getDate();d++)
days.push({date:new Date(year,month,d),cur:true});
for(let d=1;d<=42-days.length;d++)
days.push({date:new Date(year,month+1,d),cur:false});
return days;
}

function KPIReportPage({user,customers=[],teleapoLists=[],isMobile=false,isTablet=false}){
const isAdmin=user.role==="admin";


const[subTab,setSubTab]=useState("rates");
const[period,setPeriod]=useState("month");
const[selMember,setSelMember]=useState("all");
const[selPhase,setSelPhase]=useState("teleapo");

const effectiveMember=isAdmin?selMember:user.name;


const pad2=(n)=>String(n).padStart(2,"0");
const toStr=(d)=>`${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const now=new Date();


const allMembers=useMemo(()=>{
const set=new Set();
customers.forEach((c)=>(c.stageHistory||[]).forEach((h)=>{if(h.by)set.add(h.by);}));
teleapoLists.forEach((t)=>{if(t.owner)set.add(t.owner);});
return Array.from(set).sort();
},[customers,teleapoLists]);


const periodRange=useMemo(()=>{
const y=now.getFullYear(),m=now.getMonth(),d=now.getDate();
let start,end,prevStart,prevEnd;
if(period==="week"){
const dow=(now.getDay()+6)%7;
const ws=new Date(y,m,d-dow);
const we=new Date(ws);we.setDate(ws.getDate()+6);
start=toStr(ws);end=toStr(we);
const pws=new Date(ws);pws.setDate(pws.getDate()-7);
const pwe=new Date(ws);pwe.setDate(pwe.getDate()-1);
prevStart=toStr(pws);prevEnd=toStr(pwe);
}else if(period==="month"){
start=`${y}-${pad2(m+1)}-01`;
end=toStr(new Date(y,m+1,0));
const pm=m===0?11:m-1,py=m===0?y-1:y;
prevStart=`${py}-${pad2(pm+1)}-01`;
prevEnd=toStr(new Date(py,pm+1,0));
}else if(period==="quarter"){
const qm=Math.floor(m/3)*3;
start=`${y}-${pad2(qm+1)}-01`;
end=toStr(new Date(y,qm+3,0));
const pqm=qm-3<0?qm+9:qm-3;
const pqy=qm-3<0?y-1:y;
prevStart=`${pqy}-${pad2(pqm+1)}-01`;
prevEnd=toStr(new Date(pqy,pqm+3,0));
}else{
start=`${y}-01-01`;end=`${y}-12-31`;
prevStart=`${y-1}-01-01`;prevEnd=`${y-1}-12-31`;
}
return{start,end,prevStart,prevEnd};
},[period]);

const inRange=(date,s,e)=>date&&date>=s&&date<=e;



const countAllStages=(startD,endD,member)=>{
const c={s1:0,s2:0,s3:0,s4:0,s5:0,s6:0,s7:0};
customers.forEach((cust)=>{
(cust.stageHistory||[]).forEach((h)=>{
if(!inRange(h.date,startD,endD))return;
if(member!=="all"&&h.by!==member)return;
if(h.stage==="①")c.s1++;
if(h.stage==="②")c.s2++;
if(h.stage==="③")c.s3++;
if(h.stage==="④")c.s4++;
if(h.stage==="⑤")c.s5++;
if(h.stage==="⑥")c.s6++;
if(h.stage==="⑦")c.s7++;
});
});
return c;
};

const curAll=useMemo(()=>countAllStages(periodRange.start,periodRange.end,effectiveMember),[customers,periodRange,effectiveMember]);
const prevAll=useMemo(()=>countAllStages(periodRange.prevStart,periodRange.prevEnd,effectiveMember),[customers,periodRange,effectiveMember]);


const pct=(num,den)=>den>0?Math.round(num/den*1000)/10:0;
const delta=(cur,prev)=>{
if(prev===0&&cur===0)return null;
if(prev===0)return cur>0?100:null;
return Math.round((cur-prev)/prev*1000)/10;
};

const ws=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dow);
for(let i=0;i<7;i++){

buckets.push({label:labels[i],start:toStr(d),end:toStr(d)});
}
}else if(period==="month"){
const y=now.getFullYear(),m=now.getMonth();
const dim=new Date(y,m+1,0).getDate();
for(let w=0;w<5;w++){

buckets.push({label:`W${w+1}`,start:`${y}-${pad2(m+1)}-${pad2(s)}`,end:`${y}-${pad2(m+1)}-${pad2(e)}`});
}
}else if(period==="quarter"){
