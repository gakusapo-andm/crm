        </div>

        {/* ── Page content ─────────────────────────────────── */}
        <div style={{ flex:1, overflow:"hidden", display:"flex", flexDirection:"column", paddingBottom: isMobile ? 64 : 0 }}>
          {activeNav===0 && <DashboardHome user={user} actions={actions} customers={customers} teleapoLists={teleapoLists} isMobile={isMobile} isTablet={isTablet}/>}
          {activeNav===1 && (
            <TeleapoPage
              user={user}
              customers={customers}
              setCustomers={setCustomers}
              sourceList={sourceList}
              setSourceList={setSourceList}
              lists={teleapoLists}
              setLists={setTeleapoLists}
              onCreateTodo={createClerkTodo}
            />
          )}
          {activeNav===2 && (
            <CustomerManagementPage
              user={user}
              customers={customers}
              setCustomers={setCustomers}
              onLostRequest={handleLostRequest}
              teleapoLists={teleapoLists}
              setTeleapoLists={setTeleapoLists}
              openNewModal={openNewCustomer}
              onNewModalOpened={()=>setOpenNewCustomer(false)}
              onCreateTodo={createClerkTodo}
              clerkTodos={clerkTodos}
            />
          )}
          {activeNav===3 && (
            <LostBoxPage
              lostList={lostApproved}
              requests={lostRequests}
              isAdmin={isAdmin}
              onApprove={handleApprove}
              onReject={handleReject}
              onUpdate={handleLostUpdate}
              onSendToRecontact={handleSendToRecontact}
              customers={customers}
            />
          )}
          {activeNav===4 && (
            <RecontactPage
              user={user}
              recontacts={recontacts}
              setRecontacts={setRecontacts}
              isAdmin={isAdmin}
              onRelost={handleRelost}
            />
          )}
          {activeNav===5 && (
            <CalendarPage
              user={user}
              customers={customers}
              recontacts={recontacts}
              lostApproved={lostApproved}
              isAdmin={isAdmin}
              onOpenCustomer={()=>setActiveNav(2)}
              onOpenRecontact={()=>setActiveNav(4)}
            />
          )}
          {activeNav===6 && (
            <KPIReportPage
              user={user}
              customers={customers}
              teleapoLists={teleapoLists}
              isMobile={isMobile}
              isTablet={isTablet}
            />
          )}
          {activeNav===9 && isAdmin && (
            <AdminSettingsPage
              notice={notice}
              setNotice={setNotice}
              noticeOpen={noticeOpen}
              setNoticeOpen={setNoticeOpen}
              sourceList={sourceList}
              setSourceList={setSourceList}
            />
          )}
          {activeNav===10 && (isClerk || isAdmin) && (
            <ClerkTodoPage
              user={user}
              todos={clerkTodos}
              setTodos={setClerkTodos}
              isMobile={isMobile}
              isTablet={isTablet}
            />
          )}
          {activeNav!==0 && activeNav!==1 && activeNav!==2 && activeNav!==3 && activeNav!==4 && activeNav!==5 && activeNav!==6 && activeNav!==9 && activeNav!==10 && (
            <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:8 }}>
              <div style={{ fontSize:14, color:"#334155", fontWeight:600 }}>{visibleNavItems.find(n=>n.id===activeNav)?.label}</div>
              <div style={{ fontSize:12, color:"#94a3b8" }}>このページは開発中です</div>
            </div>
          )}
        </div>

        {/* ── iPhone ボトムナビゲーション ─────────────────── */}
        {isMobile && (
          <div style={{ position:"fixed", bottom:0, left:0, right:0, height:64, background:"#fff", borderTop:"1px solid #e8edf5", display:"flex", alignItems:"stretch", zIndex:30, boxShadow:"0 -2px 12px #00000010", paddingBottom:"env(safe-area-inset-bottom)" }}>
            {bottomNavItems.map((item,i)=>{
              const active = item.id===activeNav;
              const badge = item.label==="失注BOX"&&pendingCount>0 ? pendingCount : item.label==="追客リスト"&&recontactCount>0 ? recontactCount : null;
              return (
                <button key={item.id} onClick={()=>setActiveNav(item.id)} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:3, background:"none", border:"none", cursor:"pointer", position:"relative", padding:0 }}>
                  {badge && <span style={{ position:"absolute", top:8, right:"50%", marginRight:-18, background:item.label==="失注BOX"?"#f59e0b":"#22c55e", color:"#000", borderRadius:"50%", width:14, height:14, fontSize:9, fontWeight:800, display:"inline-flex", alignItems:"center", justifyContent:"center" }}>{badge}</span>}
                  <item.icon size={20} color={active?"#6c5ce7":"#94a3b8"}/>
                  <span style={{ fontSize:10, color:active?"#6c5ce7":"#94a3b8", fontFamily:"'Noto Sans JP',sans-serif", fontWeight:active?600:400 }}>{item.label}</span>
                  {active && <div style={{ position:"absolute", top:0, left:"50%", transform:"translateX(-50%)", width:24, height:2, background:"#6c5ce7", borderRadius:"0 0 2px 2px" }}/>}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* ── お知らせポップアップ（C案：右下通知カード）─────── */}
      {notice.active && noticeOpen && (
        <div style={{
          position:"fixed",inset:0,zIndex:1000,
          fontFamily:"'Noto Sans JP',sans-serif",pointerEvents:"none"
        }}>
          <style>{`
            @keyframes noticePopIn{
              from{opacity:0;transform:translateX(60px) scale(0.95)}
              to{opacity:1;transform:translateX(0) scale(1)}
            }
            .notice-card{animation:noticePopIn 0.35s cubic-bezier(0.34,1.4,0.64,1)}
          `}</style>
          <div style={{
            position:"absolute",inset:0,background:"rgba(15,23,42,0.10)",pointerEvents:"all"
          }} onClick={()=>setNoticeOpen(false)}/>
          <div className="notice-card" style={{
            position:"absolute",
            bottom:isMobile?16:32, right:isMobile?16:32, left:isMobile?16:"auto",
            width:isMobile?"auto":360,
            background:"#fff",borderRadius:18,
            boxShadow:"0 20px 60px rgba(15,23,42,0.16),0 4px 16px rgba(108,92,231,0.12)",
            overflow:"hidden",pointerEvents:"all",border:"1px solid #e8edf5"
          }}>
            <div style={{height:4,background:"linear-gradient(90deg,#6c5ce7,#60a5fa)"}}/>
            <div style={{padding:"16px 18px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:9,fontWeight:700,color:"#6c5ce7",letterSpacing:"0.1em",background:"#ede9fe",borderRadius:4,padding:"2px 8px"}}>ADMIN INFO</span>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{notice.date}</span>
                </div>
                <button onClick={()=>setNoticeOpen(false)} style={{background:"transparent",border:"none",borderRadius:6,width:24,height:24,cursor:"pointer",color:"#94a3b8",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
              </div>
              {noticeEditing ? (
                <input value={noticeDraft?.title||""} onChange={e=>setNoticeDraft(p=>({...p,title:e.target.value}))}
                  style={{width:"100%",fontSize:15,fontWeight:700,color:"#0f172a",border:"1px solid #c7d2fe",borderRadius:8,padding:"6px 10px",fontFamily:"'Noto Sans JP',sans-serif",marginBottom:8,boxSizing:"border-box"}}/>
              ) : (
                <div style={{fontSize:15,fontWeight:700,color:"#0f172a",marginBottom:8,letterSpacing:"-0.01em"}}>{notice.title}</div>
              )}
              {noticeEditing ? (
                <textarea value={noticeDraft?.body||""} onChange={e=>setNoticeDraft(p=>({...p,body:e.target.value}))} rows={4}
                  style={{width:"100%",fontSize:13,color:"#475569",lineHeight:1.75,border:"1px solid #c7d2fe",borderRadius:8,padding:"8px 10px",fontFamily:"'Noto Sans JP',sans-serif",resize:"vertical",boxSizing:"border-box",marginBottom:12}}/>
              ) : (
                <div style={{fontSize:13,color:"#475569",lineHeight:1.75,whiteSpace:"pre-wrap",marginBottom:14}}>{notice.body}</div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:10,borderTop:"1px solid #f1f5f9"}}>
                <span style={{fontSize:11,color:"#94a3b8"}}>by {notice.author}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {isAdmin && !noticeEditing && (
                    <>
                      <button onClick={()=>{setNoticeDraft({...notice});setNoticeEditing(true);}} style={{background:"#f8faff",border:"1px solid #e8edf5",borderRadius:7,padding:"6px 12px",fontSize:11,color:"#6c5ce7",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:600}}>編集</button>
                      <button onClick={()=>setNotice(p=>({...p,active:false}))} style={{background:"#fff0f0",border:"1px solid #fecaca",borderRadius:7,padding:"6px 12px",fontSize:11,color:"#ef4444",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",fontWeight:600}}>取り下げ</button>
                    </>
                  )}
                  {isAdmin && noticeEditing && (
                    <>
                      <button onClick={()=>setNoticeEditing(false)} style={{background:"#f8faff",border:"1px solid #e8edf5",borderRadius:7,padding:"6px 12px",fontSize:11,color:"#64748b",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>キャンセル</button>
                      <button onClick={()=>{setNotice({...noticeDraft,active:true,date:new Date().toISOString().slice(0,10)});setNoticeEditing(false);}} style={{background:"#6c5ce7",color:"#fff",border:"none",borderRadius:7,padding:"6px 14px",fontSize:11,cursor:"pointer",fontWeight:600,fontFamily:"'Noto Sans JP',sans-serif"}}>保存・公開</button>
                    </>
                  )}
                  {!noticeEditing && (
                    <button onClick={()=>setNoticeOpen(false)} style={{background:"#6c5ce7",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>確認 ✓</button>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 管理者：取り下げ中のお知らせを再公開するボタン */}
      {isAdmin && !notice.active && (
        <button onClick={()=>{setNotice(p=>({...p,active:true}));setNoticeOpen(true);}} style={{
          position:"fixed",bottom:isMobile?72:24,right:isMobile?16:88,zIndex:999,
          background:"#6c5ce7",color:"#fff",border:"none",borderRadius:10,
          padding:"8px 16px",fontSize:12,fontWeight:600,cursor:"pointer",
          boxShadow:"0 4px 16px rgba(108,92,231,0.3)",fontFamily:"'Noto Sans JP',sans-serif",
          display:"flex",alignItems:"center",gap:6
        }}>お知らせを公開</button>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ★ CLERK TODO PAGE（事務TODOページ）
// ═══════════════════════════════════════════════════════════
//
// ■ 設計思想
//   - ステージ変更(③④⑤⑥)で自動生成されたお礼メールTODOと、
//     営業マンからの手動依頼を一元管理する事務員専用ページ。
//   - お礼メール系TODOは「テンプレ生成」ボタンでステージ別テンプレを展開。
//     事務員はコピペでGmail等から送信するワークフロー。
//   - 完了済みタスクはリスト下部にグレー表示で履歴参照可能。
//   - admin も閲覧可能（進捗俯瞰用）。
//
// ■ タスク種別
//   thanks_email:  お礼メール（自動生成、テンプレ生成機能付き）
//   document_send: 資料送付
//   contract:      契約書類準備・送付
//   invoice:       請求書発行
//   schedule:      スケジュール調整
//   other:         その他
// ═══════════════════════════════════════════════════════════
function ClerkTodoPage({ user, todos, setTodos, isMobile=false, isTablet=false }) {
  const [filter, setFilter] = useState("all"); // "all"|"thanks_email"|"document_send"|...
  const [showDone, setShowDone] = useState(false);
  const [templateModal, setTemplateModal] = useState(null); // todo object or null
  const [copied, setCopied] = useState(null); // "subject"|"body"|"email"

  // ── タスク種別ラベル・色定義 ───────────────────────────
  const TASK_META = {
    thanks_email:  { label:"お礼メール",     color:"#3b82f6", bg:"#eff6ff"  },
    document_send: { label:"資料送付",       color:"#f59e0b", bg:"#fffbeb"  },
    contract:      { label:"契約書類",       color:"#8b5cf6", bg:"#f5f3ff"  },
    invoice:       { label:"請求書",         color:"#ec4899", bg:"#fdf2f8"  },
    schedule:      { label:"スケジュール調整", color:"#14b8a6", bg:"#f0fdfa" },
    other:         { label:"その他",         color:"#64748b", bg:"#f8fafc"  },
  };

  // ── ステージ別テンプレート定義 ─────────────────────────
  // ${company}, ${contact}, ${owner} はテンプレ生成時に fillTemplate() で自動置換
  const EMAIL_TEMPLATES = {
    "③": {
      subject: "【Gakusapo】お打ち合わせ日程のご確認（${company}）",
      body: "\${contact} 様\n\nお世話になっております。\n学サポの\${owner}でございます。\n\nこの度はお忙しい中、お打ち合わせのお時間をいただき誠にありがとうございます。\n\n当日はお時間をいただき、貴社の採用課題やお困りごとについてお伺いできればと考えております。\nお打ち合わせを有意義なお時間にできるよう努めてまいりますので、何卒よろしくお願いいたします。\n\nご不明な点等ございましたら、お気軽にご連絡くださいませ。\n\n株式会社学サポ\n\${owner}",
    },
    "④": {
      subject: "【Gakusapo】本日のお打ち合わせのお礼（${company}）",
      body: "\${contact} 様\n\nお世話になっております。\n学サポの\${owner}でございます。\n\n本日はお忙しい中、貴重なお時間をいただき誠にありがとうございました。\n\n\${contact}様からお伺いした採用に関する課題やご要望について、\n社内で検討のうえ、最適なご提案ができるよう準備を進めてまいります。\n\nつきましては、経営層の方にもお話をお伺いできる機会をいただけますと幸いです。\n改めて日程のご相談をさせていただければと存じます。\n\n引き続きよろしくお願いいたします。\n\n株式会社学サポ\n\${owner}",
    },
    "⑤": {
      subject: "【Gakusapo】本日のお打ち合わせのお礼（${company}）",
      body: "\${contact} 様\n\nお世話になっております。\n学サポの\${owner}でございます。\n\n本日はお忙しい中、経営層の皆様にもご参加いただき誠にありがとうございました。\n\n貴社の経営方針や採用に対するお考えを直接お伺いすることができ、\n大変勉強になりました。\n\n本日いただいたお話を踏まえ、具体的なご提案書を作成いたしますので、\n改めてプレゼンテーションの機会をいただけますと幸いです。\n\nご不明な点等ございましたら、お気軽にご連絡くださいませ。\n\n株式会社学サポ\n\${owner}",
    },
    "⑥": {
      subject: "【Gakusapo】プレゼンテーションのお礼（${company}）",
      body: "\${contact} 様\n\nお世話になっております。\n学サポの\${owner}でございます。\n\n本日はプレゼンテーションのお時間をいただき、誠にありがとうございました。\n\nご提案内容につきまして、ご不明な点やご質問等ございましたら\nどうぞお気軽にお申し付けくださいませ。\n\n貴社の採用成功に向けて全力でサポートさせていただきたく存じますので、\n前向きにご検討いただけますと幸いです。\n\n引き続きよろしくお願いいたします。\n\n株式会社学サポ\n\${owner}",
    },
  };

  // ── テンプレ変数置換 ──────────────────────────────────
  function fillTemplate(text, todo) {
    return text
      .replace(/\$\{company\}/g, todo.company || "")
      .replace(/\$\{contact\}/g, todo.contact || "")
      .replace(/\$\{owner\}/g, todo.owner || "");
  }

  // ── TODO完了 ──────────────────────────────────────────
  function markDone(id) {
    setTodos(ts => ts.map(t => t.id === id
      ? { ...t, status:"done", completedAt: new Date().toISOString().slice(0,16) }
      : t
    ));
  }
  function markUndone(id) {
    setTodos(ts => ts.map(t => t.id === id
      ? { ...t, status:"pending", completedAt: null }
      : t
    ));
  }

  // ── コピー ────────────────────────────────────────────
  function copyText(text, label) {
    navigator.clipboard?.writeText(text);
    setCopied(label);
    setTimeout(() => setCopied(null), 2000);
  }

  // ── フィルタリング ────────────────────────────────────
  const pending  = todos.filter(t => t.status === "pending" && (filter === "all" || t.type === filter));
  const done     = todos.filter(t => t.status === "done"    && (filter === "all" || t.type === filter));

  const cardS = { background:"#fff", border:"1px solid #e8edf5", borderRadius:14, padding: isMobile?"14px":"18px 20px", boxShadow:"0 1px 4px #00000008" };

  // ──────────────────────────────────────────────────────────
  // RENDER
  // ──────────────────────────────────────────────────────────
  return (
    <div style={{ flex:1, overflow:"auto", padding: isMobile?"16px 12px":"28px 32px", background:"#f0f4ff", fontFamily:"'Noto Sans JP',sans-serif" }}>

      {/* ── ヘッダー ──────────────────────────────────────── */}
      <div style={{ marginBottom: isMobile?16:24 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
          <span style={{ color:"#64748b", fontSize:11, letterSpacing:"0.06em" }}>
            {new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",weekday:"long"})}
          </span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
          <h1 style={{ fontSize: isMobile?18:22, fontWeight:700, color:"#0f172a", letterSpacing:"-0.02em", margin:0 }}>
            事務TODO
          </h1>
          {pending.length > 0 && (
            <span style={{
              background:"#3b82f6", color:"#fff", borderRadius:20, padding:"3px 12px",
              fontSize:12, fontWeight:700, fontFamily:"'DM Mono',monospace",
            }}>
              {pending.length} 件未対応
            </span>
          )}
          {pending.length === 0 && todos.length > 0 && (
            <span style={{
              background:"#22c55e22", color:"#22c55e", borderRadius:20, padding:"3px 12px",
              fontSize:12, fontWeight:600,
            }}>
              全て対応済み
            </span>
          )}
        </div>
      </div>

      {/* ── フィルター ────────────────────────────────────── */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom: isMobile?14:20 }}>
        {[{ key:"all", label:"すべて" }, ...Object.entries(TASK_META).map(([k,v])=>({ key:k, label:v.label }))].map(f => (
          <button key={f.key} onClick={()=>setFilter(f.key)}
            style={{
              padding:"5px 12px", borderRadius:8, fontSize:11, fontWeight: filter===f.key?700:400,
              border: filter===f.key ? "1px solid #3b82f6" : "1px solid #e8edf5",
              background: filter===f.key ? "#eff6ff" : "#fff",
              color: filter===f.key ? "#1d4ed8" : "#475569",
              cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif",
            }}>
            {f.label}
            {f.key !== "all" && (() => {
              const c = todos.filter(t=>t.status==="pending"&&t.type===f.key).length;
              return c > 0 ? ` (${c})` : "";
            })()}
          </button>
        ))}
      </div>

      {/* ── 未対応TODO一覧 ────────────────────────────────── */}
      {pending.length === 0 && (
        <div style={{ ...cardS, textAlign:"center", padding:40, color:"#94a3b8", fontSize:13, marginBottom:16 }}>
          {filter === "all" ? "未対応のTODOはありません" : "該当するTODOはありません"}
        </div>
      )}
      <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:20 }}>
        {pending.map(todo => {
          const meta = TASK_META[todo.type] || TASK_META.other;
          const hasTemplate = todo.type === "thanks_email" && todo.triggerStage && EMAIL_TEMPLATES[todo.triggerStage];
          return (
            <div key={todo.id} style={{ ...cardS, borderLeft:`4px solid ${meta.color}` }}>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8 }}>
                <div style={{ flex:1, minWidth:0 }}>
                  {/* タスク種別バッジ + トリガーステージ */}
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6, flexWrap:"wrap" }}>
                    <span style={{
                      background:meta.bg, color:meta.color, fontSize:10, fontWeight:700,
                      padding:"2px 8px", borderRadius:4, border:`1px solid ${meta.color}33`,
                    }}>
                      {meta.label}
                    </span>
                    {todo.triggerStage && (
                      <span style={{ fontSize:10, color:"#64748b", fontWeight:600 }}>
                        {todo.triggerStage} {stageMap[todo.triggerStage]?.label || ""}
                      </span>
                    )}
                    <span style={{ fontSize:10, color:"#94a3b8" }}>{todo.createdAt?.replace("T"," ")}</span>
                  </div>
                  {/* 会社名・担当者 */}
                  <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", marginBottom:2 }}>{todo.company}</div>
                  <div style={{ fontSize:11, color:"#475569", marginBottom:2 }}>
                    {todo.contact && `${todo.contact} 様`}{todo.email && ` — ${todo.email}`}
                  </div>
                  <div style={{ fontSize:10, color:"#94a3b8" }}>依頼元: {todo.owner}</div>
                  {/* メモ */}
                  {todo.memo && (
                    <div style={{
                      marginTop:6, padding:"6px 10px", background:"#f8fafc", borderRadius:6,
                      fontSize:11, color:"#475569", borderLeft:"2px solid #e8edf5",
                    }}>
                      {todo.memo}
                    </div>
                  )}
                </div>
                {/* アクションボタン */}
                <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
                  {hasTemplate && (
                    <button onClick={()=>setTemplateModal(todo)}
                      style={{
                        padding:"7px 14px", borderRadius:8, border:"none",
                        background:"#3b82f6", color:"#fff", fontSize:11, fontWeight:700,
                        cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif",
                        display:"flex", alignItems:"center", gap:4, whiteSpace:"nowrap",

                      <button onClick={()=>markUndone(todo.id)}
                        style={{
                          padding:"4px 10px", borderRadius:6, border:"1px solid #e8edf5",
                          background:"#fff", color:"#94a3b8", fontSize:10, fontWeight:600,
                          cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif",

      {/* ── テンプレート生成モーダル ──────────────────────── */}
      {templateModal && (() => {
        const tmpl = EMAIL_TEMPLATES[templateModal.triggerStage];
        if (!tmpl) return null;
        const subject = fillTemplate(tmpl.subject, templateModal);
        const body = fillTemplate(tmpl.body, templateModal);
        return (
          <div style={{
            position:"fixed", inset:0, background:"#00000044", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100,
          }} onClick={()=>{ setTemplateModal(null); setCopied(null); }}>
            <div onClick={e=>e.stopPropagation()} style={{
              background:"#fff", borderRadius:16, width: isMobile?360:520, maxHeight:"85vh", overflow:"auto",
              padding: isMobile?"20px":"28px", boxShadow:"0 8px 48px #00000020",
              fontFamily:"'Noto Sans JP',sans-serif",
            }}>
              {/* ヘッダー */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:16, fontWeight:700, color:"#0f172a" }}>テンプレート生成</div>
                  <div style={{ fontSize:11, color:"#64748b", marginTop:2 }}>
                    {templateModal.triggerStage} {stageMap[templateModal.triggerStage]?.label} — {templateModal.company}
                  </div>
                </div>
                <button onClick={()=>{ setTemplateModal(null); setCopied(null); }} style={{ background:"none", border:"none", cursor:"pointer", color:"#94a3b8" }}>
                  <X size={18}/>
                </button>
              </div>

              {/* 宛先メールアドレス */}
              <div style={{ marginBottom:16 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                  <label style={{ fontSize:11, color:"#64748b", fontWeight:600 }}>宛先</label>
                  <button onClick={()=>copyText(templateModal.email||"", "email")}
                    style={{ background:"none", border:"none", cursor:"pointer", color:"#3b82f6", fontSize:10, fontWeight:600,
                      fontFamily:"'Noto Sans JP',sans-serif", display:"flex", alignItems:"center", gap:3 }}>
                    <Copy size={10}/> {copied==="email"?"コピーしました":"コピー"}
                  </button>
                </div>
                <div style={{
                  background:"#f8fafc", border:"1px solid #e8edf5", borderRadius:8, padding:"8px 12px",
                  fontSize:13, color: templateModal.email ? "#0f172a" : "#ef4444",
                  fontFamily:"'DM Mono',monospace",

              {/* 件名 */}
              <div style={{ marginBottom:16 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                  <label style={{ fontSize:11, color:"#64748b", fontWeight:600 }}>件名</label>
                  <button onClick={()=>copyText(subject, "subject")}
                    style={{ background:"none", border:"none", cursor:"pointer", color:"#3b82f6", fontSize:10, fontWeight:600,
                      fontFamily:"'Noto Sans JP',sans-serif", display:"flex", alignItems:"center", gap:3 }}>
                    <Copy size={10}/> {copied==="subject"?"コピーしました":"コピー"}
                  </button>
                </div>
                <div style={{
                  background:"#f8fafc", border:"1px solid #e8edf5", borderRadius:8, padding:"8px 12px",
                  fontSize:12, color:"#0f172a",
                }}>
                  {subject}
                </div>

              {/* 本文 */}
              <div style={{ marginBottom:20 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                  <label style={{ fontSize:11, color:"#64748b", fontWeight:600 }}>本文</label>
                  <button onClick={()=>copyText(body, "body")}
                    style={{ background:"none", border:"none", cursor:"pointer", color:"#3b82f6", fontSize:10, fontWeight:600,
                      fontFamily:"'Noto Sans JP',sans-serif", display:"flex", alignItems:"center", gap:3 }}>
                    <Copy size={10}/> {copied==="body"?"コピーしました":"コピー"}
                  </button>

                <div style={{
                  background:"#f8fafc", border:"1px solid #e8edf5", borderRadius:8, padding:"12px 14px",
                  fontSize:12, color:"#0f172a", lineHeight:1.7, whiteSpace:"pre-wrap",
                  maxHeight:300, overflowY:"auto",
                }}>
                  {body}
                </div>
              </div>

              {/* 一括コピー + 完了 */}
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>{ copyText(`件名: ${subject}\n\n${body}`, "body"); }}
                  style={{
                    flex:1, padding:"12px", borderRadius:10, border:"1px solid #3b82f644",
                    background:"#eff6ff", color:"#1d4ed8", fontSize:12, fontWeight:700,
                    cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif",
                    display:"flex", alignItems:"center", justifyContent:"center", gap:6,

                <button onClick={()=>{ markDone(templateModal.id); setTemplateModal(null); setCopied(null); }}
                  style={{
                    flex:1, padding:"12px", borderRadius:10, border:"none",
                    background:"#22c55e", color:"#fff", fontSize:12, fontWeight:700,
                    cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif",
                    display:"flex", alignItems:"center", justifyContent:"center", gap:6,
                  }}>
                  <Check size={14}/> 送信済み・完了

        );
      })()}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ★ KPI REPORT PAGE
// ═══════════════════════════════════════════════════════════
//
// ■ 設計思想
// ──────────────────────────────────────────────────────────
//  1. Single Source of Truth
//     全KPI指標は customers の stageHistory を唯一のデータソースとして
//     動的算出する。静的サマリーテーブルは持たない。
//
//  2. パイプラインフェーズ選択型UI
//     上段に4つのフェーズカード（テレアポ/OI・FF/PC/N成約）を配置。
//     選択するとそのフェーズの詳細KPIカードが展開される。
//     チャート・テーブルも選択フェーズに連動して切り替わる。
//
//  3. 権限モデル
//     - 管理者(admin): 全メンバー/個別メンバーの切替が可能
//     - メンバー(member): 自身のデータのみ（フィルターUI非表示）
//
//  4. 期間モデル: 週間/月間/四半期/年間 の4段階
//     各期間は「前期」との比較(delta)を自動計算し、改善/悪化をカラー表示。
//
//  5. 営業パイプライン定義
//     ① 総架電数   ──┐
//     ② 担当者接触 ──┤ テレアポフェーズ
//     ③ アポ取得   ──┘
//     ④ OI/FF（担当者） ──┐ OI/FFフェーズ
//     ⑤ OI/FF（上層部） ──┘
//       ※ OI = Opening Interview, FF = Fact Finding
//       ※ OI/FFは1セットのプロセス。
//         担当者と面談しヒアリング→上層部へ打診し面談という流れ。
//     ⑥ PC（プレゼン・クロージング）
//     ⑦ N（成約）
//
//  6. KPI指標一覧
//     [件数系]
//       架電数(①), 接触数(②), アポ数(③),
//       OI/FF担当者数(④), OI/FF上層部数(⑤), PC数(⑥), 成約数(⑦)
//     [率系]
//       接触率(②/①), 接触アポ率(③/②), アポ率(③/①),
//       打診率(⑤/④): 担当者問診→上層部打診への移行率,
//       上層部アポ率(⑤/③): アポ取得→上層部問診への到達率,
//       PC移行率(⑥/④): OI/FF担当者→PCへの移行率,
//       成約率(⑦/⑥): PC→成約への移行率,
//       アポ成約率(⑦/③): アポ取得→成約への移行率,
//       全体成約率(⑦/①): 架電→成約の一気通貫転換率
//
// ──────────────────────────────────────────────────────────
function KPIReportPage({ user, customers=[], teleapoLists=[], isMobile=false, isTablet=false }) {
  const isAdmin = user.role === "admin";

  // ── State ────────────────────────────────────────────────
  const [subTab, setSubTab]       = useState("rates");   // "rates" | "scores"
  const [period, setPeriod]       = useState("month");    // "week"|"month"|"quarter"|"year"
  const [selMember, setSelMember] = useState("all");      // "all" | member name (admin only)
  const [selPhase, setSelPhase]   = useState("teleapo");  // "teleapo"|"oiff"|"pc"|"contract"

  const effectiveMember = isAdmin ? selMember : user.name;

  // ── 日付ユーティリティ ─────────────────────────────────
  const pad2 = n => String(n).padStart(2, "0");
  const toStr = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const now = new Date();

  // ── メンバー一覧 ──────────────────────────────────────
  const allMembers = useMemo(() => {
    const set = new Set();
    customers.forEach(c => (c.stageHistory||[]).forEach(h => { if(h.by) set.add(h.by); }));
    teleapoLists.forEach(t => { if(t.owner) set.add(t.owner); });
    return Array.from(set).sort();
  }, [customers, teleapoLists]);

  // ── 期間の算出 ─────────────────────────────────────────
  const periodRange = useMemo(() => {
    const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
    let start, end, prevStart, prevEnd;
    if (period === "week") {
      const dow = (now.getDay() + 6) % 7;
      const ws = new Date(y, m, d - dow);
      const we = new Date(ws); we.setDate(ws.getDate() + 6);
      start = toStr(ws); end = toStr(we);
      const pws = new Date(ws); pws.setDate(pws.getDate() - 7);
      const pwe = new Date(ws); pwe.setDate(pwe.getDate() - 1);
      prevStart = toStr(pws); prevEnd = toStr(pwe);
    } else if (period === "month") {
      start = `${y}-${pad2(m+1)}-01`;
      end = toStr(new Date(y, m+1, 0));
      const pm = m === 0 ? 11 : m - 1, py = m === 0 ? y - 1 : y;
      prevStart = `${py}-${pad2(pm+1)}-01`;
      prevEnd = toStr(new Date(py, pm+1, 0));
    } else if (period === "quarter") {
      const qm = Math.floor(m / 3) * 3;
      start = `${y}-${pad2(qm+1)}-01`;
      end = toStr(new Date(y, qm+3, 0));
      const pqm = qm - 3 < 0 ? qm + 9 : qm - 3;
      const pqy = qm - 3 < 0 ? y - 1 : y;
      prevStart = `${pqy}-${pad2(pqm+1)}-01`;
      prevEnd = toStr(new Date(pqy, pqm+3, 0));
    } else {
      start = `${y}-01-01`; end = `${y}-12-31`;
      prevStart = `${y-1}-01-01`; prevEnd = `${y-1}-12-31`;
    }
    return { start, end, prevStart, prevEnd };
  }, [period]);

  const inRange = (date, s, e) => date && date >= s && date <= e;

  // ── 全ステージ集計 ─────────────────────────────────────
  // ①〜⑦の全ステージをカウント
  const countAllStages = (startD, endD, member) => {
    const c = { s1:0, s2:0, s3:0, s4:0, s5:0, s6:0, s7:0 };
    customers.forEach(cust => {
      (cust.stageHistory || []).forEach(h => {
        if (!inRange(h.date, startD, endD)) return;
        if (member !== "all" && h.by !== member) return;
        if (h.stage === "①") c.s1++;
        if (h.stage === "②") c.s2++;
        if (h.stage === "③") c.s3++;
        if (h.stage === "④") c.s4++;
        if (h.stage === "⑤") c.s5++;
        if (h.stage === "⑥") c.s6++;
        if (h.stage === "⑦") c.s7++;
      });
    });
    return c;
  };

  const curAll  = useMemo(() => countAllStages(periodRange.start, periodRange.end, effectiveMember), [customers, periodRange, effectiveMember]);
  const prevAll = useMemo(() => countAllStages(periodRange.prevStart, periodRange.prevEnd, effectiveMember), [customers, periodRange, effectiveMember]);

  // ── 率計算ヘルパー ─────────────────────────────────────
  const pct = (num, den) => den > 0 ? Math.round(num / den * 1000) / 10 : 0;
  const delta = (cur, prev) => {
    if (prev === 0 && cur === 0) return null;
    if (prev === 0) return cur > 0 ? 100 : null;
    return Math.round((cur - prev) / prev * 1000) / 10;
  };

  // ── フェーズ定義 ───────────────────────────────────────
  // 各フェーズのメイン指標・サブ指標・率指標をまとめて定義
  const PHASES = {
    teleapo: {
      label: "テレアポ",  accent: "#3b82f6", bg: "#eff6ff",
      // メインサマリー（フェーズカードに表示）
      mainValue: s => s.s3, mainLabel: "アポ", mainRate: s => pct(s.s3, s.s1), mainRateLabel: "アポ率",
      // 展開時のサブカード
      details: s => [
        { label:"架電数",     value:s.s1,                    unit:"件", color:"#93c5fd" },
        { label:"接触数",     value:s.s2,                    unit:"件", color:"#60a5fa" },
        { label:"アポ数",     value:s.s3,                    unit:"件", color:"#1d4ed8" },
        { label:"接触率",     value:pct(s.s2, s.s1),         unit:"%",  color:"#6c5ce7", sub:`${s.s2}/${s.s1}` },
        { label:"接触アポ率", value:pct(s.s3, s.s2),         unit:"%",  color:"#f59e0b", sub:`${s.s3}/${s.s2}` },
        { label:"アポ率",     value:pct(s.s3, s.s1),         unit:"%",  color:"#a78bfa", sub:`${s.s3}/${s.s1}` },
      ],
      // チャート用のデータキー
      chartKeys: [
        { key:"架電", stageKey:"s1", color:"#bfdbfe" },
        { key:"接触", stageKey:"s2", color:"#60a5fa" },
        { key:"アポ", stageKey:"s3", color:"#1d4ed8" },
      ],
      chartLines: [
        { key:"接触率", calc: s => pct(s.s2, s.s1), color:"#6c5ce7", dash:false },
        { key:"アポ率", calc: s => pct(s.s3, s.s1), color:"#f59e0b", dash:true },
      ],
      // メンバー比較テーブルのカラム
      tableColumns: s => [
        { label:"架電",     value:s.s1, unit:"件" },
        { label:"接触",     value:s.s2, unit:"件" },
        { label:"アポ",     value:s.s3, unit:"件" },
        { label:"接触率",   value:pct(s.s2, s.s1), unit:"%", color:"#6c5ce7" },
        { label:"接触アポ率", value:pct(s.s3, s.s2), unit:"%", color:"#f59e0b" },
        { label:"アポ率",   value:pct(s.s3, s.s1), unit:"%", color:"#a78bfa" },
      ],
    },
    oiff: {
      label: "OI / FF",  accent: "#f59e0b", bg: "#fffbeb",
      mainValue: s => s.s4 + s.s5, mainLabel: "OI/FF", mainRate: s => pct(s.s5, s.s4), mainRateLabel: "打診率",
      details: s => [
        { label:"OI/FF（担当者）",  value:s.s4,                    unit:"件", color:"#fbbf24" },
        { label:"OI/FF（上層部）",  value:s.s5,                    unit:"件", color:"#d97706" },
        { label:"打診率",           value:pct(s.s5, s.s4),         unit:"%",  color:"#f59e0b", sub:`${s.s5}/${s.s4}` },
        { label:"上層部アポ率",     value:pct(s.s5, s.s3),         unit:"%",  color:"#ea580c", sub:`${s.s5}/${s.s3}` },
        { label:"PC移行率",         value:pct(s.s6, s.s4),         unit:"%",  color:"#ef4444", sub:`${s.s6}/${s.s4}` },
      ],
      chartKeys: [
        { key:"OI/FF（担当者）", stageKey:"s4", color:"#fde68a" },
        { key:"OI/FF（上層部）", stageKey:"s5", color:"#d97706" },
      ],
      chartLines: [
        { key:"打診率",     calc: s => pct(s.s5, s.s4), color:"#f59e0b", dash:false },
        { key:"PC移行率",   calc: s => pct(s.s6, s.s4), color:"#ef4444", dash:true },
      ],
      tableColumns: s => [
        { label:"担当者",     value:s.s4, unit:"件" },
        { label:"上層部",     value:s.s5, unit:"件" },
        { label:"打診率",     value:pct(s.s5, s.s4), unit:"%", color:"#f59e0b" },
        { label:"上層部アポ率", value:pct(s.s5, s.s3), unit:"%", color:"#ea580c" },
        { label:"PC移行率",   value:pct(s.s6, s.s4), unit:"%", color:"#ef4444" },
      ],
    },
    pc: {
      label: "PC",  accent: "#ef4444", bg: "#fef2f2",
      mainValue: s => s.s6, mainLabel: "PC", mainRate: s => pct(s.s6, s.s4), mainRateLabel: "PC移行率",
      details: s => [
        { label:"PC実施数",   value:s.s6,                    unit:"件", color:"#ef4444" },
        { label:"PC移行率",   value:pct(s.s6, s.s4),         unit:"%",  color:"#ef4444", sub:`${s.s6}/${s.s4}` },
        { label:"成約率",     value:pct(s.s7, s.s6),         unit:"%",  color:"#22c55e", sub:`${s.s7}/${s.s6}` },
      ],
      chartKeys: [
        { key:"PC", stageKey:"s6", color:"#ef4444" },
      ],
      chartLines: [
        { key:"PC移行率", calc: s => pct(s.s6, s.s4), color:"#ef4444", dash:false },
        { key:"成約率",   calc: s => pct(s.s7, s.s6), color:"#22c55e", dash:true },
      ],
      tableColumns: s => [
        { label:"PC数",     value:s.s6, unit:"件" },
        { label:"PC移行率", value:pct(s.s6, s.s4), unit:"%", color:"#ef4444" },
        { label:"成約率",   value:pct(s.s7, s.s6), unit:"%", color:"#22c55e" },
      ],
    },
    contract: {
      label: "N（成約）",  accent: "#22c55e", bg: "#f0fdf4",
      mainValue: s => s.s7, mainLabel: "成約", mainRate: s => pct(s.s7, s.s6), mainRateLabel: "成約率",
      details: s => [
        { label:"成約数",     value:s.s7,                    unit:"件", color:"#22c55e" },
        { label:"成約率",     value:pct(s.s7, s.s6),         unit:"%",  color:"#22c55e", sub:`${s.s7}/${s.s6}` },
        { label:"アポ成約率", value:pct(s.s7, s.s3),         unit:"%",  color:"#0ea5e9", sub:`${s.s7}/${s.s3}` },
        { label:"全体成約率", value:pct(s.s7, s.s1),         unit:"%",  color:"#15803d", sub:`${s.s7}/${s.s1}` },
      ],
      chartKeys: [
        { key:"成約", stageKey:"s7", color:"#22c55e" },
      ],
      chartLines: [
        { key:"成約率",     calc: s => pct(s.s7, s.s6), color:"#22c55e", dash:false },
        { key:"アポ成約率", calc: s => pct(s.s7, s.s3), color:"#0ea5e9", dash:false },
        { key:"全体成約率", calc: s => pct(s.s7, s.s1), color:"#15803d", dash:true },
      ],
      tableColumns: s => [
        { label:"成約数",     value:s.s7, unit:"件" },
        { label:"成約率",     value:pct(s.s7, s.s6), unit:"%", color:"#22c55e" },
        { label:"アポ成約率", value:pct(s.s7, s.s3), unit:"%", color:"#0ea5e9" },
        { label:"全体成約率", value:pct(s.s7, s.s1), unit:"%", color:"#15803d" },
      ],
    },
  };

  const phase = PHASES[selPhase];

  // ── サブ区間チャートデータ ─────────────────────────────
  const chartData = useMemo(() => {
    const { start, end } = periodRange;
    const buckets = [];
    if (period === "week") {
      const labels = ["月","火","水","木","金","土","日"];
      const dow = (now.getDay() + 6) % 7;
      const ws = new Date(now.getFullYear(), now.getMonth(), now.getDate() - dow);
      for (let i = 0; i < 7; i++) {
        const d = new Date(ws); d.setDate(ws.getDate() + i);
        buckets.push({ label: labels[i], start: toStr(d), end: toStr(d) });
      }
    } else if (period === "month") {
      const y = now.getFullYear(), m = now.getMonth();
      const dim = new Date(y, m+1, 0).getDate();
      for (let w = 0; w < 5; w++) {
        const s = w * 7 + 1, e = Math.min(s + 6, dim);
        if (s > dim) break;
        buckets.push({ label:`W${w+1}`, start:`${y}-${pad2(m+1)}-${pad2(s)}`, end:`${y}-${pad2(m+1)}-${pad2(e)}` });
      }
    } else if (period === "quarter") {
      const qm = Math.floor(now.getMonth() / 3) * 3;
      for (let i = 0; i < 3; i++) {
        const mi = qm + i;
        buckets.push({ label:`${mi+1}月`, start:`${now.getFullYear()}-${pad2(mi+1)}-01`, end:toStr(new Date(now.getFullYear(), mi+1, 0)) });
      }
    } else {
      for (let i = 0; i < 12; i++) {
        buckets.push({ label:`${i+1}月`, start:`${now.getFullYear()}-${pad2(i+1)}-01`, end:toStr(new Date(now.getFullYear(), i+1, 0)) });
      }
    }
    return buckets.map(b => {
      const s = countAllStages(b.start, b.end, effectiveMember);
      const entry = { name: b.label };
      phase.chartKeys.forEach(k => { entry[k.key] = s[k.stageKey]; });
      phase.chartLines.forEach(l => { entry[l.key] = l.calc(s); });
      return entry;
    });
  }, [customers, periodRange, period, effectiveMember, selPhase]);

  // ── メンバー別集計 ─────────────────────────────────────
  const memberStats = useMemo(() => {
    const members = effectiveMember === "all" ? allMembers : [effectiveMember];
    return members.map(name => {
      const s = countAllStages(periodRange.start, periodRange.end, name);
      const p = countAllStages(periodRange.prevStart, periodRange.prevEnd, name);
      return { name, cur: s, prev: p };
    }).sort((a, b) => phase.mainRate(b.cur) - phase.mainRate(a.cur));
  }, [customers, periodRange, effectiveMember, allMembers, selPhase]);

  // ── raScore（営業マン別スコア分析）─────────────────────
  const SCORE_AXES = [
    { key:"teleapo",  label:"テレアポ",   max:15 },
    { key:"oi",       label:"OI（担当者）", max:15 },
    { key:"ff",       label:"FF（上層部）", max:15 },
    { key:"pc",       label:"PC",          max:15 },
    { key:"closing",  label:"クロージング", max:10 },
    { key:"follow",   label:"フォロー",    max:10 },
    { key:"attitude", label:"姿勢・態度",  max:10 },
    { key:"process",  label:"プロセス管理", max:10 },
  ];

  const scoreData = useMemo(() => {
    const members = effectiveMember === "all" ? allMembers : [effectiveMember];
    return members.map(name => {
      const owned = customers.filter(c => c.owner === name);
      const scored = owned.filter(c => c.raScore && Object.keys(c.raScore).length > 0);
      if (scored.length === 0) return { name, axes: SCORE_AXES.map(a => ({ ...a, value:0, pct:0 })), total:0, count:0 };
      const axes = SCORE_AXES.map(a => {
        const sum = scored.reduce((s, c) => s + (c.raScore[a.key] || 0), 0);
        const avg = Math.round(sum / scored.length * 10) / 10;
        return { ...a, value: avg, pct: Math.round(avg / a.max * 100) };
      });
      const total = Math.round(axes.reduce((s, a) => s + a.pct, 0) / axes.length);
      return { name, axes, total, count: scored.length };
    }).sort((a, b) => b.total - a.total);
  }, [customers, effectiveMember, allMembers]);

  const radarData = useMemo(() => {
    if (scoreData.length === 0) return [];
    return SCORE_AXES.map((axis, i) => {
      const entry = { subject: axis.label };
      scoreData.forEach(m => { entry[m.name] = m.axes[i].pct; });
      return entry;
    });
  }, [scoreData]);

  const MEMBER_COLORS = ["#3b82f6","#f59e0b","#22c55e","#ef4444","#a78bfa","#ec4899","#14b8a6","#f97316"];
  const periodLabels = { week:"週間", month:"月間", quarter:"四半期", year:"年間" };
  const prevLabel    = { week:"先週比", month:"先月比", quarter:"前期比", year:"前年比" };

  const cardS = { background:"#fff", border:"1px solid #e8edf5", borderRadius:14, padding: isMobile?"16px":"22px 24px", boxShadow:"0 1px 4px #00000008" };

  const DeltaBadge = ({ val }) => {
    if (val === null || val === undefined) return null;
    const up = val > 0;
    return (
      <span style={{ fontSize:11, fontWeight:600, color: up?"#22c55e":"#ef4444", display:"inline-flex", alignItems:"center", gap:2 }}>
        {up ? <ArrowUp size={10}/> : <ArrowDown size={10}/>}
        {up?"+":""}{val}%
      </span>
    );
  };

  // ──────────────────────────────────────────────────────────
  // RENDER
  // ──────────────────────────────────────────────────────────
  return (
    <div style={{ flex:1, overflow:"auto", padding: isMobile?"16px 12px":"28px 32px", background:"#f0f4ff", fontFamily:"'Noto Sans JP',sans-serif" }}>

      {/* ── ページヘッダー ─────────────────────────────── */}
      <div style={{ marginBottom: isMobile?16:24 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
          <span style={{ color:"#64748b", fontSize:11, letterSpacing:"0.06em" }}>
            {new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",weekday:"long"})}
          </span>
          {!isAdmin && (
            <span style={{ background:"#6c5ce722", color:"#6c5ce7", fontSize:10, padding:"2px 10px", borderRadius:20, fontWeight:600 }}>
              {user.name}さんのビュー
            </span>
          )}
        </div>
        <h1 style={{ fontSize: isMobile?18:22, fontWeight:700, color:"#0f172a", letterSpacing:"-0.02em", margin:0 }}>
          KPIレポート
        </h1>
      </div>

      {/* ── サブタブ + 期間 + メンバーフィルター ────────── */}
      <div style={{ display:"flex", flexWrap:"wrap", alignItems:"center", gap: isMobile?8:12, marginBottom: isMobile?14:20 }}>
        <div style={{ display:"flex", background:"#e8edf5", borderRadius:10, padding:3, gap:2 }}>
          {[{key:"rates",label:"接触率・アポ取得率"},{key:"scores",label:"営業マン別スコア分析"}].map(t=>(
            <button key={t.key} onClick={()=>setSubTab(t.key)}
              style={{ padding: isMobile?"5px 10px":"6px 16px", borderRadius:8, border:"none", cursor:"pointer",
                fontSize: isMobile?11:12, fontWeight:subTab===t.key?700:400, fontFamily:"'Noto Sans JP',sans-serif",
                background:subTab===t.key?"#fff":"transparent", color:subTab===t.key?"#6c5ce7":"#94a3b8",
                boxShadow:subTab===t.key?"0 1px 4px #00000014":"none", transition:"all 0.12s", whiteSpace:"nowrap" }}>
              {t.label}
            </button>
          ))}
        </div>

        {subTab === "rates" && (
          <div style={{ display:"flex", background:"#e8edf5", borderRadius:10, padding:3, gap:2 }}>
            {["week","month","quarter","year"].map(p=>(
              <button key={p} onClick={()=>setPeriod(p)}
                style={{ padding: isMobile?"5px 8px":"6px 14px", borderRadius:8, border:"none", cursor:"pointer",
                  fontSize: isMobile?10:12, fontWeight:period===p?700:400, fontFamily:"'Noto Sans JP',sans-serif",
                  background:period===p?"#fff":"transparent", color:period===p?"#3b82f6":"#94a3b8",
                  boxShadow:period===p?"0 1px 4px #00000014":"none", transition:"all 0.12s" }}>
                {periodLabels[p]}
              </button>
            ))}
          </div>
        )}

        {isAdmin && (
          <select value={selMember} onChange={e=>setSelMember(e.target.value)}
            style={{ fontSize:12, padding:"6px 12px", borderRadius:8, border:"1px solid #e8edf5",
              background:"#fff", color:"#0f172a", fontFamily:"'Noto Sans JP',sans-serif", cursor:"pointer", outline:"none" }}>
            <option value="all">全体（チーム）</option>
            {allMembers.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        )}
      </div>

      {/* ════════════════════════════════════════════════════ */}
      {/* SUB-TAB 1: 接触率・アポ取得率                        */}
      {/* ════════════════════════════════════════════════════ */}
      {subTab === "rates" && (
        <>
          {/* ── フェーズ選択カード（4枚）──────────────────── */}
          {/* 選択中のフェーズはアクセントカラーのボーダー+背景でハイライト */}
          <div style={{ display:"grid", gridTemplateColumns: isMobile?"repeat(2,1fr)":"repeat(4,1fr)", gap: isMobile?8:12, marginBottom: isMobile?10:16 }}>
            {Object.entries(PHASES).map(([key, ph]) => {
              const sel = selPhase === key;
              const mainVal  = ph.mainValue(curAll);
              const prevVal  = ph.mainValue(prevAll);
              const mainR    = ph.mainRate(curAll);
              const prevR    = ph.mainRate(prevAll);
              return (
                <button key={key} onClick={()=>setSelPhase(key)}
                  style={{
                    background: sel ? ph.bg : "#fff",
                    border: sel ? `2px solid ${ph.accent}` : "1px solid #e8edf5",
                    borderRadius:14, padding: isMobile?"14px 12px":"18px 20px",
                    cursor:"pointer", textAlign:"left", transition:"all 0.15s",
                    boxShadow: sel ? `0 2px 12px ${ph.accent}22` : "0 1px 4px #00000008",
                    fontFamily:"'Noto Sans JP',sans-serif", outline:"none",
                    transform: sel ? "translateY(-1px)" : "none",
                  }}>
                  {/* フェーズ名 + 選択インジケータ */}
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div style={{ fontSize: isMobile?11:12, fontWeight:700, color: sel?ph.accent:"#64748b", letterSpacing:"0.04em" }}>
                      {ph.label}
                    </div>
                    {sel && <div style={{ width:8, height:8, borderRadius:"50%", background:ph.accent }}/>}
                  </div>
                  {/* メイン件数 */}
                  <div style={{ fontSize: isMobile?22:28, fontWeight:700, color: sel?ph.accent:"#334155", fontFamily:"'DM Mono',monospace", lineHeight:1.1 }}>
                    {mainVal}
                    <span style={{ fontSize: isMobile?11:13, fontWeight:400, color:"#94a3b8" }}>件</span>
                  </div>
                  <div style={{ fontSize:10, color:"#94a3b8", marginTop:2 }}>{ph.mainLabel}</div>
                  {/* キー率指標 */}
                  <div style={{ marginTop:6, display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                    <span style={{ fontSize: isMobile?12:14, fontWeight:700, color:sel?ph.accent:"#475569", fontFamily:"'DM Mono',monospace" }}>
                      {mainR}%
                    </span>
                    <span style={{ fontSize:10, color:"#94a3b8" }}>{ph.mainRateLabel}</span>
                    <DeltaBadge val={delta(mainR, prevR)}/>
                  </div>
                </button>
              );
            })}
          </div>

          {/* ── 詳細KPIカード（選択フェーズの展開）────────── */}
          {(() => {
            const details = phase.details(curAll);
            const prevDetails = phase.details(prevAll);
            return (
              <div style={{
                display:"grid",
                gridTemplateColumns: isMobile
                  ? `repeat(${Math.min(details.length, 3)},1fr)`
                  : `repeat(${Math.min(details.length, 6)},1fr)`,
                gap: isMobile?8:10, marginBottom: isMobile?14:20,
              }}>
                {details.map((d, i) => {
                  const prevD = prevDetails[i];
                  const dlt = delta(d.value, prevD?.value);
                  return (
                    <div key={i} style={{
                      background:"#fff", border:"1px solid #e8edf5", borderRadius:12,
                      padding: isMobile?"10px 8px":"12px 14px", boxShadow:"0 1px 4px #00000008",
                      borderTop:`3px solid ${d.color}`,
                    }}>
                      <div style={{ fontSize: isMobile?9:10, color:"#64748b", marginBottom:3, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                        {d.label}
                      </div>
                      <div style={{ fontSize: isMobile?16:20, fontWeight:700, color:d.color, fontFamily:"'DM Mono',monospace" }}>
                        {d.value}<span style={{ fontSize: isMobile?10:12, fontWeight:400, color:"#94a3b8" }}>{d.unit}</span>
                      </div>
                      {d.sub && (
                        <div style={{ fontSize:9, color:"#94a3b8", marginTop:1, fontFamily:"'DM Mono',monospace" }}>({d.sub})</div>
                      )}
                      <div style={{ fontSize:10, color:"#94a3b8", marginTop:2 }}>
                        {prevLabel[period]} <DeltaBadge val={dlt}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* ── トレンドチャート ──────────────────────────── */}
          <div style={{ ...cardS, marginBottom: isMobile?14:20 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#0f172a", marginBottom:4 }}>
              {periodLabels[period]}トレンド {effectiveMember !== "all" ? `— ${effectiveMember}` : "— チーム全体"}
            </div>
            <div style={{ fontSize:10, color:"#64748b", marginBottom:12 }}>
              棒グラフ=件数 ／ 折れ線=率(%)
            </div>
            <ResponsiveContainer width="100%" height={isMobile?220:280}>
              <ComposedChart data={chartData} margin={{ top:5, right:10, left:0, bottom:0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                <XAxis dataKey="name" fontSize={11} tick={{ fill:"#64748b" }}/>
                <YAxis yAxisId="left"  fontSize={10} tick={{ fill:"#94a3b8" }}/>
                <YAxis yAxisId="right" orientation="right" fontSize={10} tick={{ fill:"#94a3b8" }} domain={[0,100]}/>
                <Tooltip contentStyle={{ fontSize:11, borderRadius:8, border:"1px solid #e8edf5" }}
                  formatter={(v,name) => [name.includes("率") ? `${v}%` : `${v}件`, name]}/>
                {phase.chartKeys.map(k=>(
                  <Bar key={k.key} yAxisId="left" dataKey={k.key} fill={k.color} radius={[3,3,0,0]} barSize={isMobile?10:16}/>
                ))}
                {phase.chartLines.map(l=>(
                  <Line key={l.key} yAxisId="right" type="monotone" dataKey={l.key}
                    stroke={l.color} strokeWidth={2}
                    strokeDasharray={l.dash?"5 3":undefined}
                    dot={{ fill:l.color, r:3 }}/>
                ))}
                <Legend wrapperStyle={{ fontSize:11 }}/>
              </ComposedChart>
            </ResponsiveContainer>
          </div>

          {/* ── メンバー別比較テーブル ─────────────────────── */}
          {effectiveMember === "all" && memberStats.length > 0 && (
            <div style={{ ...cardS }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#0f172a", marginBottom:12 }}>
                メンバー別比較 — {phase.label}（{periodLabels[period]}）
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize: isMobile?11:12 }}>
                  <thead>
                    <tr style={{ borderBottom:"2px solid #e8edf5" }}>
                      <th style={{ padding:"8px 10px", textAlign:"left", color:"#64748b", fontWeight:600, fontSize:11 }}>順位</th>
                      <th style={{ padding:"8px 10px", textAlign:"left", color:"#64748b", fontWeight:600, fontSize:11 }}>メンバー</th>
                      {phase.tableColumns(curAll).map((col,i)=>(
                        <th key={i} style={{ padding:"8px 8px", textAlign:"right", color:"#64748b", fontWeight:600, fontSize:10, whiteSpace:"nowrap" }}>{col.label}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {memberStats.map((m,i) => {
                      const cols = phase.tableColumns(m.cur);
                      const prevCols = phase.tableColumns(m.prev);
                      return (
                        <tr key={m.name} style={{ borderBottom:"1px solid #f1f5f9" }}>
                          <td style={{ padding:"10px", fontWeight:700, textAlign:"center",
                            color: i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#cd7f32":"#64748b", fontSize:13 }}>
                            {i+1}
                          </td>
                          <td style={{ padding:"10px", fontWeight:600, color:"#0f172a", whiteSpace:"nowrap" }}>{m.name}</td>
                          {cols.map((col,ci)=>(
                            <td key={ci} style={{ padding:"10px 8px", textAlign:"right" }}>
                              <span style={{ fontFamily:"'DM Mono',monospace", fontWeight:600, color: col.color||"#334155" }}>
                                {col.value}{col.unit==="%" ? "%" : ""}
                              </span>
                              {col.unit==="件" && <span style={{ fontSize:10, color:"#94a3b8", marginLeft:2 }}>件</span>}
                              {prevCols[ci] && col.unit==="%" && (
                                <span style={{ marginLeft:4 }}><DeltaBadge val={delta(col.value, prevCols[ci].value)}/></span>
                              )}
                            </td>
                          ))}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}

      {/* ════════════════════════════════════════════════════ */}
      {/* SUB-TAB 2: 営業マン別スコア分析                      */}
      {/* ════════════════════════════════════════════════════ */}
      {subTab === "scores" && (
        <>
          {/* ── レーダーチャート ──────────────────────────── */}
          <div style={{ ...cardS, marginBottom: isMobile?14:20 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#0f172a", marginBottom:4 }}>
              スキルレーダー {effectiveMember !== "all" ? `— ${effectiveMember}` : "— チーム全体"}
            </div>
            <div style={{ fontSize:10, color:"#64748b", marginBottom:12 }}>
              各軸は担当顧客の raScore 平均値を最大値に対するパーセンテージで表示
            </div>
            {radarData.length > 0 ? (
              <ResponsiveContainer width="100%" height={isMobile?280:360}>
                <RadarChart data={radarData}>
                  <PolarGrid stroke="#e8edf5"/>
                  <PolarAngleAxis dataKey="subject" fontSize={isMobile?10:11} tick={{ fill:"#64748b" }}/>
                  {scoreData.map((m,i)=>(
                    <Radar key={m.name} name={m.name} dataKey={m.name}
                      stroke={MEMBER_COLORS[i%MEMBER_COLORS.length]}
                      fill={MEMBER_COLORS[i%MEMBER_COLORS.length]}
                      fillOpacity={scoreData.length===1 ? 0.25 : 0.08}
                      strokeWidth={2}/>
                  ))}
                  <Legend wrapperStyle={{ fontSize:11 }}/>
                  <Tooltip contentStyle={{ fontSize:11, borderRadius:8, border:"1px solid #e8edf5" }}
                    formatter={(v) => [`${v}%`]}/>
                </RadarChart>
              </ResponsiveContainer>
            ) : (
              <div style={{ textAlign:"center", padding:40, color:"#94a3b8", fontSize:13 }}>スコアデータがありません</div>
            )}
          </div>

          {/* ── 総合スコアランキング ──────────────────────── */}
          {scoreData.length > 0 && (
            <div style={{ ...cardS, marginBottom: isMobile?14:20 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#0f172a", marginBottom:12 }}>
                総合スコアランキング
              </div>
              <ResponsiveContainer width="100%" height={Math.max(scoreData.length * 48, 120)}>
                <BarChart data={scoreData} layout="vertical" margin={{ top:0, right:40, left:0, bottom:0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                  <XAxis type="number" domain={[0,100]} fontSize={10} tick={{ fill:"#94a3b8" }}/>
                  <YAxis type="category" dataKey="name" fontSize={12} tick={{ fill:"#0f172a", fontWeight:600 }} width={isMobile?50:70}/>
                  <Tooltip contentStyle={{ fontSize:11, borderRadius:8, border:"1px solid #e8edf5" }}
                    formatter={(v) => [`${v}%`, "総合スコア"]}/>
                  <Bar dataKey="total" radius={[0,6,6,0]} barSize={20}>
                    {scoreData.map((m,i) => (
                      <Cell key={m.name} fill={MEMBER_COLORS[i%MEMBER_COLORS.length]}/>
                    ))}
                    <LabelList dataKey="total" position="right" fontSize={11} formatter={v=>`${v}%`} fill="#334155"/>
                  </Bar>
                </BarChart>
              </ResponsiveContainer>
            </div>
          )}

          {/* ── 軸別スコア詳細テーブル ────────────────────── */}
          {scoreData.length > 0 && (
            <div style={{ ...cardS }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#0f172a", marginBottom:12 }}>
                軸別スコア詳細
              </div>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize: isMobile?10:12 }}>
                  <thead>
                    <tr style={{ borderBottom:"2px solid #e8edf5" }}>
                      <th style={{ padding:"8px 10px", textAlign:"left", color:"#64748b", fontWeight:600, fontSize:11 }}>メンバー</th>
                      {SCORE_AXES.map(a=>(
                        <th key={a.key} style={{ padding:"8px 6px", textAlign:"center", color:"#64748b", fontWeight:600, fontSize: isMobile?9:10, whiteSpace:"nowrap" }}>
                          {a.label}
                        </th>
                      ))}
                      <th style={{ padding:"8px 10px", textAlign:"center", color:"#64748b", fontWeight:600, fontSize:11 }}>総合</th>
                      <th style={{ padding:"8px 10px", textAlign:"center", color:"#64748b", fontWeight:600, fontSize:11 }}>件数</th>
                    </tr>
                  </thead>
                  <tbody>
                    {scoreData.map((m,mi)=>(
                      <tr key={m.name} style={{ borderBottom:"1px solid #f1f5f9" }}>
                        <td style={{ padding:"10px", fontWeight:600, color:"#0f172a", whiteSpace:"nowrap" }}>{m.name}</td>
                        {m.axes.map((a,ai)=>{
                          const bg = a.pct >= 80 ? "#dcfce7" : a.pct >= 50 ? "#fef9c3" : a.pct > 0 ? "#fee2e2" : "#f8fafc";
                          return (
                            <td key={ai} style={{ padding:"6px", textAlign:"center" }}>
                              <div style={{ background:bg, borderRadius:6, padding:"4px 6px", fontSize: isMobile?10:11,
                                fontWeight:600, fontFamily:"'DM Mono',monospace",
                                color: a.pct >= 80 ? "#15803d" : a.pct >= 50 ? "#a16207" : a.pct > 0 ? "#dc2626" : "#cbd5e1" }}>
                                {a.value}
                              </div>
                            </td>
                          );
                        })}
                        <td style={{ padding:"6px", textAlign:"center" }}>
                          <div style={{ background: m.total >= 70 ? "#6c5ce722" : "#f1f5f9", borderRadius:6, padding:"4px 8px",
                            fontSize:12, fontWeight:700, fontFamily:"'DM Mono',monospace",
                            color: m.total >= 70 ? "#6c5ce7" : "#64748b" }}>
                            {m.total}%
                          </div>
                        </td>
                        <td style={{ padding:"6px", textAlign:"center", fontSize:11, color:"#94a3b8" }}>{m.count}件</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div style={{ marginTop:10, fontSize:10, color:"#94a3b8" }}>
                ※ 各スコアは担当顧客の raScore 平均値。件数は raScore が記録された顧客数。
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

                <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", marginBottom:6 }}>{noticeDraft.title||"（タイトル未入力）"}</div>
                <div style={{ fontSize:12, color:"#475569", lineHeight:1.75, whiteSpace:"pre-wrap", marginBottom:10 }}>{noticeDraft.body||"（本文未入力）"}</div>

              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══ メンバー管理 ══ */}

        <div style={{ maxWidth:700 }}>
          <div style={cardStyle}>
            {/* ヘッダー行 */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18 }}>
              <div style={{ fontSize:14, fontWeight:700, color:"#0f172a" }}>スタッフ一覧</div>
              <button onClick={()=>{ setAddingMember(true); setNewMember({...EMPTY_MEMBER}); }} style={{

              <div style={{
                marginBottom:16, padding:"16px", borderRadius:12,

                        <input value={m.email} onChange={e=>setMemberList(l=>l.map((x,j)=>j===i?{...x,email:e.target.value}:x))}

      {/* ══ 目標値設定 ══ */}

        <div style={{ maxWidth:700 }}>

            <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", marginBottom:6 }}>メンバー別KPI目標（月次）</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginBottom:20 }}>各メンバーの月間目標値を設定します。ダッシュボードの達成率に反映されます。</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {memberList.filter(m=>m.active).map((m,i) => (
                <div key={i} style={{ background:"#f8faff", border:"1px solid #e8edf5", borderRadius:12, padding:"16px" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>

                    <span style={{ fontSize:13, fontWeight:700, color:"#0f172a" }}>{m.name}</span>
                  </div>
                  {[
                    { key:"calls",     label:"月間目標架電数", unit:"件" },
                    { key:"appts",     label:"月間アポ目標",   unit:"件" },
                    { key:"contracts", label:"月間成約目標",   unit:"件" },
                  ].map(f => (
                    <div key={f.key} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                      <label style={{ fontSize:11, color:"#64748b" }}>{f.label}</label>
                      <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                        <input type="number" min={0} value={m.target[f.key]}
                          onChange={e=>setMemberList(l=>l.map((x,j)=>j===memberList.indexOf(m)?{...x,target:{...x.target,[f.key]:Number(e.target.value)}}:x))}
                          style={{ width:60, fontSize:13, fontWeight:600, color:"#0f172a", border:"1px solid #e8edf5", borderRadius:6, padding:"4px 8px", textAlign:"right", fontFamily:"'DM Mono',monospace" }}/>
                        <span style={{ fontSize:11, color:"#94a3b8" }}>{f.unit}</span>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{ display:"flex", justifyContent:"flex-end", marginTop:18 }}>
              <button style={{
                background:"#6c5ce7", color:"#fff", border:"none", borderRadius:8,
                padding:"9px 22px", fontSize:13, fontWeight:600, cursor:"pointer",
                fontFamily:"'Noto Sans JP',sans-serif"
              }}>目標値を保存</button>
            </div>
          </div>
        </div>
      )}

        <div style={{ maxWidth:700 }}>

          {/* ── 媒体マスター管理 ── */}
          <div style={{ ...cardStyle, marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", marginBottom:6 }}>リスト媒体の管理</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginBottom:16 }}>バッジのラベル・色をここで設定します。CSVに未登録の媒体名を入れると自動追加されます。</div>
            <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:12 }}>
              {sourceList.map((src, i) => (
                <div key={src.key} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", background:"#f8faff", border:"1px solid #e8edf5", borderRadius:10 }}>
                  {/* カラープレビュー＋ピッカー */}
                  <div style={{ position:"relative", flexShrink:0 }}>
                    <div style={{ width:28, height:28, borderRadius:8, background:src.bg, border:`2px solid ${src.color}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <div style={{ width:10, height:10, borderRadius:"50%", background:src.color }}/>
                    </div>
                    <input type="color" value={src.color}
                      onChange={e=>{
                        const hex = e.target.value;
                        // bg は色を薄めた値（hex + "22"）
                        setSourceList(l=>l.map((s,j)=>j===i?{...s,color:hex,bg:hex+"22"}:s));

                      style={{ position:"absolute", inset:0, opacity:0, width:"100%", height:"100%", cursor:"pointer" }}

                  <input value={src.label}
                    onChange={e=>setSourceList(l=>l.map((s,j)=>j===i?{...s,label:e.target.value}:s))}
                    style={{ flex:1, fontSize:13, fontWeight:600, color:"#0f172a", border:"1px solid #e8edf5", borderRadius:6, padding:"5px 10px", fontFamily:"'Noto Sans JP',sans-serif", outline:"none", background:"#fff" }}/>
                  {/* プレビューバッジ */}
                  <span style={{ fontSize:10, fontWeight:700, color:src.color, background:src.bg, borderRadius:4, padding:"3px 8px", letterSpacing:"0.02em", flexShrink:0, minWidth:60, textAlign:"center", border:`1px solid ${src.color}44` }}>
                    {src.label}
                  </span>
                  {/* 削除 */}
                  <button onClick={()=>setSourceList(l=>l.filter((_,j)=>j!==i))}
                    style={{ background:"#fff0f0", border:"1px solid #fecaca", borderRadius:6, padding:"5px 8px", fontSize:11, color:"#ef4444", cursor:"pointer", flexShrink:0 }}>削除</button>
                </div>
              ))}
            </div>
            {/* 新規追加 */}
            <button onClick={()=>setSourceList(l=>[...l,{ key:`custom_${Date.now()}`, label:"新しい媒体", color:"#6c5ce7", bg:"#6c5ce722" }])}
              style={{ background:"#f8faff", border:"1px dashed #c7d2fe", borderRadius:8, padding:"8px 16px", fontSize:12, color:"#6c5ce7", cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif", fontWeight:600, width:"100%" }}>
              ＋ 媒体を追加
            </button>
          </div>

          {/* 割り振りルール */}
          <div style={{ ...cardStyle, marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", marginBottom:6 }}>自動割り振りルール</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginBottom:18 }}>CSVインポート時に架電リストをメンバーへ自動で振り分けるルールを設定します。</div>
            {[
              { label:"割り振り方式", options:["均等分配（件数が同じになるよう自動分配）","ラウンドロビン（順番に1件ずつ割り当て）","手動のみ（自動割り振りなし）"], defaultVal:0 },
              { label:"担当者未設定リストの扱い", options:["管理者に割り当てる","プールとして保留","最も件数が少ないメンバーに割り当て"], defaultVal:1 },
              { label:"1人あたりの上限件数（0=無制限）", type:"number", defaultVal:50 },
            ].map((f,i)=>(
              <div key={i} style={{ marginBottom:16 }}>
                <label style={{ fontSize:11, color:"#64748b", fontWeight:600, marginBottom:6, display:"block" }}>{f.label}</label>
                {f.type==="number" ? (
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <input type="number" min={0} defaultValue={f.defaultVal}
                      style={{ width:80, fontSize:14, fontWeight:600, color:"#0f172a", border:"1px solid #e8edf5", borderRadius:8, padding:"7px 10px", textAlign:"center", fontFamily:"'DM Mono',monospace" }}/>
                    <span style={{ fontSize:12, color:"#94a3b8" }}>件</span>
                  </div>
                ) : (
                  <select defaultValue={f.defaultVal} style={{
                    width:"100%", fontSize:13, color:"#0f172a", border:"1px solid #e8edf5",
                    borderRadius:8, padding:"8px 12px", fontFamily:"'Noto Sans JP',sans-serif",
                    background:"#fff", outline:"none"
                  }}>
                    {f.options.map((o,j)=><option key={j} value={j}>{o}</option>)}
                  </select>
                )}
              </div>
            ))}
          </div>

          {/* メンバー別割り当て上限 */}
          <div style={{ ...cardStyle, marginBottom:16 }}>
            <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", marginBottom:6 }}>メンバー別・割り当て上限</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginBottom:16 }}>個別に上限を設定できます（0=上限なし）</div>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {memberList.filter(m=>m.active).map((m,i)=>(
                <div key={i} style={{
                  display:"flex", alignItems:"center", gap:14,
                  padding:"10px 16px", borderRadius:10, background:"#f8faff", border:"1px solid #e8edf5"
                }}>
                  <div style={{ width:30, height:30, borderRadius:"50%", background:"#6c5ce7", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#fff", flexShrink:0 }}>
                    {m.name.slice(0,2)}
                  </div>
                  <span style={{ flex:1, fontSize:13, fontWeight:600, color:"#0f172a" }}>{m.name}</span>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:11, color:"#94a3b8" }}>上限</span>
                    <input type="number" min={0} defaultValue={m.target.calls}
                      style={{ width:64, fontSize:13, fontWeight:600, color:"#0f172a", border:"1px solid #e8edf5", borderRadius:6, padding:"5px 8px", textAlign:"center", fontFamily:"'DM Mono',monospace" }}/>
                    <span style={{ fontSize:11, color:"#94a3b8" }}>件</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* 業種・都道府県フィルター */}
          <div style={cardStyle}>
            <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", marginBottom:6 }}>エリア・業種フィルター割り振り</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginBottom:16 }}>特定のエリアや業種を担当メンバーに固定できます。</div>
            {[
              { pref:"愛知県",   assign:"吉村" },
              { pref:"岐阜県",   assign:"大原" },
              { pref:"三重県",   assign:"小島" },
            ].map((r,i)=>(
              <div key={i} style={{
                display:"flex", alignItems:"center", gap:12, marginBottom:10,
                padding:"10px 14px", background:"#f8faff", border:"1px solid #e8edf5", borderRadius:10
              }}>
                <span style={{ fontSize:12, color:"#64748b", minWidth:64 }}>{r.pref}</span>
                <span style={{ color:"#c7d2fe", fontSize:12 }}>→</span>
                <select defaultValue={r.assign} style={{
                  flex:1, fontSize:13, color:"#0f172a", border:"1px solid #e8edf5",
                  borderRadius:7, padding:"6px 10px", fontFamily:"'Noto Sans JP',sans-serif", background:"#fff"
                }}>
                  <option value="">（指定なし）</option>
                  {memberList.filter(m=>m.active).map(m=><option key={m.name} value={m.name}>{m.name}</option>)}
                </select>
                <button style={{ background:"#fff0f0", border:"1px solid #fecaca", borderRadius:6, padding:"5px 8px", fontSize:11, color:"#ef4444", cursor:"pointer" }}>削除</button>
              </div>
            ))}
            <button style={{
              background:"#f8faff", border:"1px dashed #c7d2fe", borderRadius:8,
              padding:"8px 16px", fontSize:12, color:"#6c5ce7", cursor:"pointer",
              fontFamily:"'Noto Sans JP',sans-serif", fontWeight:600, width:"100%", marginTop:4
            }}>＋ フィルターを追加</button>
          </div>

          <div style={{ display:"flex", justifyContent:"flex-end", marginTop:16 }}>
            <button style={{
              background:"#6c5ce7", color:"#fff", border:"none", borderRadius:8,
              padding:"9px 22px", fontSize:13, fontWeight:600, cursor:"pointer",
              fontFamily:"'Noto Sans JP',sans-serif"
            }}>ルールを保存</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────
function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [authChecking, setAuthChecking] = useState(true);

  // v13: Supabase Auth セッション復元（リロード時に自動ログイン）
  useEffect(() => {
    (async () => {
      try {
        const sb = await getSupabase();
        if (!sb) { setAuthChecking(false); return; }
        const { data: { session } } = await sb.auth.getSession();
        if (session?.user?.email) {
          const { data: member } = await sb.from('members')
            .select('*').eq('email', session.user.email).eq('is_active', true).maybeSingle();
          if (member) {
            setCurrentUser({
              name: member.name, role: member.role, email: member.email,
              studentId: member.student_id || '', isAdmin: member.role === 'admin',
            });
          }
        }
      } catch (e) { console.warn("Session restore failed:", e.message); }
      setAuthChecking(false);
    })();
  }, []);

  // v13: ログアウト（Supabase Auth signOut + GSI disableAutoSelect）
  async function handleLogout() {
    try {
      const sb = await getSupabase();
      if (sb) await sb.auth.signOut();
      if (window.google?.accounts?.id) window.google.accounts.id.disableAutoSelect();
    } catch (e) { console.warn("signOut error:", e.message); }
    setCurrentUser(null);
  }

  if (authChecking) {
    return (
      <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f4ff",fontFamily:"'Noto Sans JP',sans-serif" }}>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:14,color:"#64748b" }}>認証情報を確認中...</div>
        </div>
      </div>
    );
  }

  if (!currentUser) return <LoginScreen onLogin={setCurrentUser}/>;
  return <Dashboard user={currentUser} onLogout={handleLogout}/>;
}

    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
