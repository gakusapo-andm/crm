// ── RESPONSIVE HOOK ───────────────────────────────────────
// isMobile: iPhone など幅 767px 以下
// isTablet: iPad など幅 768〜1024px
function useResponsive() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1280);
  useEffect(() => {
    const handler = () => setW(window.innerWidth);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return { isMobile: w < 768, isTablet: w >= 768 && w <= 1024, w };
}

// ── v13: トークン生成（BB v52・事前問診と同一アルゴリズム）──
function generatePreInputToken(id) {
  var s = id + 'gksp2026';
  var h = 0;
  for (var i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h = h & h;
  }
  return Math.abs(h).toString(36).padStart(8, '0').slice(0, 8);
}

// ── v13: 業種コード（BB v52 INDUSTRY_CODESと同一）──
const INDUSTRY_CODES = {
  '製造業（ものづくり）': '01', '製造業（食品メーカー・その他）': '02',
  'IT・通信': '03', '金融・保険': '04', '小売・流通': '05',
  'サービス業': '06', '建設・不動産': '07', '医療・福祉': '08',
  '飲食・宿泊': '09', '運輸・物流': '10', 'マスコミ・広告': '11',
  'コンサルティング': '12', '商社・卸売': '13', 'その他': '99'
};

// CRMの業種名はBB診断の正式名と異なる場合があるため、部分一致で変換
function getIndustryCode(industry) {
  if (!industry) return '00';
  // 完全一致
  if (INDUSTRY_CODES[industry]) return INDUSTRY_CODES[industry];
  // 部分一致（CRM側 "製造業" → "01", "IT・システム" → "03" 等）
  const lower = industry;
  if (lower.includes('製造') || lower.includes('ものづくり')) return '01';
  if (lower.includes('食品')) return '02';
  if (lower.includes('IT') || lower.includes('通信') || lower.includes('システム')) return '03';
  if (lower.includes('金融') || lower.includes('保険')) return '04';
  if (lower.includes('小売') || lower.includes('流通')) return '05';
  if (lower.includes('サービス')) return '06';
  if (lower.includes('建設') || lower.includes('不動産')) return '07';
  if (lower.includes('医療') || lower.includes('福祉')) return '08';
  if (lower.includes('飲食') || lower.includes('宿泊')) return '09';
  if (lower.includes('運輸') || lower.includes('物流')) return '10';
  if (lower.includes('マスコミ') || lower.includes('広告')) return '11';
  if (lower.includes('コンサル')) return '12';
  if (lower.includes('商社') || lower.includes('卸売') || lower.includes('卸')) return '13';
  if (lower.includes('電気') || lower.includes('電子') || lower.includes('機器')) return '01';
  if (lower.includes('自動車') || lower.includes('部品')) return '01';
  if (lower.includes('精密') || lower.includes('加工')) return '01';
  if (lower.includes('化学')) return '01';
  return '00';
}

// ── v13: 事前問診URL一括発行 ──
// 1. members テーブルから owner名 → student_id を取得
// 2. reserve_inquiry_no RPC → inquiry_no 採番
// 3. issue_bb_preinput v2 RPC → bb_diagnoses + pre_inputs 作成 + company_size 返却
// 4. トークン生成 + URL組み立て
// 返値: { inquiryNo, staffUrl, execUrl, companySize } or null
async function issuePreInputUrls({ companyId, dealId, owner, industry }) {
  const sb = await getSupabase();
  if (!sb) { console.error("issuePreInputUrls: Supabase未接続"); return null; }

  // 1. student_id 取得（owner名で逆引き）
  let studentId = '0001';
  try {
    const { data: memberRow } = await sb.from('members')
      .select('student_id').eq('name', owner).eq('is_active', true).single();
    if (memberRow?.student_id) studentId = memberRow.student_id.padStart(4, '0');
  } catch (e) { console.warn("members lookup failed, using default studentId:", e.message); }

  // 2. reserve_inquiry_no RPC
  const industryCode = getIndustryCode(industry);
  const { data: inquiryNo, error: reserveErr } = await sb.rpc('reserve_inquiry_no', {
    p_student_id: studentId,
    p_industry_code: industryCode,
  });
  if (reserveErr || !inquiryNo) {
    console.error("reserve_inquiry_no failed:", reserveErr);
    return null;
  }

  // 3. issue_bb_preinput v2 RPC
  const { data: issueResult, error: issueErr } = await sb.rpc('issue_bb_preinput', {
    p_inquiry_no: inquiryNo,
    p_company_id: companyId,
    p_deal_id: dealId,
  });
  if (issueErr) {
    console.error("issue_bb_preinput failed:", issueErr);
    // bb_diagnoses作成失敗でもURL自体は生成可能（手動リカバリ用）
  }

  const companySize = issueResult?.company_size || 'medium';

  // 4. トークン生成 + URL組み立て
  const token = generatePreInputToken(inquiryNo);
  const base = "https://gakusapo-andm.github.io/bb-shindan/customer/";
  const staffUrl = `${base}?id=${encodeURIComponent(inquiryNo)}&tk=${token}${companySize ? '&size=' + companySize : ''}`;
  const execUrl  = `${base}?id=${encodeURIComponent(inquiryNo)}&tk=${token}${companySize ? '&size=' + companySize : ''}&role=exec`;

  return { inquiryNo, staffUrl, execUrl, companySize };
}

    industry: co.industry ?? "",
    employees: co.employees ?? "",             // v11: text型に統一（#8 修正）
    // 根本原因（パターンC）: DBはtext型('120'等)だがv10は ?? 0 (number)で

    prefecture: co.prefecture ?? "",

    createdAt: row.created_at?.slice?.(0,10) ?? "",
    stageHistory: row.stage_history ?? [],
    nextAction: row.next_action ?? {},
    notes: row.notes ?? [],
    raScore: row.ra_score ?? {},

    _teleapoId: row.teleapo_id ?? null,
    _address: co.address ?? "",
    _url: co.url ?? "",
    _revenue: co.revenue ?? "",

function customerToCompanyRow(c) {
  return {
    name: c.company ?? "",
    industry: c.industry ?? null,
    employees: c.employees != null ? String(c.employees) : null,
    prefecture: c.prefecture ?? null,
    contact_name: c.contact ?? null,
    contact_title: c.title ?? null,
    email: c.email ?? null,
    phone: c.phone ?? null,
    address: c._address ?? null,
    url: c._url ?? null,
    revenue: c._revenue ?? null,
    source: c._source ?? null,
  };
}

function customerToDealRow(c, companyId) {
  return {
    company_id: companyId,
    owner: c.owner ?? null,
    stage: c.stage ?? "①",
    stage_history: c.stageHistory ?? [],
    next_action: c.nextAction ?? {},
    notes: c.notes ?? [],
    ra_score: c.raScore ?? {},
    pending_lost: c.pendingLost ?? false,
    bb_inquiry_no: c.bbId || null,              // UIの customer.bbId → DB の bb_inquiry_no
    google_event_id: c.google_event_id ?? null,
    teleapo_id: c._teleapoId ?? null,

let _saveRunning = false;
// v12: INSERT→Realtime重複防止用。tempId→true のSet。
// saveQueue INSERT開始時にtempIdを登録、完了時に削除。
// Realtime INSERT受信時にtempIdエントリを置換して重複を防ぐ。
const _pendingInsertTempIds = new Set();

async function _processSaveQueue() {
  if (_saveRunning) return;
  _saveRunning = true;
  try {
    while (_saveQueue.length > 0) {
      const task = _saveQueue.shift();
      try { await task(); } catch (err) { console.error("customer save error:", err); }
    }
  } finally {
    _saveRunning = false;
  }
}

// v11: company の upsert（ユニーク制約(name,prefecture)対応 #10 修正）
//
// 根本原因（パターンC: 独立開発による不整合）:
//   02_patch.sql で companies に (name, prefecture) ユニーク制約を追加したが、
//   CRM v10 はこの制約を知らず、同名企業の新規INSERT時にエラーが発生していた。
//   修正: INSERT前に同名+同県の既存企業を検索し、あれば再利用する。
async function _upsertCompany(sb, c) {
  const companyRow = customerToCompanyRow(c);
  let companyId = c._companyId;

  if (companyId) {
    // 既存企業を更新
    await sb.from("companies").update(companyRow).eq("id", companyId);
    return companyId;
  }

  // 新規: まず同名+同県の既存企業を検索
  if (companyRow.name) {
    const { data: existing } = await sb
      .from("companies")
      .select("id")
      .eq("name", companyRow.name)
      .eq("prefecture", companyRow.prefecture ?? "")
      .maybeSingle();
    if (existing) {
      // 既存企業を更新して再利用
      await sb.from("companies").update(companyRow).eq("id", existing.id);
      return existing.id;
    }
  }

  // 新規作成
  const { data: newCo, error } = await sb
    .from("companies").insert(companyRow).select("id").single();
  if (error) {
    console.error("company insert failed:", companyRow.name, error.message);
    return null;
  }
  return newCo.id;
}

// ── useCustomers Hook（統合スキーマ対応 v11）─────────────
// v11 修正内容:
//   #1 race condition: async DB操作をsetState外のキューに移動
//   #2 Supabase init: getSupabase() で初期化完了を確実に待機
//   #8 employees: text型統一（ "" fallback）
//   #9 companies RT: companies テーブルの Realtime も購読
//   #10 company conflict: ユニーク制約(name,prefecture)との競合を処理
function useCustomers(initData) {
  const [customers, _setCustomers] = useState(initData);
  const [supaReady, setSupaReady] = useState(false);

  // v11: Supabase 初期化を確実に待ってからデータ取得
  useEffect(() => {
    let cancelled = false;
    getSupabase().then(sb => {
      if (cancelled || !sb) return;
      setSupaReady(true);
      sb.from("crm_deals")
        .select("*, companies(*)")
        .order("created_at", { ascending: true })
        .then(({ data, error }) => {
          if (cancelled) return;
          if (error) { console.error("crm_deals load error:", error); return; }
          if (data && data.length > 0) _setCustomers(data.map(rowToCustomer));
        });
    });
    return () => { cancelled = true; };
  }, []);

  // v11: crm_deals + companies 両方のRealtimeを購読 (#9 修正)
  useEffect(() => {
    if (!supaReady || !_supabase) return;
    const sb = _supabase;

    // crm_deals の変更を購読
    const dealsCh = sb.channel("crm-deals-rt")
      .on("postgres_changes", { event: "*", schema: "public", table: "crm_deals" }, async (payload) => {
        if (payload.eventType === "DELETE") {
          _setCustomers(cs => cs.filter(c => c.id !== payload.old.id));
        } else {
          const { data } = await sb
            .from("crm_deals").select("*, companies(*)").eq("id", payload.new.id).single();
          if (data) {
            const customer = rowToCustomer(data);
            _setCustomers(cs => {
              const exists = cs.some(c => c.id === data.id);
              if (exists) return cs.map(c => c.id === data.id ? customer : c);
              // v12: INSERT→Realtime重複防止
              // saveQueue INSERT中のtempIdエントリがあれば置換（追加ではなく）
              if (_pendingInsertTempIds.size > 0) {
                const tempEntry = cs.find(c => _pendingInsertTempIds.has(c.id) && c.company === customer.company);
                if (tempEntry) return cs.map(c => c.id === tempEntry.id ? customer : c);
              }
              return [...cs, customer];
            });
          }
        }
      }).subscribe();

    // v11: companies テーブルの変更も購読（BB診断側からの企業名変更に対応）
    // 根本原因（パターンB）: crm_dealsのRealtimeのみ購読していたため、
    // BB診断側で企業名を変更してもCRM画面に反映されなかった。
    // 統合DBの本来の目的（2システム間のデータ共有）が機能していなかった。
    const companiesCh = sb.channel("companies-rt")
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "companies" }, async (payload) => {
        const companyId = payload.new.id;
        // この企業に紐づく全 deal を再取得
        const { data: deals } = await sb
          .from("crm_deals").select("*, companies(*)").eq("company_id", companyId);
        if (deals && deals.length > 0) {
          const updated = deals.map(rowToCustomer);
          _setCustomers(cs => cs.map(c => {
            const fresh = updated.find(u => u.id === c.id);
            return fresh ?? c;
          }));
        }
      }).subscribe();

    return () => {
      sb.removeChannel(dealsCh);
      sb.removeChannel(companiesCh);
    };
  }, [supaReady]);

  // v11: setCustomers — DB書き込みをキューに分離（#1 race condition 修正）
  async function setCustomers(updater) {
    _setCustomers(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;

      // DB書き込みタスクをキューに投入（setState外で非同期実行）
      if (_supabase) {
        const sb = _supabase;
        const prevIds = new Set(prev.map(c => c.id));
        const nextIds = new Set(next.map(c => c.id));

        // 削除
        for (const id of prevIds) {
          if (!nextIds.has(id)) {
            _saveQueue.push(() => sb.from("crm_deals").delete().eq("id", id));
          }
        }

        // 追加・更新
        for (const c of next) {
          const old = prev.find(x => x.id === c.id);
          const isNew = !prevIds.has(c.id);
          const isChanged = !isNew && JSON.stringify(old) !== JSON.stringify(c);
          if (isNew || isChanged) {
            _saveQueue.push(async () => {
              const companyId = await _upsertCompany(sb, c);
              if (!companyId) return;
              const dealRow = customerToDealRow(c, companyId);
              if (isNew) {
                // v12: Realtime重複防止 — INSERT前にtempIdを登録
                _pendingInsertTempIds.add(c.id);
                const { data } = await sb
                  .from("crm_deals").insert(dealRow).select("*, companies(*)").single();
                _pendingInsertTempIds.delete(c.id);
                if (data) _setCustomers(cs => cs.map(x => x.id === c.id ? rowToCustomer(data) : x));
              } else {
                await sb.from("crm_deals").update(dealRow).eq("id", c.id);
              }
            });
          }
        }

        // キューを非同期で処理開始（setState外）
        Promise.resolve().then(_processSaveQueue);
      }

      return next;
    });
  }

  return [customers, setCustomers];
}

// ── useTeleapoLists Hook（DB永続化: teleapo_list_view + teleapo_calls）──
// v12: useCustomersと同パターン。Supabase teleapo_list_view から読み込み、
// teleapo_lists/teleapo_calls の Realtime を購読。
// 架電記録は teleapo_calls INSERT → DBトリガーが reached_stage/call_count を自動更新。

function rowToTeleapoItem(row) {
  return {
    id: row.id,
    company: row.company_name ?? "",
    contact: row.contact_name ?? "",
    title: row.contact_title ?? "",
    phone: row.contact_phone ?? "",
    industry: row.industry ?? "",
    prefecture: row.prefecture ?? "",
    address: row.address ?? "",
    url: row.url ?? "",
    revenue: row.revenue ?? "",
    employees: row.employees ?? "",
    owner: row.owner ?? "",
    source: row.source ?? "",
    listBadge: row.list_badge ?? "",
    reachedStage: row.reached_stage ?? "new",
    callCount: row.call_count ?? 0,
    callTags: row.call_tags ?? [],
    lastCallResult: row.last_call_result ?? "",
    callLogs: (row.recent_calls ?? []).map(c => ({
      id: c.id, date: c.called_at?.slice(0,10) ?? "",
      time: c.called_at?.slice(11,16) ?? "",
      tags: [c.result].filter(Boolean), note: c.memo ?? "", by: c.caller_id ?? ""
    })),
    dealId: row.deal_id ?? null,
    dealStage: row.deal_stage ?? null,
    bbInquiryNo: row.bb_inquiry_no ?? null,
    company_id: row.company_id ?? null,
    createdAt: row.created_at?.slice(0,10) ?? "",
    updatedAt: row.updated_at?.slice(0,10) ?? "",
    comments: [], flagClaim: false, flagBanned: false, adminNotes: [],
  };
}

// CRMのタグキー → DB teleapo_calls.result 値マッピング
// DBトリガー(on_teleapo_call_insert)が以下の値で reached_stage を判定:
//   appointed → reached_stage='appointed'
//   materials_sent → reached_stage='materials'
//   connected_ng/connected_hold → reached_stage='connected'
//   no_answer/reception/callback/wrong_number → reached_stage='called'
const TAG_TO_DB_RESULT = {
  apo: "appointed", contact: "connected_hold", absent: "no_answer",
  material: "materials_sent", refuse: "connected_ng", gng: "reception",
  claim: "connected_ng", timing: "callback", person: "connected_ng",
};
// 優先順位（最も進んだ結果を teleapo_calls.result に使う）
const TAG_PRIORITY = ["apo","material","contact","timing","person","refuse","claim","gng","absent"];

function getDbResult(tags) {
  for (const t of TAG_PRIORITY) {
    if (tags.includes(t)) return TAG_TO_DB_RESULT[t] || t;
  }
  return tags[0] || "no_answer";
}

// DB書き込みヘルパー
async function dbRecordCall(teleapoId, tags, memo, callerName) {
  const sb = await getSupabase();
  if (!sb) return null;
  const result = getDbResult(tags);
  const { data, error } = await sb.from("teleapo_calls").insert({
    teleapo_id: teleapoId,
    result: result,
    memo: memo || null,
    caller_id: callerName || null,
    called_at: new Date().toISOString(),
  }).select("id").single();
  if (error) { console.error("teleapo_calls insert error:", error); return null; }
  return data;
}

async function dbUpdateTeleapoItem(id, fields) {
  const sb = await getSupabase();
  if (!sb) return;
  const row = {};
  if ("company" in fields) row.company_name = fields.company;
  if ("contact" in fields) row.contact = fields.contact;
  if ("title" in fields) row.title = fields.title;
  if ("phone" in fields) row.phone = fields.phone;
  if ("industry" in fields) row.industry = fields.industry;
  if ("prefecture" in fields) row.prefecture = fields.prefecture;
  if ("address" in fields) row.address = fields.address;
  if ("url" in fields) row.url = fields.url;
  if ("revenue" in fields) row.revenue = fields.revenue;
  if ("employees" in fields) row.employees = fields.employees;
  if ("owner" in fields) row.owner = fields.owner;
  if ("source" in fields) row.source = fields.source;
  if ("flagBanned" in fields) row.call_tags = fields.flagBanned ? ["banned"] : [];
  if ("callTags" in fields) row.call_tags = fields.callTags;
  row.updated_at = new Date().toISOString();
  await sb.from("teleapo_lists").update(row).eq("id", id);
}

async function dbInsertTeleapoRows(rows) {
  const sb = await getSupabase();
  if (!sb || rows.length === 0) return;
  const dbRows = rows.map(r => ({
    company_name: r.company || "", contact: r.contact || "", title: r.title || "",
    phone: r.phone || "", industry: r.industry || "", prefecture: r.prefecture || "",
    address: r.address || "", url: r.url || "", revenue: r.revenue || "",
    employees: r.employees || "", owner: r.owner || "", source: r.source || "",
  }));
  const { data, error } = await sb.from("teleapo_lists").insert(dbRows).select("id");
  if (error) console.error("teleapo_lists batch insert error:", error);
  return data;
}

function useTeleapoLists(initData) {
  const [items, _setItems] = useState(initData);
  const [supaReady, setSupaReady] = useState(false);

  // DB読み込み
  useEffect(() => {
    let cancelled = false;
    getSupabase().then(sb => {
      if (cancelled || !sb) return;
      setSupaReady(true);
      sb.from("teleapo_list_view").select("*").then(({ data, error }) => {
        if (cancelled) return;
        if (error) { console.error("teleapo_list_view load error:", error); return; }
        if (data) _setItems(data.map(rowToTeleapoItem));
      });
    });
    return () => { cancelled = true; };
  }, []);

  // Realtime購読
  useEffect(() => {
    if (!supaReady || !_supabase) return;
    const sb = _supabase;
    const reload = async (teleapoId) => {
      const { data } = await sb.from("teleapo_list_view").select("*").eq("id", teleapoId).maybeSingle();
      if (data) {
        const item = rowToTeleapoItem(data);
        _setItems(prev => {
          const exists = prev.some(r => r.id === data.id);
          return exists ? prev.map(r => r.id === data.id ? { ...r, ...item, comments: r.comments, adminNotes: r.adminNotes, flagClaim: r.flagClaim, flagBanned: r.flagBanned } : r)
            : [...prev, item];
        });
      }
    };
    const ch1 = sb.channel("teleapo-lists-rt")
      .on("postgres_changes", { event: "*", schema: "public", table: "teleapo_lists" }, (payload) => {
        if (payload.eventType === "DELETE") {
          _setItems(prev => prev.filter(r => r.id !== payload.old.id));
        } else { reload(payload.new.id); }
      }).subscribe();
    const ch2 = sb.channel("teleapo-calls-rt")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "teleapo_calls" }, (payload) => {
        reload(payload.new.teleapo_id);
      }).subscribe();
    return () => { sb.removeChannel(ch1); sb.removeChannel(ch2); };
  }, [supaReady]);

  // setItems ラッパー（ローカルstate即時更新 + DB書き込みは呼び出し元のヘルパーで実行）
  function setItems(updater) {
    _setItems(prev => typeof updater === "function" ? updater(prev) : updater);
  }

  return [items, setItems];
}

    getSupabase().then(sb => {
      if (cancelled || !sb) return;
      setSupaReady(true);
      sb.from("lost_records").select("*").order("created_at", { ascending: false }).then(({ data, error }) => {

      });

    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!supaReady || !_supabase) return;
    const sb = _supabase;
    const ch = sb.channel("lost-records-rt")
      .on("postgres_changes", { event: "*", schema: "public", table: "lost_records" }, (payload) => {
        if (payload.eventType === "DELETE") {
          _setItems(prev => prev.filter(r => r.id !== payload.old.id));
        } else {
          const item = rowToLostRecord(payload.new);
          _setItems(prev => {
            const exists = prev.some(r => r.id === item.id);
            // recontactSentはUI専用フラグ（DB非保持）→Realtimeマージ時に保持

          });

      }).subscribe();
    return () => { sb.removeChannel(ch); };
  }, [supaReady]);

  function setItems(updater) {
    _setItems(prev => typeof updater === "function" ? updater(prev) : updater);
  }
  return [items, setItems];
}

// ── SHARED COMPONENTS ─────────────────────────────────────
function RaScoreBar({ score }) {
  const color = score>=80?"#22c55e":score>=65?"#f59e0b":"#ef4444";
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
      <div style={{ flex:1, height:6, background:"#e8edf5", borderRadius:3, overflow:"hidden" }}>
        <div style={{ width:`${score}%`, height:"100%", background:color, borderRadius:3 }}/>
      </div>
      <span style={{ color, fontSize:12, fontFamily:"'DM Mono',monospace", fontWeight:600, minWidth:28 }}>{score}</span>
    </div>
  );
}

// ダッシュボード KPI カテゴリカード
// テレアポ/OI・FF/PC/N成約の4カテゴリを、件数・率・前期比deltで表示
function CategoryCard({ cat }) {
  return (
    <div style={{ background:"#fff", border:`1px solid ${cat.accent}22`, borderRadius:14, padding:"18px 20px", position:"relative", overflow:"hidden", boxShadow:"0 1px 6px #00000008" }}>
      {/* アクセントグロー */}
      <div style={{ position:"absolute",top:0,right:0,width:100,height:100,background:`radial-gradient(circle at 90% 0%,${cat.accent}18 0%,transparent 65%)` }}/>
      {/* 左アクセントライン */}
      <div style={{ position:"absolute",top:0,left:0,width:3,height:"100%",background:`linear-gradient(to bottom,${cat.accent},${cat.accent}44)`,borderRadius:"14px 0 0 14px" }}/>

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, paddingLeft:10 }}>
        <div style={{ fontSize:14, fontWeight:700, color:"#0f172a", letterSpacing:"-0.01em" }}>{cat.category}</div>
        {cat.change===null||cat.change===undefined ? (
          <div style={{ background:"#f1f5f9", borderRadius:20, padding:"3px 8px" }}>
            <span style={{ fontSize:10, color:"#94a3b8" }}>{cat.changeLabel||"比較なし"}</span>
          </div>
        ) : (
          <div style={{ display:"flex", alignItems:"center", gap:3, background:cat.change>=0?"#f0fdf4":"#fef2f2", borderRadius:20, padding:"3px 8px" }}>
            {cat.change>=0?<ArrowUp size={10} color="#22c55e"/>:<ArrowDown size={10} color="#ef4444"/>}
            <span style={{ fontSize:11, color:cat.change>=0?"#16a34a":"#ef4444", fontFamily:"'DM Mono',monospace", fontWeight:700 }}>{cat.change>=0?"+":""}{cat.change}%</span>
            {cat.changeLabel&&<span style={{ fontSize:9, color:cat.change>=0?"#16a34a":"#ef4444", opacity:0.7 }}>{cat.changeLabel}</span>}
          </div>
        )}
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:8, paddingLeft:10 }}>
        {cat.steps.map((step,si)=>(
          <div key={si} style={{ display:"flex", alignItems:"center", gap:8, minWidth:0 }}>
            <span style={{ fontSize:13, fontWeight:700, color:cat.accent, flexShrink:0 }}>{step.no}</span>
            <span style={{ fontSize:11, color:"#94a3b8", flex:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{step.short ?? step.label}</span>
            {step.rate!==null&&<span style={{ fontSize:11, color:cat.accent, fontFamily:"'DM Mono',monospace", fontWeight:700, minWidth:42, textAlign:"right" }}>{step.rate}%</span>}
            <span style={{ fontSize:20, fontWeight:800, color:"#0f172a", fontFamily:"'DM Mono',monospace", letterSpacing:"-0.02em", minWidth:48, textAlign:"right" }}>{step.value}</span>
            <span style={{ fontSize:10, color:"#94a3b8", minWidth:12 }}>件</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ダッシュボード ファネル可視化パネル
// ①→⑦の各ステージ件数を横棒グラフで表示。パイプラインの絞り込みを直感的に把握
function FunnelPanel({ data, label }) {
  const { isMobile } = useResponsive();
  return (
    <div style={{ background:"#fff", border:"1px solid #e8edf5", borderRadius:12, padding:isMobile?"12px 14px":"20px 24px" }}>
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:12, color:"#64748b", letterSpacing:"0.06em" }}>PIPELINE FUNNEL</div>
        <div style={{ fontSize:15, fontWeight:600, color:"#0f172a" }}>{label}</div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {data.map((item,i)=>{
          const base=data[0].value||1;
          const pct=Math.round(item.value/base*100);
          const conv=i>0&&data[i-1].value?Math.round(item.value/data[i-1].value*100):null;
          const showDiv=i>0&&item.category!==data[i-1].category;
          return (
            <div key={i}>
              {showDiv&&<div style={{ borderTop:"1px dashed #1e293b", margin:"4px 0 8px" }}/>}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:item.fill }}>{item.no}</span>
                  <span style={{ fontSize:12, color:"#64748b" }}>{item.name}</span>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  {conv!==null&&<span style={{ fontSize:10, color:"#64748b", fontFamily:"'DM Mono',monospace" }}>↓{conv}%</span>}
                  <span style={{ fontSize:13, fontWeight:700, color:"#0f172a", fontFamily:"'DM Mono',monospace" }}>{item.value}</span>
                  <span style={{ fontSize:10, color:"#64748b" }}>件</span>
                </div>
              </div>
              <div style={{ height:7, background:"#e8edf5", borderRadius:4, overflow:"hidden" }}>
                <div style={{ width:`${pct}%`, height:"100%", background:item.fill, borderRadius:4 }}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── CUSTOMER MANAGEMENT: KANBAN CARD ──────────────────────
function CustomerKanbanCard({ customer, onClick, teleapoLists }) {
  const stage = stageMap[customer.stage];
  const raTotal = Object.values(customer.raScore).reduce((a,b)=>a+b,0);
  const raColor = raTotal>=80?"#22c55e":raTotal>=60?"#f59e0b":"#ef4444";
  const tRec = (teleapoLists||[]).find(t=>
    (t.phone && customer.phone && t.phone===customer.phone) ||
    (t.company && customer.company && t.company===customer.company)
  );
  const srcBadge = tRec ? getSourceBadge(tRec.source) : null;
  return (
    <div onClick={onClick} style={{
      background:"#f8faff", border:`1px solid ${stage?.accent}33`,
      borderLeft:`3px solid ${stage?.accent}`, borderRadius:8, padding:"12px 14px",
      cursor:"pointer", marginBottom:8, transition:"all 0.15s",
    }}
    onMouseEnter={e=>{ e.currentTarget.style.background="#eef2ff"; e.currentTarget.style.boxShadow="0 2px 12px #6c5ce722"; }}
    onMouseLeave={e=>{ e.currentTarget.style.background="#f8faff"; e.currentTarget.style.boxShadow="none"; }}
    >
      <div style={{ fontSize:12, fontWeight:700, color:"#0f172a", marginBottom:3 }}>{customer.company}</div>
      <div style={{ fontSize:11, color:"#64748b", marginBottom:8 }}>{customer.contact}・{customer.title}</div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
          <span style={{ fontSize:10, color:"#64748b", background:"#e8edf5", borderRadius:4, padding:"2px 6px" }}>{customer.owner}</span>
          {srcBadge && (
            <span style={{ fontSize:9, fontWeight:700, color:srcBadge.color, background:srcBadge.bg, borderRadius:4, padding:"2px 6px", letterSpacing:"0.01em" }}>
              {srcBadge.label}
            </span>
          )}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:4 }}>
          <span style={{ fontSize:10, color:"#64748b" }}>RA</span>
          <span style={{ fontSize:12, fontWeight:700, color:raColor, fontFamily:"'DM Mono',monospace" }}>{raTotal}</span>
        </div>
      </div>
      {customer.nextAction && (
        <div style={{ marginTop:8, borderTop:"1px solid #e8edf5", paddingTop:6, display:"flex", alignItems:"center", gap:4 }}>
          <Clock size={9} color="#475569"/>
          <span style={{ fontSize:10, color:"#64748b", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
            {customer.nextAction.date} {customer.nextAction.content}
          </span>
        </div>
      )}
    </div>
  );
}

// ── CUSTOMER MANAGEMENT: KANBAN VIEW ─────────────────────
// ①は非表示（テレアポページで管理）
// ②は資料送付TODOが存在する見込客のみボーディング
// ③〜⑦は通常表示
function KanbanView({ customers, onSelect, isAdmin, teleapoLists, clerkTodos=[] }) {
  // ②に表示する顧客: stage=②かつ、その顧客に対する document_send タイプの事務TODOが存在する
  const docSendCustomerIds = useMemo(() => {
    const ids = new Set();
    clerkTodos.forEach(t => {
      if (t.type === "document_send") ids.add(t.customerId);
    });
    return ids;
  }, [clerkTodos]);

  return (
    <div style={{ display:"flex", gap:12, overflowX:"auto", padding:"4px 0 12px", minHeight:0, flex:1 }}>
      {STAGES.filter(stage=>stage.no!=="①").map(stage=>{
        const isStage2 = stage.no === "②";
        // ②の場合: 資料送付TODOが存在する顧客のみ
        const cols = isStage2
          ? customers.filter(c=>c.stage===stage.no && docSendCustomerIds.has(c.id))
          : customers.filter(c=>c.stage===stage.no);
        return (
          <div key={stage.no} style={{ width:220, flexShrink:0, display:"flex", flexDirection:"column" }}>
            <div style={{ background:"#fff", border:`1px solid ${stage.accent}33`, borderRadius:"8px 8px 0 0", padding:"10px 14px", marginBottom:0, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:13, fontWeight:700, color:stage.accent }}>{stage.no}</span>
                <span style={{ fontSize:11, color:"#64748b", fontWeight:600 }}>
                  {isStage2 ? "資料送付済" : stage.short}
                </span>
              </div>
              <span style={{ fontSize:11, color:stage.accent, fontFamily:"'DM Mono',monospace", fontWeight:700 }}>{cols.length}</span>
            </div>
            <div style={{ flex:1, overflowY:"auto", background:"#f0f4ff", border:`1px solid ${stage.accent}22`, borderTop:"none", borderRadius:"0 0 8px 8px", padding:"8px 8px 4px" }}>
              {cols.length===0
                ? <div style={{ textAlign:"center", color:"#1e293b", fontSize:11, padding:"24px 0" }}>なし</div>
                : cols.map(c=><CustomerKanbanCard key={c.id} customer={c} onClick={()=>onSelect(c)} teleapoLists={teleapoLists}/>)
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── CUSTOMER MANAGEMENT: LIST VIEW ───────────────────────
function ListView({ customers, onSelect, isAdmin, onImportCSV }) {
  const [sortKey, setSortKey] = useState("company");
  const [sortDir, setSortDir] = useState("asc");
  const fileRef = useRef();

  function toggleSort(key) {
    if (sortKey===key) setSortDir(d=>d==="asc"?"desc":"asc");
    else { setSortKey(key); setSortDir("asc"); }
  }

  const sorted = [...customers].sort((a,b)=>{
    let av = a[sortKey]||"", bv = b[sortKey]||"";
    if (typeof av === "number") return sortDir==="asc"?av-bv:bv-av;
    return sortDir==="asc"?av.localeCompare(bv,"ja"):bv.localeCompare(av,"ja");
  });

  function handleCSV(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      const lines = evt.target.result.split("\n").filter(l=>l.trim());
      const headers = lines[0].split(",").map(h=>h.trim().replace(/"/g,""));
      const newRows = lines.slice(1).map((line,idx)=>{
        const vals = line.split(",").map(v=>v.trim().replace(/"/g,""));
        const obj = Object.fromEntries(headers.map((h,i)=>[h,vals[i]||""]));
        return {
          id: Date.now()+idx,
          company:    obj["会社名"]||"",
          contact:    obj["担当者名"]||"",
          title:      obj["役職"]||"",
          email:      obj["メール"]||"",
          phone:      obj["電話"]||"",
          owner:      obj["担当者"]||"",
          industry:   obj["業種"]||"",
          employees:  obj["従業員数"]||"",
          prefecture: obj["都道府県"]||"",
          stage:      obj["ステージ"]||"①",
          createdAt:  new Date().toISOString().slice(0,10),
          stageHistory:[{ stage:obj["ステージ"]||"①", date:new Date().toISOString().slice(0,10), note:"CSV取込", by:obj["担当者"]||"" }],
          nextAction: null,
          notes:      [],
          raScore:    { teleapo:0,oi:0,ff:0,pc:0,closing:0,follow:0,attitude:0,process:0 },
        };
      }).filter(r=>r.company);
      onImportCSV(newRows);
    };
    reader.readAsText(file,"UTF-8");
    e.target.value="";
  }

  const TH = ({k,label,w})=>(
    <th onClick={()=>toggleSort(k)} style={{ padding:"10px 12px", fontSize:11, color:sortKey===k?"#DC2626":"#64748b", cursor:"pointer", userSelect:"none", fontWeight:600, letterSpacing:"0.06em", whiteSpace:"nowrap", width:w }}>
      {label}{sortKey===k&&<span style={{ marginLeft:3 }}>{sortDir==="asc"?"↑":"↓"}</span>}
    </th>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1, minHeight:0 }}>
      <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:10, gap:8 }}>
        <input ref={fileRef} type="file" accept=".csv" style={{ display:"none" }} onChange={handleCSV}/>
        <button onClick={()=>fileRef.current.click()} style={{ display:"flex", alignItems:"center", gap:6, background:"none", border:"1px solid #e8edf5", borderRadius:8, color:"#64748b", fontSize:12, padding:"0 14px", height:34, cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif" }}>
          <Upload size={13}/>CSV読込
        </button>
      </div>
      <div style={{ flex:1, overflowY:"auto", background:"#fff", border:"1px solid #e8edf5", borderRadius:10 }}>
        <table style={{ width:"100%", borderCollapse:"collapse" }}>
          <thead style={{ position:"sticky", top:0, background:"#fff", zIndex:1, borderBottom:"1px solid #e8edf5" }}>
            <tr>
              <TH k="company"    label="会社名"   w={180}/>
              <TH k="contact"    label="担当者"   w={100}/>
              <TH k="stage"      label="ステージ" w={80}/>
              <TH k="owner"      label="担当"     w={70}/>
              <TH k="prefecture" label="都道府県" w={80}/>
              <TH k="industry"   label="業種"     w={120}/>
              <TH k="employees"  label="従業員数" w={80}/>
              <th style={{ padding:"10px 12px", fontSize:11, color:"#64748b", width:60 }}>RAスコア</th>
              <th style={{ padding:"10px 12px", fontSize:11, color:"#64748b", width:140 }}>次のアクション</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((c,i)=>{
              const stage = stageMap[c.stage];
              const raTotal = Object.values(c.raScore).reduce((a,b)=>a+b,0);
              const raColor = raTotal>=80?"#22c55e":raTotal>=60?"#f59e0b":"#ef4444";
              return (
                <tr key={c.id} onClick={()=>onSelect(c)}
                  style={{ cursor:"pointer", borderBottom:"1px solid #e8edf5", background:i%2===0?"transparent":"#f8faff" }}
                  onMouseEnter={e=>e.currentTarget.style.background="#f0f4ff"}
                  onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"transparent":"#f8faff"}
                >
                  <td style={{ padding:"10px 12px", fontSize:12, color:"#0f172a", fontWeight:600 }}>{c.company}</td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"#64748b" }}>{c.contact}</td>
                  <td style={{ padding:"10px 12px" }}>
                    <span style={{ fontSize:13, fontWeight:700, color:stage?.accent }}>{stage?.no} {stage?.short}</span>
                  </td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"#64748b" }}>{c.owner}</td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"#64748b" }}>{c.prefecture}</td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"#64748b" }}>{c.industry}</td>
                  <td style={{ padding:"10px 12px", fontSize:11, color:"#64748b", fontFamily:"'DM Mono',monospace", textAlign:"right" }}>{c.employees.toLocaleString()}</td>
                  <td style={{ padding:"10px 12px", textAlign:"center" }}>
                    <span style={{ fontSize:12, fontWeight:700, color:raColor, fontFamily:"'DM Mono',monospace" }}>{raTotal}</span>
                  </td>
                  <td style={{ padding:"10px 12px", fontSize:10, color:"#64748b", maxWidth:140, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {c.nextAction ? `${c.nextAction.date} ${c.nextAction.content}` : "—"}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── CUSTOMER DETAIL PANEL ─────────────────────────────────
// 見込客の全情報を閲覧・編集するスライドパネル。
// ■ タブ構成: 基本情報 / ステージ履歴 / 次のアクション / メモ / RAスコア / BB診断
// ■ ステージ変更:
//   - 上部のクイックチェンジバーでワンクリック変更
//   - ③④⑤⑥へ変更時 → 事務TODO「お礼メール」を自動生成
//   - 変更後に「追加の事務依頼はありますか？」パネルが展開（案B）
// ■ 事務依頼ボタン:
//   - member/admin が任意のタイミングで事務TODOを手動生成（案A）
//   - タスク種別: 資料送付 / 契約書類 / 請求書 / スケジュール調整 / その他
// ■ 担当者変更: 引き継ぎ履歴を ownerHistory に記録
function CustomerDetailPanel({ customer, onClose, onUpdate, onLostRequest, teleapoLists, onCreateTodo, user }) {
  const [tab, setTab] = useState(0);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ ...customer });
  const [noteText, setNoteText] = useState("");
  const [raForm, setRaForm] = useState({ ...customer.raScore });
  const [actionForm, setActionForm] = useState(customer.nextAction || { date:"", time:"", content:"", reminder:false });
  // 担当者変更
  const [showOwnerChange, setShowOwnerChange] = useState(false);
  const [ownerChangeForm, setOwnerChangeForm] = useState({ newOwner:"", note:"" });
  // BB診断
  const [bbIdInput, setBbIdInput] = useState(customer.bbId || "");
  const [bbSaved, setBbSaved] = useState(false);
  // 事務依頼モーダル
  const [showClerkReq, setShowClerkReq] = useState(false);
  const [clerkReqForm, setClerkReqForm] = useState({ type:"document_send", memo:"" });
  // 事務TODO自動生成の通知
  const [todoNotif, setTodoNotif] = useState(null);
  // ステージ変更後の追加事務依頼パネル（案B: ステージ変更モーダルのチェックボックス）
  const [stageExtraTasks, setStageExtraTasks] = useState(null); // { stage, checks: { document_send, contract, schedule, other }, otherMemo }

  // 事務依頼タスク種別定義
  const CLERK_TASK_TYPES = [
    { key:"document_send", label:"資料送付" },
    { key:"contract",      label:"契約書類準備・送付" },
    { key:"invoice",       label:"請求書発行" },
    { key:"schedule",      label:"スケジュール調整" },
    { key:"other",         label:"その他" },
  ];

  const tabs = ["基本情報","ステージ履歴","次のアクション","メモ","RAスコア","BB診断"];
  const raTotal = Object.values(raForm).reduce((a,b)=>a+b,0);
  const raMax = RA_PHASES.reduce((a,p)=>a+p.max,0);
  const raColor = raTotal>=80?"#22c55e":raTotal>=60?"#f59e0b":"#ef4444";

  function saveBasic() {
    onUpdate({ ...customer, ...form });
    setEditing(false);
  }
  function addNote() {
    if (!noteText.trim()) return;
    const updated = { ...customer, notes:[...customer.notes, { id:Date.now(), date:new Date().toISOString().slice(0,10), content:noteText.trim(), by:"自分" }] };
    onUpdate(updated);
    setNoteText("");
  }
  function saveRA() {
    onUpdate({ ...customer, raScore:raForm });
  }
  function saveAction() {
    if (!actionForm.content.trim() && !actionForm.date) return;
    const today = new Date().toISOString().slice(0,10);
    const logEntry = {
      id: Date.now(),
      date: today,
      actionDate: actionForm.date,
      actionTime: actionForm.time,
      content: actionForm.content,
      reminder: actionForm.reminder,
      by: customer.owner || "自分",
    };
    onUpdate({
      ...customer,
      nextAction: actionForm,
      actionLogs: [...(customer.actionLogs||[]), logEntry],
    });
  }
  function changeStage(newStage) {
    const today = new Date().toISOString().slice(0,10);
    const updated = {
      ...customer,
      stage:newStage,
      stageHistory:[...customer.stageHistory, { stage:newStage, date:today, note:"ステージ更新", by: user?.name || "自分" }]
    };
    onUpdate(updated);
    setForm({...form, stage:newStage});
    // ── 事務TODO自動生成: ③④⑤⑥でお礼メール ──
    const AUTO_TODO_STAGES = new Set(["③","④","⑤","⑥"]);
    if (AUTO_TODO_STAGES.has(newStage) && onCreateTodo) {
      onCreateTodo({
        customerId: customer.id, company: customer.company,
        contact: customer.contact, email: customer.email,
        owner: customer.owner, type: "thanks_email",
        triggerStage: newStage, memo: "",
      });
      setTodoNotif(`${stageMap[newStage]?.label || newStage} お礼メールを事務TODOに追加しました`);
      setTimeout(() => setTodoNotif(null), 4000);
      // ── 案B: 追加事務依頼パネルを表示 ──
      setStageExtraTasks({
        stage: newStage,
        checks: { document_send:false, contract:false, schedule:false, other:false },
        otherMemo: "",
      });
    }
  }
  // ── 追加事務依頼を一括送信 ──
  function submitExtraTasks() {
    if (!stageExtraTasks || !onCreateTodo) return;
    const { checks, otherMemo } = stageExtraTasks;
    const base = { customerId:customer.id, company:customer.company, contact:customer.contact, email:customer.email, owner:customer.owner };
    if (checks.document_send) onCreateTodo({ ...base, type:"document_send", triggerStage:stageExtraTasks.stage, memo:"" });
    if (checks.contract)      onCreateTodo({ ...base, type:"contract",      triggerStage:stageExtraTasks.stage, memo:"" });
    if (checks.schedule)      onCreateTodo({ ...base, type:"schedule",      triggerStage:stageExtraTasks.stage, memo:"" });
    if (checks.other)         onCreateTodo({ ...base, type:"other",         triggerStage:stageExtraTasks.stage, memo:otherMemo });
    const count = Object.values(checks).filter(Boolean).length;
    if (count > 0) {
      setTodoNotif(`追加の事務依頼 ${count}件 を送信しました`);
      setTimeout(() => setTodoNotif(null), 3000);
    }
    setStageExtraTasks(null);
  }
  // ── 事務依頼を手動送信 ──
  function submitClerkRequest() {
    if (!onCreateTodo) return;
    onCreateTodo({
      customerId: customer.id, company: customer.company,
      contact: customer.contact, email: customer.email,
      owner: customer.owner, type: clerkReqForm.type,
      triggerStage: null, memo: clerkReqForm.memo,
    });
    setShowClerkReq(false);
    setClerkReqForm({ type:"document_send", memo:"" });
    setTodoNotif("事務依頼を送信しました");
    setTimeout(() => setTodoNotif(null), 3000);
  }
  function confirmOwnerChange() {
    if (!ownerChangeForm.newOwner || !ownerChangeForm.note.trim()) return;
    const today = new Date().toISOString().slice(0,10);
    const history = customer.ownerHistory || [];
    const updated = {
      ...customer,
      owner: ownerChangeForm.newOwner,
      ownerHistory: [...history, {
        from: customer.owner,
        to: ownerChangeForm.newOwner,
        date: today,
        note: ownerChangeForm.note.trim(),
        by: "自分",
      }],
    };
    onUpdate(updated);
    setForm({ ...form, owner: ownerChangeForm.newOwner });
    setOwnerChangeForm({ newOwner:"", note:"" });
    setShowOwnerChange(false);
  }
  function saveBbId() {
    onUpdate({ ...customer, bbId: bbIdInput.trim() || null });
    setBbSaved(true);
    setTimeout(() => setBbSaved(false), 2000);
  }

  const inputStyle = { background:"#f8faff", border:"1px solid #e8edf5", borderRadius:6, padding:"8px 10px", fontSize:12, color:"#0f172a", width:"100%", fontFamily:"'Noto Sans JP',sans-serif", outline:"none", boxSizing:"border-box" };
  const labelStyle = { fontSize:10, color:"#64748b", letterSpacing:"0.06em", marginBottom:4, display:"block" };

  const currentStage = stageMap[customer.stage];

  return (
    <div style={{ width:460, borderLeft:"1px solid #e8edf5", background:"#fff", display:"flex", flexDirection:"column", height:"100%", flexShrink:0 }}>
      {/* Header */}
      <div style={{ padding:"16px 20px", borderBottom:"1px solid #e8edf5", display:"flex", alignItems:"flex-start", gap:12 }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
            <span style={{ fontSize:11, fontWeight:700, color:currentStage?.accent, background:currentStage?.bg, borderRadius:4, padding:"2px 8px" }}>
              {currentStage?.no} {currentStage?.label}
            </span>
            {customer.nextAction?.urgent && <AlertCircle size={12} color="#ef4444"/>}
          </div>
          <div style={{ fontSize:15, fontWeight:700, color:"#0f172a", marginBottom:2 }}>{customer.company}</div>
          <div style={{ fontSize:11, color:"#64748b" }}>{customer.contact}・{customer.title} ／ 担当:{customer.owner}</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
          {onCreateTodo && user?.role !== "clerk" && (
            <button onClick={()=>setShowClerkReq(true)} style={{
              background:"#3b82f618", border:"1px solid #3b82f633", borderRadius:6,
              color:"#3b82f6", fontSize:10, fontWeight:600, padding:"4px 8px", cursor:"pointer",
              fontFamily:"'Noto Sans JP',sans-serif", whiteSpace:"nowrap",
            }}>
              事務依頼
            </button>
          )}
          <button onClick={()=>onLostRequest&&onLostRequest(customer)} style={{
            background:"#ef444418", border:"1px solid #ef444433", borderRadius:6,
            color:"#ef4444", fontSize:10, fontWeight:600, padding:"4px 8px", cursor:"pointer",
            fontFamily:"'Noto Sans JP',sans-serif", whiteSpace:"nowrap",
          }}>
            失注申請
          </button>
          <button onClick={onClose} style={{ background:"none", border:"none", cursor:"pointer", color:"#64748b", padding:4, borderRadius:4 }}>
            <X size={16}/>
          </button>
        </div>
      </div>

      {/* Stage quick-change */}
      <div style={{ padding:"8px 20px", borderBottom: stageExtraTasks ? "none" : "1px solid #e8edf5", display:"flex", gap:4, overflowX:"auto" }}>
        {STAGES.map(s=>(
          <button key={s.no} onClick={()=>changeStage(s.no)} style={{
            flexShrink:0, padding:"3px 8px", fontSize:10, fontWeight:700, borderRadius:4, border:"none", cursor:"pointer",
            background:customer.stage===s.no?s.bg:"transparent",
            color:customer.stage===s.no?s.accent:"#334155",
            outline:customer.stage===s.no?`1px solid ${s.accent}55`:"none",
          }}>
            {s.no}
          </button>
        ))}
      </div>

      {/* ── 案B: ステージ変更後の追加事務依頼パネル ── */}
      {stageExtraTasks && onCreateTodo && user?.role !== "clerk" && (
        <div style={{
          padding:"10px 20px 12px", borderBottom:"1px solid #e8edf5",
          background:"#eff6ff", animation:"fadeIn 0.2s",
        }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <div style={{ fontSize:11, fontWeight:600, color:"#1d4ed8" }}>追加の事務依頼はありますか？</div>
            <button onClick={()=>setStageExtraTasks(null)} style={{ background:"none", border:"none", cursor:"pointer", color:"#94a3b8", fontSize:10 }}>
              スキップ
            </button>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
            {[
              { key:"document_send", label:"資料送付" },
              { key:"contract",      label:"契約書類準備" },
              { key:"schedule",      label:"スケジュール調整" },
              { key:"other",         label:"その他" },
            ].map(t => (
              <label key={t.key} style={{
                display:"flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:6,
                fontSize:11, cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif",
                background: stageExtraTasks.checks[t.key] ? "#dbeafe" : "#fff",
                border: stageExtraTasks.checks[t.key] ? "1px solid #3b82f6" : "1px solid #e8edf5",
                color: stageExtraTasks.checks[t.key] ? "#1d4ed8" : "#475569",
                fontWeight: stageExtraTasks.checks[t.key] ? 600 : 400,
              }}>
                <input type="checkbox" checked={stageExtraTasks.checks[t.key]}
                  onChange={e => setStageExtraTasks(prev => ({
                    ...prev, checks:{ ...prev.checks, [t.key]: e.target.checked }
                  }))}
                  style={{ width:14, height:14, accentColor:"#3b82f6" }}/>

// ── LOST BOX PAGE ─────────────────────────────────────────
// 失注した見込客の管理ページ。
// ■ 設計思想:
//   - 管理者は失注申請の承認/却下を行う（ApprovalPanel）
//   - 承認後の失注顧客を月次トレンド（棒=失注数/折れ線=失注率・追客昇格数）で可視化
//   - 失注理由のカテゴリ別・ステージ別分析を提供
//   - 追客リストへの転送機能で再アプローチの起点にする
//   - 月次集計は lastStageDate（最終ステージ到達日）で帰属させる
//     （lostDateだとレビュー承認待ちのラグで月がズレるため）
// 月次ラベル生成ユーティリティ

function LostBoxPage({ lostList, requests, isAdmin, onApprove, onReject, onUpdate, onSendToRecontact, customers=[] }) {
  const { isMobile, isTablet } = useResponsive();
  const [subTab, setSubTab] = useState(isAdmin?"approval":"lost");
  const [filterCat, setFilterCat]     = useState("all");
  const [filterOwner, setFilterOwner] = useState("all");
  const [editingId, setEditingId]     = useState(null);
  const [editForm, setEditForm]       = useState({});
  const [adminNote, setAdminNote]     = useState("");
  const [addingNoteId, setAddingNoteId] = useState(null);
  // 分析用期間フィルタ
  const [rangePreset, setRangePreset] = useState("3m"); // 1m / 3m / 6m / 12m / custom
  const [customFrom, setCustomFrom]   = useState("");
  const [customTo, setCustomTo]       = useState("");
  const [anaOwner, setAnaOwner]       = useState("all");

  const owners = [...new Set(lostList.map(l=>l.owner))];

  // ── 期間計算 ──
  const today = new Date().toISOString().slice(0,10);
  function getRangeFrom() {
    if (rangePreset==="custom") return customFrom || "2000-01-01";
    const months = { "1m":1, "3m":3, "6m":6, "12m":12 }[rangePreset] || 3;
    const d = new Date();
    d.setMonth(d.getMonth() - months);
    return d.toISOString().slice(0,10);
  }
  function getRangeTo() {
    return rangePreset==="custom" && customTo ? customTo : today;
  }

  const rangeFrom = getRangeFrom();
  const rangeTo   = getRangeTo();

  // 一覧フィルタ（期間は問わず）
  const filtered = lostList.filter(l=>{
    const matchC = filterCat==="all"  || l.category===filterCat;
    const matchO = filterOwner==="all" || l.owner===filterOwner;
    return matchC && matchO;
  });

  // 分析対象（期間 + 担当者）
  const anaList = lostList.filter(l=>{
    const d = l.lostDate||"";
    const matchDate  = d >= rangeFrom && d <= rangeTo;
    const matchOwner = anaOwner==="all" || l.owner===anaOwner;
    return matchDate && matchOwner;
  });

  function startEdit(r) {
    setEditingId(r.id);
    setEditForm({ category:r.category, reason:r.reason, detail:r.detail, recontactDate:r.recontactDate||"", owner:r.owner });
  }
  function saveEdit(id) {
    const selCat = LOST_CATEGORIES.find(c=>c.key===editForm.category);
    const validReason = selCat?.options.includes(editForm.reason) ? editForm.reason : selCat?.options[0] || editForm.reason;
    onUpdate && onUpdate({ id, ...editForm, reason:validReason });
    setEditingId(null);
  }
  function addAdminNote(id) {
    if (!adminNote.trim()) return;
    onUpdate && onUpdate({ id, _addNote:{ text:adminNote.trim(), by:"管理者", date:new Date().toISOString().slice(0,10) } });
    setAdminNote(""); setAddingNoteId(null);
  }

  // ── 分析集計 ── (anaListベース)
  const total = anaList.length;

  // カテゴリ別
  const byCat = LOST_CATEGORIES.map(c=>({
    ...c,
    count: anaList.filter(l=>l.category===c.key).length,
    items: anaList.filter(l=>l.category===c.key),
  }));

  // 失注理由の詳細（各カテゴリ内のoption別集計）
  const reasonDetail = LOST_CATEGORIES.map(c=>({
    ...c,
    options: c.options.map(opt=>({
      label: opt,
      count: anaList.filter(l=>l.category===c.key && l.reason===opt).length,
    })).filter(o=>o.count>0).sort((a,b)=>b.count-a.count),
  })).filter(c=>c.options.length>0);

  // ステージ別
  const byStage = ["①","②","③","④","⑤","⑥"].map(s=>({
    stage:s, label:stageMap[s]?.short||s, color:stageMap[s]?.accent||"#475569",
    count: anaList.filter(l=>l.lastStage===s).length,
  }));
  const maxStageCount = Math.max(...byStage.map(s=>s.count), 1);

  // 担当者別
  const byOwner = [...new Set(lostList.map(l=>l.owner))].map(o=>({
    name:o,
    count: anaList.filter(l=>l.owner===o).length,
    stages: ["①","②","③","④","⑤","⑥"].map(s=>anaList.filter(l=>l.owner===o&&l.lastStage===s).length),
  })).filter(o=>o.count>0).sort((a,b)=>b.count-a.count);
  const maxOwnerCount = Math.max(...byOwner.map(o=>o.count), 1);

  // 月別トレンド（過去6ヶ月分）
  const trendMonths = Array.from({length:6},(_,i)=>{
    const d = new Date(); d.setMonth(d.getMonth()-5+i);
    return d.toISOString().slice(0,7);
  });
  const byMonth = trendMonths.map(m=>({
    month: m.slice(5)+"月",
    full:  m,
    count: lostList.filter(l=>(l.lostDate||"").startsWith(m)).length,
  }));
  const maxMonthCount = Math.max(...byMonth.map(m=>m.count), 1);

  // 追客予定（rangeに関係なく全件）
  const recontactPending = lostList
    .filter(l=>l.recontactDate && l.recontactDate >= today)
    .sort((a,b)=>a.recontactDate.localeCompare(b.recontactDate))
    .slice(0,5);

  // ── recharts 用データ整形 ──
  // 月別推移（12ヶ月）
  const trendMonths12 = Array.from({length:12},(_,i)=>{
    const d = new Date(); d.setMonth(d.getMonth()-11+i);
    return d.toISOString().slice(0,7);
  });
  const monthlyData = trendMonths12.map(m=>{

                      <Line yAxisId="left" type="monotone" dataKey="追客昇格" stroke="#22c55e" strokeWidth={2} dot={{ fill:"#22c55e", r:3 }}/>
                      <Line yAxisId="right" type="monotone" dataKey="失注率" stroke="#f97316" strokeWidth={2} strokeDasharray="5 3" dot={{ fill:"#f97316", r:3 }} connectNulls={false}/>
                    </ComposedChart>
                  </ResponsiveContainer>
                </div>

                {/* ── ② カテゴリ別Pie + ステージ別横棒 ── */}
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>

                  {/* Pie チャート */}
                  <div style={{ background:"#f8faff", border:"1px solid #e8edf5", borderRadius:12, padding:"16px 20px" }}>
                    <div style={{ fontSize:11, color:"#64748b", fontWeight:600, letterSpacing:"0.06em", marginBottom:4 }}>失注カテゴリ構成</div>
                    {pieData.length===0
                      ? <div style={{ color:"#334155", fontSize:12, padding:"20px 0", textAlign:"center" }}>データなし</div>
                      : (
                        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                          <ResponsiveContainer width={140} height={140}>
                            <PieChart>
                              <Pie data={pieData} cx="50%" cy="50%" innerRadius={36} outerRadius={60}
                                dataKey="value" paddingAngle={2} stroke="none">
                                {pieData.map((entry,i)=><Cell key={i} fill={entry.color}/>)}

                              <Tooltip contentStyle={{ background:"#fff", border:"1px solid #e8edf5", borderRadius:8, fontSize:11 }}

                          <div style={{ flex:1, display:"flex", flexDirection:"column", gap:6 }}>

                  {/* ステージ別横棒 */}
                  <div style={{ background:"#f8faff", border:"1px solid #e8edf5", borderRadius:12, padding:"16px 20px" }}>

                    {stageBarData.length===0
                      ? <div style={{ color:"#334155", fontSize:12, padding:"20px 0", textAlign:"center" }}>データなし</div>
                      : (
                        <ResponsiveContainer width="100%" height={160}>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>

                  {/* 担当者別積み上げ */}
                  <div style={{ background:"#f8faff", border:"1px solid #e8edf5", borderRadius:12, padding:"16px 20px" }}>

                      : (

                            <Legend wrapperStyle={{ fontSize:10, color:"#64748b", paddingTop:8 }}/>

                              <Bar key={c.key} dataKey={c.label} stackId="a" fill={c.color} radius={[0,0,0,0]}/>

                          </BarChart>

                  </div>

                  {/* Radarチャート */}
                  <div style={{ background:"#f8faff", border:"1px solid #e8edf5", borderRadius:12, padding:"16px 20px" }}>
                    <div style={{ fontSize:11, color:"#64748b", fontWeight:600, letterSpacing:"0.06em", marginBottom:4 }}>担当者別 失注傾向レーダー</div>
                    {radarOwners.length===0
                      ? <div style={{ color:"#334155", fontSize:12, padding:"20px 0", textAlign:"center" }}>担当者データなし</div>
                      : (
                        <ResponsiveContainer width="100%" height={180}>
                          <RadarChart data={radarData}>
                            <PolarGrid stroke="#e8edf5"/>

                            <Legend wrapperStyle={{ fontSize:10, color:"#64748b" }}/>
                            <Tooltip contentStyle={{ background:"#fff", border:"1px solid #e8edf5", borderRadius:8, fontSize:11 }}
                              itemStyle={{ color:"#0f172a" }}/>
                          </RadarChart>
                        </ResponsiveContainer>
                      )
                    }
                  </div>
                </div>

                {/* ── ④ 失注理由ドリルダウン ── */}
                <div style={{ background:"#f8faff", border:"1px solid #e8edf5", borderRadius:12, padding:"16px 20px", marginBottom:16 }}>
                  <div style={{ fontSize:11, color:"#64748b", fontWeight:600, letterSpacing:"0.06em", marginBottom:14 }}>失注理由 詳細内訳</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                    {reasonDetail.map(cat=>(
                      <div key={cat.key} style={{ background:"#fff", borderRadius:8, padding:"12px 14px" }}>
                        <div style={{ fontSize:11, color:cat.color, fontWeight:700, marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
                          <span style={{ background:cat.color+"22", borderRadius:4, padding:"1px 8px" }}>{cat.label}</span>
                          <span style={{ color:"#64748b", fontSize:10 }}>{cat.options.reduce((s,o)=>s+o.count,0)}件</span>
                        </div>
                        {cat.options.map(opt=>(
                          <div key={opt.label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                            <span style={{ fontSize:11, color:"#64748b" }}>{opt.label}</span>
                            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                              <div style={{ width:60, height:4, background:"#e8edf5", borderRadius:2, overflow:"hidden" }}>
                                <div style={{ width:`${Math.min(opt.count/Math.max(total,1)*100*3,100)}%`, height:"100%", background:cat.color, borderRadius:2 }}/>
                              </div>
                              <span style={{ fontSize:11, fontWeight:700, color:"#0f172a", fontFamily:"'DM Mono',monospace", minWidth:20, textAlign:"right" }}>{opt.count}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    ))}
                    {reasonDetail.length===0&&(
                      <div style={{ gridColumn:"1/-1", textAlign:"center", color:"#334155", fontSize:12, padding:"20px 0" }}>データなし</div>
                    )}
                  </div>
                </div>

                {/* ── ⑤ 追客予定 ── */}
                <div style={{ background:"#f8faff", border:"1px solid #60a5fa22", borderRadius:12, padding:"16px 20px", marginBottom:16 }}>
                  <div style={{ fontSize:11, color:"#6c5ce7", fontWeight:600, letterSpacing:"0.06em", marginBottom:14 }}><Calendar size={12} color="#60a5fa"/>追客予定（直近5件）</div>
                  {recontactPending.length===0
                    ? <div style={{ color:"#334155", fontSize:12 }}>追客予定なし</div>
                    : (
                      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:10 }}>
                        {recontactPending.map(r=>{
                          const cat = LOST_CATEGORIES.find(c=>c.key===r.category);
                          const daysLeft = Math.ceil((new Date(r.recontactDate)-new Date())/(1000*60*60*24));
                          return (
                            <div key={r.id} style={{ background:"#fff", border:`1px solid ${daysLeft<=30?"#f59e0b44":"#e8edf5"}`, borderRadius:8, padding:"10px 12px" }}>
                              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                                <span style={{ fontSize:12, fontWeight:700, color:"#0f172a" }}>{r.company}</span>
                                <span style={{ fontSize:10, color:daysLeft<=30?"#f59e0b":"#60a5fa", fontWeight:700, fontFamily:"'DM Mono',monospace" }}>
                                  {daysLeft<=0?"今日":daysLeft<=7?`${daysLeft}日後`:r.recontactDate}
                                </span>
                              </div>
                              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                                <span style={{ fontSize:10, color:cat?.color, background:cat?.color+"22", borderRadius:3, padding:"1px 6px" }}>{cat?.label}</span>
                                <span style={{ fontSize:10, color:"#64748b" }}>{r.owner}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )
                  }
                </div>

                {/* ── ⑥ インサイト ── */}
                <div style={{ background:"#f8faff", border:"1px solid #a78bfa33", borderRadius:12, padding:"16px 20px" }}>
                  <div style={{ fontSize:11, color:"#a78bfa", fontWeight:600, letterSpacing:"0.06em", marginBottom:12 }}><Zap size={12} color="#a78bfa"/>インサイト</div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {[...[...byCat].filter(c=>c.count>0).sort((a,b)=>b.count-a.count).slice(0,2).map((c,i)=>({
                      bullet: String(i+1)+".", color: c.color,
                      text: `失注の${Math.round(c.count/total*100)}%が「${c.label}」。`
                        + (c.key==="timing"     ? " 提案タイミングの見直しと計画段階での早期接触が有効です。" : "")
                        + (c.key==="competitor" ? " 競合との差別化訴求（断捨離採用の独自性）を強化しましょう。" : "")
                        + (c.key==="needs"      ? " BB診断の必要性を感じてもらうための問診設計を見直しましょう。" : "")
                        + (c.key==="relation"   ? " 担当者異動時の引き継ぎ先確認フローを整備しましょう。" : "")
                        + (c.key==="other"      ? " 詳細理由の記録を徹底し、パターン分析を進めましょう。" : ""),
                    })),
                    ...[...byStage].sort((a,b)=>b.count-a.count).slice(0,1).filter(s=>s.count>0).map(s=>({
                      bullet:"→", color:"#a78bfa",
                      text: `最多失注ステージは${s.stage}（${s.label}）— ${s.count}件。`
                        + (s.stage==="①" ? " テレアポスクリプトの改善が優先課題です。" : "")
                        + (s.stage==="②" ? " 接触後の次アクション設定を徹底しましょう。" : "")
                        + (s.stage==="③" ? " アポ後のOI準備を強化しましょう。" : "")
                        + ((s.stage==="④"||s.stage==="⑤") ? " 問診の質と深さを見直す余地があります。" : "")
                        + (s.stage==="⑥" ? " クロージング力の強化が必要です。" : ""),
                    }))].map((ins,i)=>(
                      <div key={i} style={{ display:"flex", gap:8, padding:"8px 12px", background:"#f8faff", borderRadius:8, border:`1px solid ${ins.color}22` }}>
                        <span style={{ color:ins.color, fontWeight:700, minWidth:14, fontSize:11 }}>{ins.bullet}</span>
                        <span style={{ fontSize:11, color:"#64748b", lineHeight:1.7 }}>{ins.text}</span>
                      </div>
                    ))
                    }
                  </div>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── RECONTACT PAGE ───────────────────────────────────────
// 失注BOXから「追客」判定された顧客を再アプローチするためのリスト。
// ステージ①からリスタートし、追客専用のカンバン + KPIバッジで管理。
// 再度失注した場合は onRelost で失注BOXに再投入。
function RecontactPage({ user, recontacts, setRecontacts, isAdmin, onRelost }) {
  const { isMobile, isTablet } = useResponsive();
  const [selected, setSelected]         = useState(null);
  const [tab, setTab]                   = useState(0);
  const [viewMode, setViewMode]         = useState("kanban");
  const [filterOwner, setFilterOwner]   = useState("all");
  const [filterStatus, setFilterStatus] = useState("active");
  const [showRelostModal, setShowRelostModal] = useState(false);
  const [relostForm, setRelostForm]     = useState({ catKey:"", reason:"", detail:"" });
  const [noteText, setNoteText]         = useState("");
  const [actionForm, setActionForm]     = useState({ date:"", time:"", content:"", reminder:false });
  const [searchText, setSearchText]     = useState("");
  // 期間検索
  const [dateField, setDateField]       = useState("recontactStartDate"); // recontactStartDate | nextAction.date | prevLostDate
  const [dateFrom, setDateFrom]         = useState("");
  const [dateTo, setDateTo]             = useState("");
  const [showDateFilter, setShowDateFilter] = useState(false);

  const myList = isAdmin ? recontacts : recontacts.filter(r=>r.owner===user.name);
  const owners = [...new Set(recontacts.map(r=>r.owner))];

  // 期間対象の日付値を取り出すヘルパー
  function getDateVal(r) {
    if (dateField==="recontactStartDate") return r.recontactStartDate||"";
    if (dateField==="nextAction.date")    return r.nextAction?.date||"";
    if (dateField==="prevLostDate")       return r.prevLostDate||"";
    return "";
  }

  const filtered = myList.filter(r=>{
    const matchO = filterOwner==="all"  || r.owner===filterOwner;
    const matchS = filterStatus==="all" || r.status===filterStatus;
    const q = searchText.toLowerCase();
    const matchQ = !q || r.company.toLowerCase().includes(q) || r.contact.toLowerCase().includes(q);
    const dv = getDateVal(r);
    const matchFrom = !dateFrom || dv >= dateFrom;
    const matchTo   = !dateTo   || dv <= dateTo;
    return matchO && matchS && matchQ && matchFrom && matchTo;
  });

  // ── CSV エクスポート ──────────────────────────────────
  function exportCSV() {
    const LABEL = {
      recontactStartDate:"追客開始日",
      "nextAction.date":  "次アクション日",
      prevLostDate:       "前回失注日",
    };
    const headers = [
      "会社名","担当者名","役職","担当者","現ステージ",
      "ステータス","前回失注カテゴリ","前回失注理由","前回失注日",
      "追客開始日","追客メモ","次アクション日","次アクション内容",
    ];
    const rows = filtered.map(r=>{
      const cat = LOST_CATEGORIES.find(c=>c.key===r.prevLostCategory);
      return [
        r.company, r.contact, r.title||"", r.owner, r.stage,
        r.status==="active"?"追客中":"再失注",
        cat?.label||"", r.prevLostReason||"", r.prevLostDate||"",
        r.recontactStartDate||"", r.recontactNote||"",
        r.nextAction?.date||"", r.nextAction?.content||"",
      ].map(v=>'"'+String(v).replace(/"/g,'""')+'"');
    });
    const bom = "\uFEFF";
    const csv = bom + [headers.map(h=>'"'+h+'"'), ...rows].map(r=>r.join(",")).join("\n");
    const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `追客リスト_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  const dateFieldActive = dateFrom || dateTo;

  function updateRecontact(updated) {
    setRecontacts(rs=>rs.map(r=>r.id===updated.id?updated:r));
    setSelected(updated);
    // v13: DB永続化
    (async () => {
      const sb = await getSupabase();
      if (!sb) return;
      const row = recontactToRow(updated);
      row.updated_at = new Date().toISOString();
      await sb.from("recontacts").update(row).eq("id", updated.id);
    })();
  }

  function changeStage(newStage) {
    if (!selected) return;
    const today = new Date().toISOString().slice(0,10);
    const updated = {
      ...selected, stage:newStage,
      stageHistory:[...selected.stageHistory, { stage:newStage, date:today, note:"ステージ更新", by:user.name }],
    };
    updateRecontact(updated);
  }

  function addNote() {
    if (!noteText.trim() || !selected) return;
    const updated = { ...selected, notes:[...selected.notes, { id:Date.now(), date:new Date().toISOString().slice(0,10), content:noteText.trim(), by:user.name }] };
    updateRecontact(updated);
    setNoteText("");
  }

  function saveAction() {
    if (!selected) return;
    updateRecontact({ ...selected, nextAction:actionForm });
  }

  function submitRelost() {
    if (!selected || !relostForm.catKey || !relostForm.reason || relostForm.detail.trim().length<10) return;
    const today = new Date().toISOString().slice(0,10);
    const entry = { date:today, category:relostForm.catKey, reason:relostForm.reason, detail:relostForm.detail.trim(), stage:selected.stage };
    const updated = { ...selected, status:"relost", relostHistory:[...selected.relostHistory, entry] };
    updateRecontact(updated);
    onRelost && onRelost(updated);
    setShowRelostModal(false);
    setRelostForm({ catKey:"", reason:"", detail:"" });
    setSelected(null);
  }

  // カンバン（追客ステージ = 通常STAGESと同じ①〜⑦）
  const inputSt = { background:"#f8faff", border:"1px solid #e8edf5", borderRadius:6, padding:"8px 10px", fontSize:12, color:"#0f172a", width:"100%", fontFamily:"'Noto Sans JP',sans-serif", outline:"none", boxSizing:"border-box" };
  const labelSt = { fontSize:10, color:"#64748b", letterSpacing:"0.06em", marginBottom:4, display:"block" };
  const selBox  = { background:"#f8faff", border:"1px solid #e8edf5", borderRadius:8, color:"#64748b", fontSize:12, padding:"0 12px", height:34, cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif", outline:"none" };

  // 統計
  const activeCount  = myList.filter(r=>r.status==="active").length;
  const relostCount  = myList.filter(r=>r.status==="relost").length;
  const convRate     = myList.length>0 ? Math.round(myList.filter(r=>r.stage==="⑦").length/myList.length*100) : 0;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", overflow:"hidden" }}>
      {/* Header */}
      <div style={{ padding:isMobile?"12px 12px 0":"20px 28px 0", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <div>
            <div style={{ fontSize:12, color:"#64748b", letterSpacing:"0.06em" }}>RECONTACT LIST</div>
            <h2 style={{ fontSize:20, fontWeight:700, color:"#0f172a", margin:0 }}>追客リスト</h2>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            {/* KPIバッジ */}
            {[
              { label:"追客中", value:activeCount, color:"#22c55e" },
              { label:"再失注", value:relostCount, color:"#ef4444" },
              { label:"成約率", value:`${convRate}%`, color:"#a78bfa" },
            ].map(k=>(
              <div key={k.label} style={{ background:"#f8faff", border:`1px solid ${k.color}33`, borderRadius:8, padding:"0 12px", height:34, display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:10, color:"#64748b" }}>{k.label}</span>
                <span style={{ fontSize:13, fontWeight:800, color:k.color, fontFamily:"'DM Mono',monospace" }}>{k.value}</span>
              </div>
            ))}
            {/* CSVエクスポート */}
            <button onClick={exportCSV} style={{
              display:"flex", alignItems:"center", gap:6,
              background:"#f8faff", border:"1px solid #22c55e44", borderRadius:8,
              color:"#22c55e", fontSize:12, fontWeight:600, padding:"0 14px", height:34,
              cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif",
            }}>
              <Upload size={13}/>CSV出力
            </button>
            {/* ビュー切替 */}
            <div style={{ display:"flex", background:"#f8faff", border:"1px solid #e8edf5", borderRadius:8, overflow:"hidden" }}>
              {[["kanban","カンバン"],["list","リスト"]].map(([v,label])=>(
                <button key={v} onClick={()=>setViewMode(v)} style={{ display:"flex", alignItems:"center", gap:5, padding:"0 14px", height:34, background:viewMode===v?"#1e293b":"transparent", border:"none", cursor:"pointer", color:viewMode===v?"#f1f5f9":"#475569", fontSize:12, fontFamily:"'Noto Sans JP',sans-serif" }}>
                  {v==="kanban"?<Columns size={13}/>:<List size={13}/>}{label}
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* ── フィルタ行 ── */}

  );
