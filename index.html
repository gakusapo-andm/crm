// ── v13: Google OAuth ログイン画面 ───────────────────────
// BB v52のGoogleLoginScreenと同一フロー:
//   1. GSIスクリプト動的ロード
//   2. nonce生成→SHA-256ハッシュ→GSI initに渡す
//   3. signInWithIdToken → membersテーブル照合 → user object返却
const OAUTH_CLIENT_ID = "620212859862-7b25gilu0v1skqu6fpo8ovqb50s01nal.apps.googleusercontent.com";

function LoginScreen({ onLogin }) {
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [gsiReady, setGsiReady] = useState(false);
  const [devMode, setDevMode] = useState(false);
  const [selected, setSelected] = useState(0);
  const btnRef = useRef(null);
  const nonceRef = useRef(null);

  // nonce生成（BB v52と同一）
  const generateNonce = async () => {
    const rawNonce = crypto.randomUUID();
    const encoder = new TextEncoder();
    const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(rawNonce));
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashedNonce = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    return { rawNonce, hashedNonce };
  };

  // GSIスクリプト動的ロード + 初期化
  useEffect(() => {
    // GSIスクリプトをロード
    if (!document.querySelector('script[src*="accounts.google.com/gsi/client"]')) {
      const script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.async = true;
      script.defer = true;
      script.onload = () => initGSI();
      script.onerror = () => { console.warn("GSI script load failed"); setDevMode(true); };
      document.head.appendChild(script);
    } else {
      initGSI();
    }

    async function initGSI() {
      // GSIロード待ち（最大5秒）
      let retries = 0;
      while (!window.google?.accounts?.id && retries < 10) {
        await new Promise(r => setTimeout(r, 500));
        retries++;
      }
      if (!window.google?.accounts?.id) { setDevMode(true); return; }

      const { rawNonce, hashedNonce } = await generateNonce();
      nonceRef.current = rawNonce;

      window.google.accounts.id.initialize({
        client_id: OAUTH_CLIENT_ID,
        callback: handleCredentialResponse,
        auto_select: true,
        nonce: hashedNonce,
      });

      if (btnRef.current) {
        window.google.accounts.id.renderButton(btnRef.current, {
          theme: 'outline', size: 'large', width: 320, text: 'signin_with', locale: 'ja'
        });
      }
      setGsiReady(true);
      window.google.accounts.id.prompt();
    }
  }, []);

  // Google credential → Supabase Auth → members照合
  async function handleCredentialResponse(response) {
    setLoading(true);
    setError('');
    try {
      const idToken = response.credential;
      const sb = await getSupabase();
      if (!sb) { setError('DB接続エラー'); setLoading(false); return; }

      // Supabase Auth: signInWithIdToken
      const authPayload = { provider: 'google', token: idToken };
      if (nonceRef.current) authPayload.nonce = nonceRef.current;
      const authRes = await sb.auth.signInWithIdToken(authPayload);
      if (authRes.error) { setError('認証エラー: ' + authRes.error.message); setLoading(false); return; }

      const email = authRes.data.user.email;

      // membersテーブル照合
      const { data: member } = await sb.from('members')
        .select('*').eq('email', email).eq('is_active', true).maybeSingle();
      if (!member) { setError('未登録のメールアドレスです: ' + email); setLoading(false); return; }

      // auth_id紐づけ（初回ログイン時）
      if (!member.auth_id) {
        await sb.from('members').update({ auth_id: authRes.data.user.id }).eq('id', member.id);
      }

      onLogin({
        name: member.name,
        role: member.role,
        email: member.email,
        studentId: member.student_id || '',
        isAdmin: member.role === 'admin',
      });
    } catch (err) {
      console.error('ログインエラー:', err);
      setError('通信エラー: ' + err.message);
    }
    setLoading(false);
  }

  // グローバルに公開（GSIコールバック用）
  useEffect(() => { window._handleGoogleCredentialCRM = handleCredentialResponse; }, []);

  return (
    <div style={{ minHeight:"100vh", background:"#f0f4ff", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Noto Sans JP',sans-serif" }}>
      <div style={{ position:"fixed",top:"20%",left:"50%",transform:"translateX(-50%)",width:600,height:600,background:"radial-gradient(circle,#DC262608 0%,transparent 70%)",pointerEvents:"none" }}/>
      <div style={{ width:400 }}>
        <div style={{ textAlign:"center", marginBottom:40 }}>
          <div style={{ display:"inline-flex",alignItems:"center",justifyContent:"center",width:56,height:56,background:"#fff",borderRadius:16,marginBottom:16,boxShadow:"0 4px 20px #00000012" }}>
            <GakusapoLogo size={40}/>
          </div>
          <div style={{ fontSize:22,fontWeight:800,color:"#0f172a",letterSpacing:"-0.02em" }}>Gakusapo CRM</div>
          <div style={{ fontSize:12,color:"#64748b",marginTop:4,letterSpacing:"0.06em" }}>SALES MANAGEMENT SYSTEM</div>
        </div>

        <div style={{ background:"#fff",border:"1px solid #e8edf5",borderRadius:16,padding:"36px 32px" }}>

          {/* Google OAuth ボタン */}
          {!devMode && (
            <>
              <div style={{ display:"flex",justifyContent:"center",marginBottom:16 }}>
                <div ref={btnRef} style={{ minHeight:44 }}/>
              </div>
              {loading && <div style={{ textAlign:"center",fontSize:12,color:"#64748b",marginBottom:12 }}>ログイン中...</div>}
              {error && <div style={{ textAlign:"center",fontSize:12,color:"#dc2626",marginBottom:12,padding:"8px 12px",background:"#fef2f2",borderRadius:8 }}>{error}</div>}
              {!gsiReady && !loading && <div style={{ textAlign:"center",fontSize:11,color:"#94a3b8",marginBottom:12 }}>Google認証を準備中...</div>}
              <div style={{ borderTop:"1px solid #e8edf5",marginTop:20,paddingTop:16,textAlign:"center" }}>
                <button onClick={()=>setDevMode(true)} style={{ background:"none",border:"none",color:"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif" }}>
                  開発モードで入る →
                </button>
              </div>
            </>
          )}

          {/* 開発モード（フォールバック） */}
          {devMode && (
            <>
              <div style={{ display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24 }}>
                <div style={{ background:"#f59e0b22",border:"1px solid #f59e0b44",borderRadius:20,padding:"4px 14px",fontSize:11,color:"#f59e0b",fontWeight:600,letterSpacing:"0.06em" }}>
                  開発モード（認証スキップ中）
                </div>
              </div>
              <div style={{ fontSize:12,color:"#64748b",marginBottom:12,fontWeight:600 }}>ログインユーザーを選択</div>
              <div style={{ display:"flex",flexDirection:"column",gap:8,marginBottom:24 }}>
                {DEV_USERS.map((u,i)=>(
                  <button key={i} onClick={()=>setSelected(i)} style={{
                    display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
                    borderRadius:10,border:`2px solid ${selected===i?"#6c5ce7":"#e8edf5"}`,
                    background:selected===i?"#ede9fe":"#fff",cursor:"pointer",
                    fontFamily:"'Noto Sans JP',sans-serif",transition:"all 0.15s",width:"100%",
                  }}>
                    <div style={{ width:32,height:32,borderRadius:"50%",background:u.role==="admin"?"#DC2626":u.role==="clerk"?"#22c55e":"#1e3a5f",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0 }}>
                      {u.name.slice(0,2)}
                    </div>
                    <div style={{ flex:1,textAlign:"left" }}>
                      <div style={{ fontSize:13,fontWeight:600,color:"#0f172a" }}>{u.name}</div>
                      <div style={{ fontSize:10,color:u.role==="admin"?"#DC2626":u.role==="clerk"?"#22c55e":"#60a5fa",marginTop:1 }}>{u.label}</div>
                    </div>
                    {selected===i&&<Check size={14} color="#ef4444"/>}
                  </button>
                ))}
              </div>
              <button onClick={()=>onLogin({ ...DEV_USERS[selected], email:`${DEV_USERS[selected].name}@dev.local`, picture:null })}
                style={{ width:"100%",background:"#DC2626",border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,padding:"14px",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif" }}>
                このユーザーでログイン →
              </button>
              <div style={{ borderTop:"1px solid #e8edf5",marginTop:16,paddingTop:12,textAlign:"center" }}>
                <button onClick={()=>setDevMode(false)} style={{ background:"none",border:"none",color:"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif" }}>
                  ← Google認証に戻る
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD HOME PAGE ───────────────────────────────────
// ログイン後最初に表示される営業ダッシュボード。
// ■ KPIカード: テレアポ/OI・FF/PC/N成約の4カテゴリ × 前期比delta
// ■ 活動推移チャート: 週間/月間トグルで架電・接触・アポの棒グラフ表示
// ■ stageHistory ベースで全指標を動的算出（静的モックデータは初期値のみ）
// ■ admin=チーム全体, member=自身のデータのみ表示
function DashboardHome({ user, actions, customers=[], teleapoLists=[], isMobile=false, isTablet=false }) {
  const isAdmin = user.role==="admin";

  const [dashPeriod, setDashPeriod] = React.useState("week"); // "week" | "month"

  // ── 日付ユーティリティ ─────────────────────────────────
  const localDateStr = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  };
  const now = new Date();

  // ── 今週（月〜金）────────────────────────────────────
  const dow = (now.getDay()+6) % 7;
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-dow); weekStart.setHours(0,0,0,0);
  const weekDays = Array.from({length:7},(_,i)=>{
    const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
    return { date: localDateStr(d), label: ["月","火","水","木","金","土","日"][i] };
  });

  // ── 今月（1日〜末日）────────────────────────────────
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthEnd   = new Date(now.getFullYear(), now.getMonth()+1, 0);
  const monthDays  = Array.from({length: monthEnd.getDate()}, (_,i) => {
    const d = new Date(monthStart); d.setDate(i+1);
    return { date: localDateStr(d), label: `${i+1}` };
  });

  const apptStages = new Set(["③"]);
  const oiffStages = new Set(["④","⑤"]);
  const pcStages   = new Set(["⑥"]);

  const targetCustomers = isAdmin ? customers : customers.filter(c=>c.owner===user.name);

  // 週次チャート（月〜金）
  const weeklyMap = {}; weekDays.forEach(d=>{weeklyMap[d.date]={appts:0,oiff:0,pc:0};});
  targetCustomers.forEach(c=>(c.stageHistory||[]).forEach(h=>{
    if(h.date && weeklyMap[h.date]){
      if(apptStages.has(h.stage)) weeklyMap[h.date].appts++;
      if(oiffStages.has(h.stage)) weeklyMap[h.date].oiff++;
      if(pcStages.has(h.stage))   weeklyMap[h.date].pc++;
    }
  }));
  const weeklyData = weekDays.slice(0,5).map(d=>({ day:d.label, ...weeklyMap[d.date] }));

  // 月次チャート（週ごとに集約: W1〜W5）
  const weekLabels = ["W1","W2","W3","W4","W5"];
  const monthlyMap = weekLabels.map(()=>({appts:0,oiff:0,pc:0}));
  targetCustomers.forEach(c=>(c.stageHistory||[]).forEach(h=>{
    if(h.date&&h.date>=localDateStr(monthStart)&&h.date<=localDateStr(monthEnd)){
      const day = parseInt(h.date.slice(8),10);
      const wi  = Math.min(Math.floor((day-1)/7), 4);
      if(apptStages.has(h.stage)) monthlyMap[wi].appts++;
      if(oiffStages.has(h.stage)) monthlyMap[wi].oiff++;
      if(pcStages.has(h.stage))   monthlyMap[wi].pc++;
    }
  }));
  const monthlyData = weekLabels.map((w,i)=>({ day:w, ...monthlyMap[i] }));

  const chartData    = dashPeriod==="week" ? weeklyData : monthlyData;
  const periodLabel  = dashPeriod==="week" ? "今週" : "今月";
  const periodSuffix = dashPeriod==="week" ? "今週の活動推移" : "今月の活動推移（週次）";

  // 期間内の集計（KPI用）
  const periodStart = dashPeriod==="week" ? localDateStr(weekStart) : localDateStr(monthStart);
  const periodEnd   = dashPeriod==="week" ? weekDays[6].date : localDateStr(monthEnd);
  const inPeriod = date => date && date>=periodStart && date<=periodEnd;

  // ── ステージ別件数を動的計算 ─────────────────────────────
  const stageNos = ["①","②","③","④","⑤","⑥","⑦"];
  const safeRate = (a, b) => b > 0 ? Math.round(a / b * 1000) / 10 : null;

  // targetCustomers = admin→全員, member→自分のみ
  const sc = {}; stageNos.forEach(s=>{ sc[s]=0; });
  targetCustomers.forEach(c=>(c.stageHistory||[]).forEach(h=>{
    if(inPeriod(h.date) && sc[h.stage]!==undefined) sc[h.stage]++;
  }));

  // チーム全体（メンバー向けチーム合計バー用）
  const teamSc = {}; stageNos.forEach(s=>{ teamSc[s]=0; });
  customers.forEach(c=>(c.stageHistory||[]).forEach(h=>{
    if(inPeriod(h.date) && teamSc[h.stage]!==undefined) teamSc[h.stage]++;
  }));

  // ── 前期間の集計（比較用）────────────────────────────
  const prevStart = (() => {
    if (dashPeriod==="week") {
      const d = new Date(weekStart); d.setDate(d.getDate()-7); return localDateStr(d);
    } else {
      const d = new Date(monthStart); d.setMonth(d.getMonth()-1); return localDateStr(d);
    }
  })();
  const prevEnd = (() => {
    if (dashPeriod==="week") {
      const d = new Date(weekStart); d.setDate(d.getDate()-1); return localDateStr(d);
    } else {
      const d = new Date(monthStart); d.setDate(d.getDate()-1); return localDateStr(d);
    }
  })();
  const inPrev = date => date && date>=prevStart && date<=prevEnd;

  // カテゴリ別に今期/前期カウント（前期比delta用）
  const periodCount = { tele:0, oiff:0, pc:0, nc:0 };
  const prevCount   = { tele:0, oiff:0, pc:0, nc:0 };
  targetCustomers.forEach(c=>{
    (c.stageHistory||[]).forEach(h=>{
      if(inPeriod(h.date)){
        if(["①","②","③"].includes(h.stage)) periodCount.tele++;
        if(["④","⑤"].includes(h.stage))      periodCount.oiff++;
        if(h.stage==="⑥")                    periodCount.pc++;
        if(h.stage==="⑦")                    periodCount.nc++;
      }
      if(inPrev(h.date)){
        if(["①","②","③"].includes(h.stage)) prevCount.tele++;
        if(["④","⑤"].includes(h.stage))      prevCount.oiff++;
        if(h.stage==="⑥")                    prevCount.pc++;
        if(h.stage==="⑦")                    prevCount.nc++;
      }
    });
  });

  const calcChange = (cur, prev) => {
    if(prev===0 && cur===0) return null;
    if(prev===0) return null;
    return Math.round((cur-prev)/prev*100*10)/10;
  };

  const changeLabel = dashPeriod==="week" ? "先週比" : "先月比";

  // ── 動的 KPIカード ────────────────────────────────────
  const dynamicKpiCards = [
    { category:"テレアポ", categoryEn:"TELEAPO", accent:"#3b82f6",
      change: calcChange(periodCount.tele, prevCount.tele), changeLabel,
      steps:[
        { no:"①", label:"総架電数",   short:"架電", value:sc["①"], rate:null },
        { no:"②", label:"担当者接触", short:"接触", value:sc["②"], rate:safeRate(sc["②"],sc["①"]), rateLabel:"接触率" },
        { no:"③", label:"アポ取得数", short:"アポ", value:sc["③"], rate:safeRate(sc["③"],sc["②"]), rateLabel:"アポ率" },
      ]},
    { category:"OI / FF", categoryEn:"OI / FF", accent:"#f59e0b",
      change: calcChange(periodCount.oiff, prevCount.oiff), changeLabel,
      steps:[
        { no:"④", label:"担当者問診", short:"担当者", value:sc["④"], rate:null },
        { no:"⑤", label:"上層部問診", short:"上層部", value:sc["⑤"], rate:safeRate(sc["⑤"],sc["④"]), rateLabel:"打診率" },
      ]},
    { category:"PC", categoryEn:"PRESENTATION", accent:"#ef4444",
      change: calcChange(periodCount.pc, prevCount.pc), changeLabel,
      steps:[
        { no:"⑥", label:"プレゼン・クロージング", short:"PC", value:sc["⑥"], rate:safeRate(sc["⑥"],sc["⑤"]), rateLabel:"実施率" },
      ]},
    { category:"N（成約）", categoryEn:"CONTRACT", accent:"#22c55e",
      change: calcChange(periodCount.nc, prevCount.nc), changeLabel,
      steps:[
        { no:"⑦", label:"成約数", short:"成約", value:sc["⑦"], rate:safeRate(sc["⑦"],sc["⑥"]), rateLabel:"成約率" },
      ]},
  ];

  // ── 動的ファネルデータ（期間内活動ベース）────────────────
  const funnelData = [
    { no:"①", name:"総架電数",              value:sc["①"], category:"テレアポ", fill:"#bfdbfe" },
    { no:"②", name:"担当者接触",            value:sc["②"], category:"テレアポ", fill:"#60a5fa" },
    { no:"③", name:"アポ取得数",            value:sc["③"], category:"テレアポ", fill:"#1d4ed8" },
    { no:"④", name:"担当者問診",            value:sc["④"], category:"OI/FF",   fill:"#fde68a" },
    { no:"⑤", name:"上層部問診",            value:sc["⑤"], category:"OI/FF",   fill:"#d97706" },
    { no:"⑥", name:"プレゼン・クロージング", value:sc["⑥"], category:"PC",      fill:"#ef4444" },
    { no:"⑦", name:"成約数",               value:sc["⑦"], category:"N",       fill:"#22c55e" },
  ];

  // ── v13: パイプラインスナップショット（現在の全件分布）──────
  // teleapoLists.reachedStage → ①②、customers.stage → ②-⑦
  // admin=全件, member=自分のownerのみ
  const myTeleapo = isAdmin ? teleapoLists : teleapoLists.filter(t=>t.owner===user.name);
  const myCusts   = targetCustomers;

  // テレアポ: reachedStageの累積カウント
  const tCalled    = myTeleapo.filter(t=>t.reachedStage && t.reachedStage !== "new").length;
  const tConnected = myTeleapo.filter(t=>["connected","materials","appointed"].includes(t.reachedStage)).length;
  const tAppointed = myTeleapo.filter(t=>t.reachedStage === "appointed").length;

  // CRM deals: 現在のステージ別件数
  const cStage = {}; stageNos.forEach(s=>{ cStage[s]=0; });
  myCusts.forEach(c=>{ if(cStage[c.stage]!==undefined) cStage[c.stage]++; });

  // パイプライン（累積: そのステージ以降に到達した総数）
  const pipeTotal    = myTeleapo.length;
  const pipeCalled   = tCalled;
  const pipeConnect  = tConnected;
  const pipeApo      = cStage["③"]+cStage["④"]+cStage["⑤"]+cStage["⑥"]+cStage["⑦"];
  const pipeOiStaff  = cStage["④"]+cStage["⑤"]+cStage["⑥"]+cStage["⑦"];
  const pipeOiExec   = cStage["⑤"]+cStage["⑥"]+cStage["⑦"];
  const pipePc       = cStage["⑥"]+cStage["⑦"];
  const pipeContract = cStage["⑦"];

  const pipelineData = [
    { no:"リスト", name:"テレアポリスト総数",    value:pipeTotal,    category:"テレアポ", fill:"#e2e8f0" },
    { no:"①",     name:"架電済",               value:pipeCalled,   category:"テレアポ", fill:"#bfdbfe" },
    { no:"②",     name:"担当者接続",            value:pipeConnect,  category:"テレアポ", fill:"#60a5fa" },
    { no:"③",     name:"アポ取得",              value:pipeApo,      category:"商談",     fill:"#1d4ed8" },
    { no:"④",     name:"OI/FF 担当者",          value:pipeOiStaff,  category:"商談",     fill:"#fde68a" },
    { no:"⑤",     name:"OI/FF 上層部",          value:pipeOiExec,   category:"商談",     fill:"#d97706" },
    { no:"⑥",     name:"PC（本提案）",          value:pipePc,       category:"提案",     fill:"#ef4444" },
    { no:"⑦",     name:"成約",                 value:pipeContract, category:"成約",     fill:"#22c55e" },
  ];

  // ── v13: ステージ別現在件数（棒グラフ用）──────────────────
  const stageDistData = [
    { stage:"未架電",  value: myTeleapo.filter(t=>!t.reachedStage||t.reachedStage==="new").length, fill:"#cbd5e1" },
    { stage:"①架電",   value: myTeleapo.filter(t=>t.reachedStage==="called").length, fill:"#93c5fd" },
    { stage:"②接続",   value: myTeleapo.filter(t=>t.reachedStage==="connected").length, fill:"#60a5fa" },
    { stage:"②資料",   value: cStage["②"], fill:"#3b82f6" },
    { stage:"③アポ",   value: cStage["③"], fill:"#1d4ed8" },
    { stage:"④担当",   value: cStage["④"], fill:"#fbbf24" },
    { stage:"⑤上層",   value: cStage["⑤"], fill:"#d97706" },
    { stage:"⑥PC",     value: cStage["⑥"], fill:"#ef4444" },
    { stage:"⑦成約",   value: cStage["⑦"], fill:"#22c55e" },
  ];

  return (
    <div style={{ flex:1, overflow:"auto", padding: isMobile?"16px 12px":"28px 32px", background:"#f0f4ff" }}>

      {/* PAGE HEADER */}
      <div style={{ marginBottom: isMobile?16:28 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
          <span style={{ color:"#64748b", fontSize:11, letterSpacing:"0.06em" }}>
            {new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",weekday:"long"})}
          </span>
          {!isAdmin&&<span style={{ marginLeft:8, background:"#6c5ce722", color:"#6c5ce7", fontSize:10, padding:"2px 10px", borderRadius:20, fontWeight:600 }}>{user.name}さんのビュー</span>}
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <h1 style={{ fontSize: isMobile?18:22, fontWeight:700, color:"#0f172a", letterSpacing:"-0.02em", margin:0 }}>
              営業ダッシュボード
              {isAdmin&&!isMobile&&<span style={{ marginLeft:10, fontSize:13, color:"#64748b", fontWeight:400 }}>— チーム全体</span>}
            </h1>
            {/* 週間/月間 トグル */}
            <div style={{ display:"flex", background:"#e8edf5", borderRadius:10, padding:3, gap:2 }}>
              {[{key:"week",label:"週間"},{key:"month",label:"月間"}].map(p=>(
                <button key={p.key} onClick={()=>setDashPeriod(p.key)}
                  style={{ padding:"5px 14px", borderRadius:8, border:"none", cursor:"pointer",
                    fontSize:12, fontWeight:dashPeriod===p.key?700:400,
                    fontFamily:"'Noto Sans JP',sans-serif",
                    background:dashPeriod===p.key?"#fff":"transparent",
                    color:dashPeriod===p.key?"#6c5ce7":"#94a3b8",
                    boxShadow:dashPeriod===p.key?"0 1px 4px #00000014":"none",
                    transition:"all 0.12s" }}>
                  {p.label}
                </button>
              ))}
            </div>
          </div>
          <span style={{ background:"#fef2f2", color:"#ef4444", fontSize: isMobile?11:12, padding:"5px 14px", borderRadius:20, fontWeight:600, border:"1px solid #ef444444" }}>
            目標: アポ {isAdmin?"30":"6"} 件
          </span>
        </div>
      </div>

      {/* KPI CARDS: Desktop=4列 / iPad=2列 / iPhone=2列 */}
      <div style={{ display:"grid", gridTemplateColumns: isMobile?"repeat(2,1fr)":isTablet?"repeat(2,1fr)":"repeat(4,1fr)", gap: isMobile?10:16, marginBottom: isMobile?16:24 }}>
        {dynamicKpiCards.map((cat,ci)=><CategoryCard key={ci} cat={cat}/>)}
      </div>

      {/* チーム合計バー（メンバー用） */}
      {!isAdmin&&(
        <div style={{ background:"#fff", border:"1px solid #e8edf5", borderRadius:12, padding: isMobile?"12px 14px":"14px 22px", marginBottom: isMobile?16:24, boxShadow:"0 1px 4px #00000008", overflowX:"auto" }}>

// 未登録媒体を文字列から自動生成（ハッシュで色を決定）
const AUTO_COLORS = [
  { color:"#0f766e", bg:"#ccfbf1" },{ color:"#7c3aed", bg:"#ede9fe" },
  { color:"#b91c1c", bg:"#fee2e2" },{ color:"#1d4ed8", bg:"#dbeafe" },
  { color:"#15803d", bg:"#dcfce7" },{ color:"#c2410c", bg:"#ffedd5" },
  { color:"#9333ea", bg:"#f3e8ff" },{ color:"#0369a1", bg:"#e0f2fe" },
];
function getSourceBadge(sourceStr) {
  if (!sourceStr) return null;
  // 既存リストから key or label でマッチ
  const found = SOURCE_LIST.find(s => s.key === sourceStr || s.label === sourceStr);
  if (found) return found;
  // 未登録：文字列ハッシュで色を自動割り当て
  let hash = 0;
  for (let i = 0; i < sourceStr.length; i++) hash = (hash * 31 + sourceStr.charCodeAt(i)) & 0xffff;
  const c = AUTO_COLORS[hash % AUTO_COLORS.length];
  return { key: sourceStr, label: sourceStr, color: c.color, bg: c.bg };
}

// ── PERIOD HELPERS ────────────────────────────────────────
function getPeriodRange(preset) {
  const now = new Date();
  // ローカルタイムゾーンで YYYY-MM-DD を返す（toISOStringはUTC基準でずれるため使わない）
  const fmt = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  };
  // 指定日の月曜日を返す（月=0, 日=6 → 月曜起点）
  const monday = d => {
    const x = new Date(d);
    x.setDate(d.getDate() - ((d.getDay()+6) % 7));
    x.setHours(0,0,0,0);
    return x;
  };
  switch(preset) {
    case "today": return { from:fmt(now), to:fmt(now) };
    case "week": {
      const m = monday(now);
      const s = new Date(m); s.setDate(m.getDate()+6);
      return { from:fmt(m), to:fmt(s) };
    }
    case "lastweek": {
      const m = monday(now);
      const prev = new Date(m); prev.setDate(m.getDate()-7);
      const end  = new Date(m); end.setDate(m.getDate()-1);
      return { from:fmt(prev), to:fmt(end) };
    }
    case "month": {
      const f = new Date(now.getFullYear(), now.getMonth(), 1);
      const l = new Date(now.getFullYear(), now.getMonth()+1, 0);
      return { from:fmt(f), to:fmt(l) };
    }
    case "lastmonth": {
      const f = new Date(now.getFullYear(), now.getMonth()-1, 1);
      const l = new Date(now.getFullYear(), now.getMonth(), 0);
      return { from:fmt(f), to:fmt(l) };
    }
    default: return { from:"", to:"" };
  }
}

  // ── CSV PARSE ──────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l=>l.trim());
    if (lines.length < 2) return [];
    const headers = lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
    const colMap = {
      company:   headers.findIndex(h=>/会社|company/i.test(h)),
      contact:   headers.findIndex(h=>/担当|contact|氏名|名前/i.test(h)),
      title:     headers.findIndex(h=>/役職|title/i.test(h)),
      phone:     headers.findIndex(h=>/電話|phone|tel/i.test(h)),
      industry:  headers.findIndex(h=>/業種|industry/i.test(h)),
      prefecture:headers.findIndex(h=>/都道府県|prefecture|地域/i.test(h)),
      owner:     headers.findIndex(h=>/担当者|owner|担当営業/i.test(h)),
      source:    headers.findIndex(h=>/媒体|source|リスト元|出典/i.test(h)),
    };
    return lines.slice(1).map((line,i)=>{
      const cols = line.split(",").map(c=>c.trim().replace(/^"|"$/g,""));
      const ownerVal = colMap.owner>=0 ? cols[colMap.owner] : "";
      const srcRaw   = colMap.source>=0 ? cols[colMap.source] : "";
      // getSourceBadge でマッチするラベルがあればそのkeyを、なければraw文字列をそのまま保存
      const srcMatch = sourceList.find(s => s.key===srcRaw || s.label===srcRaw);
      return {
        id: Date.now()+i,
        company:    colMap.company>=0    ? cols[colMap.company]    : "",
        contact:    colMap.contact>=0    ? cols[colMap.contact]    : "",
        title:      colMap.title>=0      ? cols[colMap.title]      : "",
        phone:      colMap.phone>=0      ? cols[colMap.phone]      : "",
        industry:   colMap.industry>=0   ? cols[colMap.industry]   : "",
        prefecture: colMap.prefecture>=0 ? cols[colMap.prefecture] : "",
        url:"", revenue:"", address:"", employees:"",
        owner: ownerVal || user.name,
        source: srcMatch ? srcMatch.key : (srcRaw || ""),
        callTags:[], callCount:0, callLogs:[],
        comments:[], flagClaim:false, flagBanned:false, adminNotes:[],
        createdAt:today, updatedAt:today,
      };
    }).filter(r=>r.company);
  }

  function handleCSVUpload(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const parsed = parseCSV(ev.target.result);
      let mergeCount = 0, newCount = 0;
      const newRows = [];
      const mergedUpdates = [];
      setLists(prev => {
        const next = [...prev];
        parsed.forEach(newRow => {
          const dupIdx = next.findIndex(r => r.company===newRow.company && r.phone===newRow.phone);
          if (dupIdx >= 0) {
            mergeCount++;
            const mergedFields = { contact:newRow.contact, title:newRow.title,
              industry:newRow.industry, prefecture:newRow.prefecture,
              owner: newRow.owner || next[dupIdx].owner };
            next[dupIdx] = { ...next[dupIdx], ...mergedFields, updatedAt:today };
            mergedUpdates.push({ id: next[dupIdx].id, fields: mergedFields });
          } else {
            newCount++;
            next.push(newRow);
            newRows.push(newRow);
          }
        });
        return next;
      });
      // v12: DB永続化（新規INSERT + 既存UPDATE）
      if (newRows.length > 0) dbInsertTeleapoRows(newRows);
      mergedUpdates.forEach(u => dbUpdateTeleapoItem(u.id, u.fields));
      showNotif(`新規${newCount}件追加、${mergeCount}件マージ（ログ保持）`);
    };
    reader.readAsText(file, "UTF-8");
    e.target.value = "";
  }

  function handleCSVExport() {
    const headers = ["会社名","担当者名","役職","電話番号","業種","都道府県","担当者","媒体","架電結果","架電回数","クレームフラグ","架電禁止","最終更新"];
    const rows = filteredList.map(r=>[
      r.company, r.contact, r.title, r.phone, r.industry||"", r.prefecture||"", r.owner,
      getSourceBadgeDyn(r.source)?.label||"",
      (r.callTags||[]).map(k=>CALL_RESULTS.find(x=>x.key===k)?.label||k).join("/"), r.callCount,
      r.flagClaim?"有":"", r.flagBanned?"有":"", r.updatedAt
    ]);
    const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`架電リスト_${today}.csv`; a.click();
    URL.revokeObjectURL(url);
  }

  // ── RESULT UPDATE ────────────────────────────────────
  function handleTagToggle(id, tagKey) {
    setPendingTags(tags => {
      const hasApo = tags.includes("apo");
      // アポ取得が選択済みの場合、アポ取得の解除のみ許可
      if (hasApo && tagKey !== "apo") return tags;
      // アポ取得を選ぶ → 担当接触も自動セット、他は排除
      if (tagKey === "apo" && !tags.includes("apo")) return ["apo", "contact"];
      // アポ取得を外す → 担当接触も一緒に外す
      if (tagKey === "apo") return tags.filter(t => t !== "apo" && t !== "contact");
      // 通常トグル
      return tags.includes(tagKey) ? tags.filter(t => t !== tagKey) : [...tags, tagKey];
    });
  }

    setLists(prev=>prev.map(r=>selectedIds.has(r.id)?{...r,owner:assignTarget,updatedAt:today}:r));

    showNotif(`${count}件を ${assignTarget} に割り振りました`, "success");

    setSelectedIds(prev=>{ const s=new Set(prev); s.has(id)?s.delete(id):s.add(id); return s; });

    // ローカル楽観更新
    const now2 = new Date();
    const dateStr2 = now2.toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,"-");
    const timeStr2 = now2.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
    const logEntry2 = { id:Date.now(), date:dateStr2, time:timeStr2, tags:["apo","contact"], note:apoModal._pendingNote||`アポ取得 ${apoForm.apoDate}`, by:apoOwner };
    setLists(ls=>ls.map(r=>r.id===apoId?{
      ...r, callTags:["apo","contact"], callLogs:[...(r.callLogs||[]),logEntry2],
      callCount:r.callCount+1, updatedAt:dateStr2,
    }:r));
    // RPC: create_deal_from_appointment（company作成 + deal③作成 or ②→③昇格）
    let dealResult = null;
    try {
      const sb = await getSupabase();
      if (sb) {
        const { data } = await sb.rpc("create_deal_from_appointment", { p_teleapo_id: apoId, p_owner: apoOwner });
        dealResult = data;
      }
    } catch(e) { console.error("create_deal_from_appointment error:", e); }
    setApoModal(null);
    // v13: deal作成成功時に事前問診URLを自動発行
    let urlResult = null;
    if (dealResult?.deal_id && dealResult?.company_id) {
      try {
        urlResult = await issuePreInputUrls({
          companyId: dealResult.company_id,
          dealId: dealResult.deal_id,
          owner: apoOwner,
          industry: apoIndustry,
        });
      } catch(e) { console.error("issuePreInputUrls error:", e); }
    }
    // v13: bbModalにURL情報を渡す
    setBbModal({

      dealId: dealResult?.deal_id || null,
      companyId: dealResult?.company_id || null,
      inquiryNo: urlResult?.inquiryNo || null,
      staffUrl: urlResult?.staffUrl || null,
      execUrl: urlResult?.execUrl || null,
      companySize: urlResult?.companySize || null,
      urlError: (!urlResult && dealResult?.deal_id) ? true : false,
    });
    showNotif(`${apoCompany} のアポを取得！顧客管理③に登録しました`,"success");

                                />
                                <button onClick={(e)=>{
  e.stopPropagation();
  const targetId = item.id;
  const tagsSnap = [...pendingTags];
  const noteSnap = resultNote.trim();
  if(tagsSnap.length===0 && !noteSnap){
    setResultEditId(null); setPendingTags([]); setResultNote(""); return;
  }
  if(tagsSnap.includes("apo")) {
    // アポタグあり→モーダルで確定してから保存。ここでは保存しない
    const targetItem = lists.find(r=>r.id===targetId);
    if(targetItem) openApoModal({...targetItem, _pendingTags:tagsSnap, _pendingNote:noteSnap});
    setResultEditId(null); setPendingTags([]); setResultNote(""); return;
  }
  const now = new Date();
  const dateStr = now.toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}).replace(/\//g,"-");
  const timeStr = now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"});
  const logEntry = { id:Date.now(), date:dateStr, time:timeStr, tags:tagsSnap, note:noteSnap, by:user.name };
  // v12: 楽観更新（ローカル即反映）+ DB書き込み（トリガーがreached_stage/call_count自動更新→Realtimeで反映）
  setLists(ls=>ls.map(r=>r.id===targetId?{
    ...r,
    callTags:tagsSnap,
    callLogs:[...(r.callLogs||[]),logEntry],
    callCount:r.callCount+1,
    updatedAt:dateStr,
  }:r));
  dbRecordCall(targetId, tagsSnap, noteSnap, user.name);
  // ── 資料送付タグ → create_deal_from_materials RPC ──
  if(tagsSnap.includes("material")) {
    const targetItem = lists.find(r=>r.id===targetId);
    if(targetItem) {
      const alreadyExists = customers.some(c => c._teleapoId === targetItem.id);
      if (!alreadyExists) {
        // v12: RPC経由でcompany+deal作成（DBトリガーでactivities自動記録）
        (async () => {
          try {
            const sb = await getSupabase();
            if (sb) {
              await sb.rpc("create_deal_from_materials", { p_teleapo_id: targetItem.id, p_owner: targetItem.owner || "" });
            }
          } catch(e) { console.error("create_deal_from_materials error:", e); }
        })();
      }
      if (onCreateTodo && (alreadyExists ? customers.find(c => c._teleapoId === targetItem.id) : true)) {
        const existing = customers.find(c => c._teleapoId === targetItem.id);
        onCreateTodo({
          customerId: existing?.id || targetId, company: targetItem.company,
          contact: targetItem.contact, email: "",
          owner: targetItem.owner, type: "document_send",
          triggerStage: "②", memo: noteSnap,
        });

      showNotif(alreadyExists
        ? `${targetItem.company} の資料送付TODOを追加しました`
        : `${targetItem.company} を見込客②に登録し、資料送付TODOを追加しました`, "success");
    }
  }
  setResultEditId(null); setPendingTags([]); setResultNote("");
}}

// ── ユーティリティ ───────────────────────────────────────────
const fmt = d =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

// 月曜始まりの曜日インデックス (月=0 … 日=6)
const dowMon = d => (d.getDay()+6)%7;

// その週の月曜日を返す
function weekStart(date) {
  const d = new Date(date);
  d.setDate(d.getDate() - dowMon(d));
  d.setHours(0,0,0,0);
  return d;
}

// date から n日後
function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate()+n);
  return d;
}

// ── イベント生成 ─────────────────────────────────────────────
function buildEvents(customers, recontacts, lostApproved) {
  const events = [];
  customers.forEach(c => {
    if (!c.nextAction?.date) return;
    events.push({ id:`na-${c.id}`, type:"nextAction",
      date:c.nextAction.date, time:c.nextAction.time||"",
      title:c.company, sub:c.nextAction.content,
      owner:c.owner, source:"customer", raw:c });
  });
  recontacts.forEach(r => {
    if (!r.nextAction?.date) return;
    events.push({ id:`ra-${r.id}`, type:"recontactAction",
      date:r.nextAction.date, time:r.nextAction.time||"",
      title:r.company, sub:r.nextAction.content,
      owner:r.owner, source:"recontact", raw:r });
  });
  lostApproved.forEach(l => {
    if (!l.recontactDate) return;
    events.push({ id:`ld-${l.id}`, type:"recontactDate",
      date:l.recontactDate, time:"",
      title:l.company, sub:"追客アプローチ予定",
      owner:l.owner, source:"lost", raw:l });
  });
  return events;
}

// ── 月ビュー用グリッド ───────────────────────────────────────
function buildMonthDays(year, month) {
  const first = new Date(year, month, 1);
  const last  = new Date(year, month+1, 0);
  const sdow  = dowMon(first);
  const days  = [];
  for (let i=0; i<sdow; i++)
    days.push({ date:new Date(year,month,-sdow+i+1), cur:false });
  for (let d=1; d<=last.getDate(); d++)
    days.push({ date:new Date(year,month,d), cur:true });
  for (let d=1; d<=42-days.length; d++)
    days.push({ date:new Date(year,month+1,d), cur:false });
  return days;
}

// ── 月ビュー ─────────────────────────────────────────────────
function MonthView({ year, month, eventsByDate, todayStr, onEventClick, onDayClick }) {
  const calDays = useMemo(()=>buildMonthDays(year,month),[year,month]);
  return (
    <div style={{flex:1,overflow:"auto",padding:"0 16px 16px"}}>
      {/* 曜日ヘッダー */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",
        gap:2,paddingTop:12,paddingBottom:5}}>
        {JP_DOW.map((d,i)=>(
          <div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,
            padding:"4px 0",letterSpacing:"0.06em",
            color:i===5?"#3b82f6":i===6?"#ef4444":"#94a3b8"}}>{d}</div>
        ))}
      </div>
      {/* セル */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {calDays.map(({date,cur},idx)=>{
          const ds     = fmt(date);
          const isToday= ds===todayStr;
          const dow    = dowMon(date);
          const dayEvs = eventsByDate[ds]??[];
          const MAX=3, shown=dayEvs.slice(0,MAX), rest=dayEvs.length-MAX;
          return (
            <div key={idx}
              onClick={()=>onDayClick(date)}
              style={{
                minHeight:96,
                background:isToday?"#f5f3ff":cur?"#fff":"#f8faff",
                border:`1px solid ${isToday?"#c4b5fd":"#e8edf5"}`,

                {isToday
                  ?<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
                      width:22,height:22,borderRadius:"50%",background:"#6c5ce7",
                      color:"#fff",fontSize:12,fontWeight:800}}>{date.getDate()}</span>
                  :<span style={{fontSize:12,fontWeight:cur?500:400,
                      color:!cur?"#d1d5db":dow===5?"#3b82f6":dow===6?"#ef4444":"#334155"}}>
                      {date.getDate()}

              {shown.map(ev=>(
                <EventChip key={ev.id} ev={ev} maxWidth={80}

// 縦軸=日付(月〜日)、横軸=担当者列
function WeekView({ weekBase, allEvents, selectedTypes, selectedOwner, visibleOwners, todayStr, onEventClick, onDayClick }) {
  const days    = useMemo(()=>Array.from({length:7},(_,i)=>addDays(weekBase,i)),[weekBase]);
  const columns = selectedOwner ? [selectedOwner] : visibleOwners;

  // [dateStr][owner] → events[]
  const grid = useMemo(()=>{
    const map = {};
    allEvents.forEach(ev=>{
      if (!selectedTypes.has(ev.type)) return;
      if (!map[ev.date]) map[ev.date]={};
      if (!map[ev.date][ev.owner]) map[ev.date][ev.owner]=[];
      map[ev.date][ev.owner].push(ev);
    });
    return map;
  },[allEvents,selectedTypes]);

  const COL_W = 140; // 1担当者列の幅(px)
  const ROW_H = 100; // 1日行の最小高さ(px)
  const DATE_W = 64; // 左の日付列幅

  return (
    <div style={{flex:1,overflow:"auto"}}>
      <div style={{minWidth: DATE_W + columns.length*COL_W + 32, padding:"0 16px 16px"}}>

        {/* ヘッダー行：担当者名 */}
        <div style={{display:"flex",position:"sticky",top:0,zIndex:10,
          background:"#f8faff",paddingTop:12,paddingBottom:4}}>
          {/* 左余白（日付列分） */}
          <div style={{width:DATE_W,flexShrink:0}}/>
          {columns.map(name=>{
            const oc=ownerColor(name);
            return (
              <div key={name} style={{width:COL_W,flexShrink:0,paddingLeft:4}}>
                <div style={{display:"inline-flex",alignItems:"center",gap:5,
                  padding:"4px 10px",borderRadius:20,
                  background:oc.bg,border:`1px solid ${oc.dot}22`}}>
                  <span style={{width:7,height:7,borderRadius:"50%",background:oc.dot}}/>
                  <span style={{fontSize:12,fontWeight:700,color:oc.text}}>{name}</span>
                </div>
              </div>
            );
          })}
        </div>

        {/* 日付行 */}
        {days.map((date,di)=>{
          const ds      = fmt(date);
          const isToday = ds===todayStr;
          const dow     = di;
          return (
            <div key={ds} style={{display:"flex",marginBottom:3}}>

              {/* 日付ラベル（左固定列） */}
              <div onClick={()=>onDayClick(date)}
                style={{
                  width:DATE_W,flexShrink:0,
                  display:"flex",flexDirection:"column",alignItems:"center",
                  justifyContent:"flex-start",paddingTop:8,gap:2,
                  cursor:"pointer",
                }}>
                <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.08em",
                  color:dow===5?"#3b82f6":dow===6?"#ef4444":"#94a3b8"}}>
                  {JP_DOW[dow]}
                </span>
                {isToday
                  ?<span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
                      width:28,height:28,borderRadius:"50%",background:"#6c5ce7",
                      color:"#fff",fontSize:14,fontWeight:800}}>
                      {date.getDate()}
                    </span>
                  :<span style={{fontSize:18,fontWeight:700,
                      color:dow===5?"#3b82f6":dow===6?"#ef4444":"#334155"}}>
                      {date.getDate()}
                    </span>
                }
              </div>

              {/* 担当者セル */}
              {columns.map(name=>{
                const cellEvs = (grid[ds]?.[name] ?? [])
                  .sort((a,b)=>a.time.localeCompare(b.time));
                return (
                  <div key={name} style={{
                    width:COL_W,flexShrink:0,minHeight:ROW_H,
                    background:isToday?"#f5f3ff":"#fff",
                    border:`1px solid ${isToday?"#c4b5fd":"#e8edf5"}`,
                    borderRadius:8,padding:"6px 6px 4px",marginLeft:3,
                    boxShadow:isToday?"0 0 0 1px #c4b5fd44":"none",
                  }}>
                    {cellEvs.length===0
                      ?<div style={{fontSize:9,color:"#e2e8f0",textAlign:"center",paddingTop:4}}>—</div>
                      :cellEvs.map(ev=>(
                        <EventChip key={ev.id} ev={ev} maxWidth={96}
                          onClick={e=>{e.stopPropagation();onEventClick(ev);}}/>
                      ))
                    }
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── 日ビュー（メンバー列並び）────────────────────────────────
// 横軸=担当者、各列に当日の予定
function DayView({ date, allEvents, selectedTypes, selectedOwner, visibleOwners, onEventClick }) {
  const ds      = fmt(date);
  const dow     = dowMon(date);
  const columns = selectedOwner ? [selectedOwner] : visibleOwners;

  // owner → events[] (当日・型フィルタ済み・時刻順)
  const byOwner = useMemo(()=>{
    const map={};
    allEvents.forEach(ev=>{
      if (ev.date!==ds) return;
      if (!selectedTypes.has(ev.type)) return;
      (map[ev.owner]??=[]).push(ev);
    });
    Object.values(map).forEach(arr=>arr.sort((a,b)=>a.time.localeCompare(b.time)));
    return map;
  },[allEvents,ds,selectedTypes]);

  const totalEvs = Object.values(byOwner).reduce((s,a)=>s+a.length,0);
  const dateLabel = `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日（${JP_DOW[dow]}）`;

  return (
    <div style={{flex:1,overflow:"auto",padding:"0 16px 16px"}}>

      {/* 日付タイトル */}
      <div style={{display:"flex",alignItems:"center",gap:10,
        paddingTop:14,paddingBottom:10}}>
        <span style={{fontSize:17,fontWeight:800,color:"#0f172a",letterSpacing:"-0.02em"}}>
          {dateLabel}
        </span>
        <span style={{fontSize:12,color:"#94a3b8"}}>{totalEvs}件</span>
      </div>

      {/* 担当者列グリッド */}
      <div style={{display:"flex",gap:8,alignItems:"flex-start",
        overflowX:"auto",paddingBottom:8}}>
        {columns.map(name=>{
          const oc   = ownerColor(name);
          const evs  = byOwner[name]??[];
          const timed   = evs.filter(e=>e.time);
          const untimed = evs.filter(e=>!e.time);
          return (
            <div key={name} style={{
              minWidth:220,flex:"1 1 220px",
              background:"#fff",borderRadius:12,
              border:`1.5px solid ${oc.dot}33`,
              overflow:"hidden",
            }}>
              {/* 担当者ヘッダー */}
              <div style={{
                display:"flex",alignItems:"center",gap:7,
                padding:"10px 14px",
                background:oc.bg,
                borderBottom:`1px solid ${oc.dot}22`,
              }}>
                <span style={{width:8,height:8,borderRadius:"50%",background:oc.dot}}/>
                <span style={{fontSize:13,fontWeight:800,color:oc.text}}>{name}</span>
                <span style={{fontSize:11,color:oc.text,opacity:0.6,marginLeft:"auto"}}>
                  {evs.length}件
                </span>
              </div>

              {/* 予定リスト */}
              <div style={{padding:"10px 10px 12px"}}>
                {evs.length===0 && (
                  <div style={{textAlign:"center",padding:"20px 0",
                    fontSize:12,color:"#d1d5db"}}>予定なし</div>
                )}
                {timed.map(ev=>(
                  <DayEventCard key={ev.id} ev={ev} compact onClick={()=>onEventClick(ev)}/>
                ))}
                {untimed.length>0 && timed.length>0 && (
                  <div style={{fontSize:10,color:"#94a3b8",fontWeight:600,
                    letterSpacing:"0.06em",margin:"10px 0 6px"}}>時刻未定</div>
                )}
                {untimed.map(ev=>(
                  <DayEventCard key={ev.id} ev={ev} compact onClick={()=>onEventClick(ev)}/>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── メインコンポーネント ─────────────────────────────────────
function CalendarPage({
  user,
  customers    = [],
  recontacts   = [],
  lostApproved = [],
  isAdmin      = false,
  onOpenCustomer  = null,
  onOpenRecontact = null,
}) {
  const today = new Date();

  // ビュー: "month" | "week" | "day"
  const [viewMode, setViewMode] = useState("month");

  // 月ビュー用
  const [year,  setYear]  = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());

  // 週ビュー用：その週の月曜日
  const [weekBase, setWeekBase] = useState(()=>weekStart(today));

  // 日ビュー用
  const [dayDate, setDayDate] = useState(()=>new Date(today));

  // フィルター
  const [selectedOwner, setSelectedOwner] = useState(
    isAdmin ? "" : (user?.name ?? "")
  );
  const [selectedTypes, setSelectedTypes] = useState(new Set(Object.keys(EVENT_TYPES)));
  const [popover, setPopover] = useState(null);

  // 担当者一覧
  const allOwners = useMemo(()=>{
    const s=new Set();
    [...customers,...recontacts,...lostApproved].forEach(x=>x.owner&&s.add(x.owner));
    return Array.from(s).sort();
  },[customers,recontacts,lostApproved]);

  // イベント生成 + フィルター
  const allEvents = useMemo(
    ()=>buildEvents(customers,recontacts,lostApproved),
    [customers,recontacts,lostApproved]
  );
  const filteredEvents = useMemo(()=>allEvents.filter(ev=>
    (!selectedOwner || ev.owner===selectedOwner) && selectedTypes.has(ev.type)
  ),[allEvents,selectedOwner,selectedTypes]);

  const eventsByDate = useMemo(()=>{
    const map={};
    filteredEvents.forEach(ev=>{(map[ev.date]??=[]).push(ev);});
    return map;
  },[filteredEvents]);

  // ── ナビゲーション ──────────────────────────────────────────
  function goPrev() {
    if (viewMode==="month") {
      if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);
    } else if (viewMode==="week") {
      setWeekBase(d=>addDays(d,-7));
    } else {
      setDayDate(d=>addDays(d,-1));
    }
  }
  function goNext() {
    if (viewMode==="month") {
      if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);
    } else if (viewMode==="week") {
      setWeekBase(d=>addDays(d,7));
    } else {
      setDayDate(d=>addDays(d,1));
    }
  }
  function goToday() {
    const t = new Date(today);
    setYear(t.getFullYear());
    setMonth(t.getMonth());
    setWeekBase(weekStart(t));
    setDayDate(t);
  }

  // 日付クリック：月→週→日 ドリルダウン
  function handleDayClick(date) {
    if (viewMode==="month") {
      setWeekBase(weekStart(date));
      setViewMode("week");
    } else if (viewMode==="week") {
      setDayDate(date);
      setViewMode("day");
    }
  }

  // ビュー切替時に日付を同期
  function switchView(v) {
    if (v==="week") setWeekBase(weekStart(dayDate));
    if (v==="day")  { /* dayDate はそのまま */ }
    if (v==="month"){ setYear(dayDate.getFullYear()); setMonth(dayDate.getMonth()); }
    setViewMode(v);
  }

  // ── ヘッダーラベル ──────────────────────────────────────────
  function periodLabel() {
    if (viewMode==="month") return `${year}年${month+1}月`;
    if (viewMode==="week") {
      const end = addDays(weekBase,6);
      if (weekBase.getMonth()===end.getMonth())
        return `${weekBase.getFullYear()}年${weekBase.getMonth()+1}月 ${weekBase.getDate()}日〜${end.getDate()}日`;
      return `${weekBase.getMonth()+1}/${weekBase.getDate()} 〜 ${end.getMonth()+1}/${end.getDate()}`;
    }
    return `${dayDate.getFullYear()}年${dayDate.getMonth()+1}月${dayDate.getDate()}日（${JP_DOW[dowMon(dayDate)]}）`;
  }

  // 今期の件数バッジ（月ビューのみ表示）
  const monthCounts = useMemo(()=>{
    const c={};
    filteredEvents.forEach(ev=>{
      const d=new Date(ev.date);
      if(d.getFullYear()===year&&d.getMonth()===month)
        c[ev.type]=(c[ev.type]??0)+1;
    });
    return c;
  },[filteredEvents,year,month]);

  function toggleType(type) {
    const next=new Set(selectedTypes);
    next.has(type)?next.delete(type):next.add(type);
    setSelectedTypes(next);
  }

  const todayStr = fmt(today);

  // ── ビュー切替ボタンスタイル
  const viewBtn = (active) => ({
    padding:"5px 14px",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer",
    border:"none",
    background:active?"#6c5ce7":"transparent",
    color:active?"#fff":"#64748b",
    transition:"all 0.12s",
    fontFamily:"'Noto Sans JP',sans-serif",
  });

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",
      background:"#f8faff",fontFamily:"'Noto Sans JP',sans-serif"}}
      onClick={()=>setPopover(null)}>

      {/* ── ヘッダー ─────────────────────────────────────── */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 20px",
        background:"#fff",borderBottom:"1px solid #e8edf5",
        flexShrink:0,flexWrap:"wrap",rowGap:8}}>

        {/* ビュー切替 */}
        <div style={{display:"flex",background:"#f1f5f9",borderRadius:9,padding:3,gap:2}}>
          {[["month","月"],["week","週"],["day","日"]].map(([v,label])=>(
            <button key={v} style={viewBtn(viewMode===v)} onClick={()=>switchView(v)}>
              {label}
            </button>
          ))}
        </div>

        <div style={{width:1,height:18,background:"#e8edf5",flexShrink:0}}/>

        {/* ナビゲーション */}
        <button onClick={goPrev} style={{width:30,height:30,display:"flex",
          alignItems:"center",justifyContent:"center",
          borderRadius:7,border:"1px solid #e8edf5",background:"#fff",cursor:"pointer"}}>
          <_CalIcChevL size={15} color="#475569"/>
        </button>
        <span style={{fontSize:15,fontWeight:800,color:"#0f172a",
          letterSpacing:"-0.02em",minWidth:160,textAlign:"center"}}>
          {periodLabel()}
        </span>
        <button onClick={goNext} style={{width:30,height:30,display:"flex",
          alignItems:"center",justifyContent:"center",
          borderRadius:7,border:"1px solid #e8edf5",background:"#fff",cursor:"pointer"}}>
          <_CalIcChevR size={15} color="#475569"/>
        </button>
        <button onClick={goToday} style={{padding:"5px 12px",borderRadius:7,
          border:"1px solid #e8edf5",background:"#fff",fontSize:11,fontWeight:600,
          color:"#475569",cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif"}}>
          今日
        </button>

        {/* 月ビュー：件数バッジ */}
        {viewMode==="month" && (
          <div style={{display:"flex",gap:5,marginLeft:"auto",flexWrap:"wrap"}}>
            {Object.entries(EVENT_TYPES).map(([key,def])=>{
              const cnt=monthCounts[key]??0; if(!cnt)return null;
              const Icon=def.Icon;
              return (
                <span key={key} style={{display:"inline-flex",alignItems:"center",gap:4,
                  padding:"3px 9px",borderRadius:20,background:def.bg,
                  color:def.color,fontSize:11,fontWeight:700}}>
                  <Icon size={11} color={def.color}/>{cnt}件
                </span>
              );
            })}
          </div>
        )}
      </div>

      {/* ── フィルターバー ─────────────────────────────────── */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 20px",
        background:"#fff",borderBottom:"1px solid #e8edf5",
        flexShrink:0,overflowX:"auto",flexWrap:"wrap",rowGap:6}}>

        {/* 担当者プルダウン */}
        <span style={{fontSize:11,color:"#94a3b8",fontWeight:600,whiteSpace:"nowrap"}}>担当者</span>
        <div style={{position:"relative"}}>
          {selectedOwner && (
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",
              width:7,height:7,borderRadius:"50%",
              background:ownerColor(selectedOwner).dot,pointerEvents:"none",zIndex:1}}/>
          )}
          <select value={selectedOwner} onChange={e=>setSelectedOwner(e.target.value)}
            style={{appearance:"none",WebkitAppearance:"none",
              paddingLeft:selectedOwner?24:10,paddingRight:26,paddingTop:5,paddingBottom:5,
              borderRadius:8,border:"1px solid #e8edf5",background:"#fff",
              fontSize:12,fontWeight:600,
              color:selectedOwner?ownerColor(selectedOwner).text:"#475569",
              cursor:"pointer",fontFamily:"'Noto Sans JP',sans-serif",
              outline:"none",minWidth:106}}>
            <option value="">全担当者</option>
            {allOwners.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <span style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",
            pointerEvents:"none",color:"#94a3b8",fontSize:10}}>▾</span>
        </div>

        <div style={{width:1,height:16,background:"#e8edf5",flexShrink:0}}/>

        {/* 種別チップ */}
        <span style={{fontSize:11,color:"#94a3b8",fontWeight:600,whiteSpace:"nowrap"}}>種別</span>
        {Object.entries(EVENT_TYPES).map(([key,def])=>{
          const Icon=def.Icon, active=selectedTypes.has(key);
          return (
            <button key={key} onClick={()=>toggleType(key)}
              style={{display:"inline-flex",alignItems:"center",gap:5,
                padding:"4px 11px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
                border:`1.5px solid ${active?def.color:"#e8edf5"}`,
                background:active?def.bg:"#fff",color:active?def.color:"#94a3b8",
                transition:"all 0.12s",whiteSpace:"nowrap",
                fontFamily:"'Noto Sans JP',sans-serif"}}>
              <Icon size={11} color={active?def.color:"#94a3b8"}/>{def.label}
            </button>
          );
        })}
      </div>

      {/* ── ビュー本体 ─────────────────────────────────────── */}
      {viewMode==="month" && (
        <MonthView
          year={year} month={month}
          eventsByDate={eventsByDate} todayStr={todayStr}
          onEventClick={ev=>setPopover({event:ev})}
          onDayClick={handleDayClick}/>
      )}
      {viewMode==="week" && (
        <WeekView
          weekBase={weekBase}
          allEvents={allEvents}
          selectedTypes={selectedTypes}
          selectedOwner={selectedOwner}
          visibleOwners={allOwners}
          todayStr={todayStr}
          onEventClick={ev=>setPopover({event:ev})}
          onDayClick={handleDayClick}/>
      )}
      {viewMode==="day" && (
        <DayView
          date={dayDate}
          allEvents={allEvents}
          selectedTypes={selectedTypes}
          selectedOwner={selectedOwner}
          visibleOwners={allOwners}
          onEventClick={ev=>setPopover({event:ev})}/>
      )}

      {/* ポップオーバー */}
      {popover && (
        <EventPopover
          event={popover.event}
          onClose={()=>setPopover(null)}
          onOpenCustomer={onOpenCustomer}
          onOpenRecontact={onOpenRecontact}/>
      )}
    </div>
  );
}


// ── DASHBOARD (SHELL) ─────────────────────────────────────
// アプリ全体のレイアウトシェル。サイドバー + ヘッダー + ページコンテンツを統合。

// ■ 事務TODO連携:
//   - createClerkTodo(): ステージ変更/手動依頼で事務TODOを生成するハンドラー
//   - 各ページに onCreateTodo として props 経由で注入
function Dashboard({ user, onLogout }) {

  const [activeNav, setActiveNav] = useState(user.role === "clerk" ? 10 : 0);
  const isAdmin = user.role==="admin";

  // v13: DB永続化（useLostRecords / useRecontacts Hooks）

  const lostRequests = allLostRecords.filter(r => r.status === "pending");
  const lostApproved = allLostRecords.filter(r => r.status === "approved");
  const [recontacts, setRecontacts] = useRecontacts([]);
  // v12: DB永続化（useTeleapoListsフック）
  const [teleapoLists, setTeleapoLists] = useTeleapoLists([]);

  // ── お知らせ（管理者が設定・取り下げ）──
  const [notice, setNotice] = useState({
    active: true,
    title: "本日のお知らせ",
    body: "今週の目標架電数は1人あたり40件です。\nアポ取得後は必ず当日中にCRMへ入力をお願いします。\n不明点は管理者まで連絡してください。",
    author: "管理者",
    date: new Date().toISOString().slice(0,10),
  });
  const [noticeOpen, setNoticeOpen]   = useState(true);
  const [openNewCustomer, setOpenNewCustomer] = useState(false);
  const [customerGroupOpen, setCustomerGroupOpen] = useState(true);
  const [noticeEditing, setNoticeEditing] = useState(false);
  const [noticeDraft, setNoticeDraft] = useState(null);
  // 媒体マスター（管理者が色・ラベルを編集可能）
  const [sourceList, setSourceList] = useState([...SOURCE_LIST]);

  // ── 事務TODO ──────────────────────────────────────────
  // ステージ変更時の自動生成 + 営業マンからの手動依頼で追加される
  const [clerkTodos, setClerkTodos] = useState([]);

  // TODO自動/手動生成ハンドラー
  function createClerkTodo({ customerId, company, contact, email, owner, type, triggerStage, memo }) {
    const todo = {
      id: `ct-${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      customerId, company, contact: contact || "", email: email || "",
      owner: owner || "", type, triggerStage: triggerStage || null,
      status: "pending", memo: memo || "",
      createdAt: new Date().toISOString().slice(0,16),
      completedAt: null,
    };
    setClerkTodos(ts => [todo, ...ts]);
  }

  const pendingCount   = lostRequests.filter(r=>r.status==="pending").length;
  const recontactCount = recontacts.filter(r=>r.status==="active").length;
  const clerkPendingCount = clerkTodos.filter(t=>t.status==="pending").length;

  function handleLostRequest({ customer, catKey, reason, detail, recontact, lastStageDate }) {
    const newReq = {
      customerId: customer.id,
      _dealId: customer.id,
      _companyId: customer._companyId || null,
      company: customer.company, contact: customer.contact, title: customer.title,
      owner: customer.owner, lastStage: customer.stage,
      lostDate: new Date().toISOString().slice(0,10),
      lastStageDate: lastStageDate || new Date().toISOString().slice(0,10),
      category: catKey, reason, detail,
      recontactDate: recontact || null,
      status: "pending",
      requestedBy: user.name, requestedAt: new Date().toISOString().slice(0,10),
      approvedBy: null, approvedAt: null, rejectNote: null, adminNotes: [],
    };
    // 楽観更新（tempId）
    const tempId = `temp-${Date.now()}`;
    setAllLostRecords(rs => [{ ...newReq, id: tempId }, ...rs]);
    // DB書き込み
    (async () => {
      const sb = await getSupabase();
      if (!sb) return;
      const row = lostRecordToRow(newReq);
      const { data, error } = await sb.from("lost_records").insert(row).select("*").single();
      if (error) { console.error("lost_records insert error:", error); return; }
      if (data) {
        setAllLostRecords(rs => rs.map(r => r.id === tempId ? rowToLostRecord(data) : r));
      }
    })();
  }

  function handleApprove(reqId) {
    const req = allLostRecords.find(r => r.id === reqId);
    if (!req) return;
    // 楽観更新
    setAllLostRecords(rs => rs.map(r => r.id === reqId
      ? { ...r, status: "approved", approvedBy: user.name, approvedAt: new Date().toISOString().slice(0,10) }
      : r));
    // パイプラインから除外
    if (req.customerId) setCustomers(cs => cs.filter(c => c.id !== req.customerId));
    // DB書き込み
    (async () => {
      const sb = await getSupabase();
      if (!sb) return;
      await sb.from("lost_records").update({
        status: "approved",
        approved_by: user.name,
        approved_at: new Date().toISOString(),
        updated_at: new Date().toISOString(),
      }).eq("id", reqId);
      // deal削除はsetCustomersのsaveQueueで処理される
    })();
  }

  function handleReject(reqId, note) {
    const req = allLostRecords.find(r => r.id === reqId);
    // 楽観更新: statusをrejectedに変更（filterではなくmapで更新→Realtimeバウンス防止）
    // lostRequests/lostApprovedはstatus派生なので、rejected→どちらにも表示されない
    setAllLostRecords(rs => rs.map(r => r.id === reqId ? { ...r, status: "rejected", rejectNote: note || "" } : r));
    // pendingLost フラグを解除
    if (req?.customerId) setCustomers(cs => cs.map(c => c.id === req.customerId ? { ...c, pendingLost: false } : c));
    // DB書き込み: statusをrejectedに更新（削除ではなく記録として残す）
    (async () => {
      const sb = await getSupabase();
      if (!sb) return;
      await sb.from("lost_records").update({
        status: "rejected",
        reject_note: note || "",
        updated_at: new Date().toISOString(),
      }).eq("id", reqId);
    })();
  }

  function handleLostUpdate({ id, _addNote, ...fields }) {
    // 楽観更新
    setAllLostRecords(ls => ls.map(l => {
      if (l.id !== id) return l;
      if (_addNote) return { ...l, adminNotes: [...(l.adminNotes || []), _addNote] };
      return { ...l, ...fields };
    }));
    // DB書き込み
    (async () => {
      const sb = await getSupabase();
      if (!sb) return;
      const current = allLostRecords.find(l => l.id === id);
      if (!current) return;
      const updateRow = {};
      if (_addNote) {
        updateRow.admin_notes = [...(current.adminNotes || []), _addNote];
      } else {
        if ("recontactDate" in fields) updateRow.recontact_date = fields.recontactDate || null;
        if ("detail" in fields) updateRow.detail = fields.detail ?? "";
        if ("reason" in fields) updateRow.reason = fields.reason ?? "";
      }
      updateRow.updated_at = new Date().toISOString();
      await sb.from("lost_records").update(updateRow).eq("id", id);
    })();
  }

  function handleSendToRecontact(lostItem) {
    // 楽観更新: 失注BOXにrecontactSentフラグ
    setAllLostRecords(ls => ls.map(l => l.id === lostItem.id ? { ...l, recontactSent: true } : l));
    const today = new Date().toISOString().slice(0,10);
    const entry = {
      lostId: lostItem.id,
      _companyId: lostItem._companyId || null,
      company: lostItem.company, contact: lostItem.contact, title: lostItem.title || "",
      email: "", phone: "", owner: lostItem.owner,
      stage: "①",
      prevLostCategory: lostItem.category,
      prevLostReason: lostItem.reason,
      prevLostDate: lostItem.lostDate,
      recontactStartDate: today,
      recontactNote: lostItem.detail,
      nextAction: lostItem.recontactDate
        ? { date: lostItem.recontactDate, time: "10:00", content: "追客アプローチ開始", reminder: true }
        : { date: "", time: "", content: "", reminder: false },
      stageHistory: [{ stage: "①", date: today, note: "失注BOXより追客リストに昇格", by: user.name }],
      notes: [], raScore: { teleapo: 0, oi: 0, ff: 0, pc: 0, closing: 0, follow: 0, attitude: 0, process: 0 },
      relostHistory: [],
      status: "active",
    };
    // 楽観更新（tempId）
    const tempId = `temp-${Date.now()}`;
    setRecontacts(rs => [{ ...entry, id: tempId }, ...rs]);
    setActiveNav(4); // 追客リストページへ遷移
    // DB書き込み
    (async () => {
      const sb = await getSupabase();
      if (!sb) return;
      const row = recontactToRow(entry);
      const { data, error } = await sb.from("recontacts").insert(row).select("*").single();
      if (error) { console.error("recontacts insert error:", error); return; }
      if (data) {
        setRecontacts(rs => rs.map(r => r.id === tempId ? rowToRecontact(data) : r));
      }
    })();
  }

  function handleRelost(updatedRecontact) {
    // v13: 再失注→DB書き込み（statusをrelostに更新）
    setRecontacts(rs => rs.map(r => r.id === updatedRecontact.id ? { ...r, ...updatedRecontact } : r));
    (async () => {
      const sb = await getSupabase();
      if (!sb) return;
      const row = recontactToRow(updatedRecontact);
      row.updated_at = new Date().toISOString();
      await sb.from("recontacts").update(row).eq("id", updatedRecontact.id);
    })();
  }

  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  const isClerk = user.role === "clerk";

        // メンバーには事務TODOは非表示（依頼ボタンは顧客カードから使う）
        if (n.clerkVisible && !isAdmin) return false;
        return true;
      });

          borderRight: groupActive ? "2px solid #6c5ce740" : "2px solid transparent",

          position:"relative",
        }}
      >
        <Users size={14} color={groupActive?"#a78bfa":"#334155"} strokeWidth={groupActive?2.5:1.8}/>
        {(!isTablet || mobileMenuOpen) && (
          <>
            <span style={{ flex:1, textAlign:"left" }}>顧客管理</span>
            <span style={{ fontSize:10, color:"#475569", marginRight:4 }}>
              {customerGroupOpen ? "▾" : "▸"}
            </span>
          </>

  };

  return (
    <div style={{ display:"flex", height:"100vh", background:"#f0f4ff", fontFamily:"'Noto Sans JP','DM Mono',sans-serif", color:"#0f172a", overflow:"hidden" }}>

      {/* ── モバイルメニューオーバーレイ（iPhone） ─────────── */}

        <div
          onClick={()=>setMobileMenuOpen(false)}
          style={{ position:"fixed", inset:0, background:"#00000055", zIndex:40, backdropFilter:"blur(2px)" }}
        />

      {/* ── SIDEBAR ──────────────────────────────────────────
          Desktop: 220px 通常サイドバー

          iPhone:  非表示（スライドドロワーで代替）          */}
      {!isMobile && (
        <div style={{ width:sidebarWidth, background:"#0e1525", display:"flex", flexDirection:"column", flexShrink:0, transition:"width 0.2s", boxShadow:"4px 0 16px #00000018", position:"relative", zIndex:10 }}>

          {/* Logo */}
          <div style={{ padding: isTablet?"14px 0":"18px 20px 16px", borderBottom:"1px solid #e2e8f0", display:"flex", justifyContent:"center", alignItems:"center", background:"#fff" }}>
            {isTablet ? (
              <GakusapoLogo size={36}/>
            ) : (
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <GakusapoLogo size={38}/>
                <div>
                  <div style={{ fontSize:13, fontWeight:800, color:"#002e3b", letterSpacing:"0.02em" }}>Gakusapo</div>
                  <div style={{ fontSize:9, color:"#94a3b8", letterSpacing:"0.12em", fontWeight:600 }}>CRM SYSTEM</div>
                </div>
              </div>
            )}
          </div>

          {/* Nav */}
          <nav style={{ flex:1, padding: isTablet ? "16px 4px" : "16px 0", overflowY:"auto" }}>
            {isClerk ? (
              /* clerk: 事務TODOのみ */
              visibleNavItems.map(item => <NavButton key={item.id} item={item}/>)
            ) : (
              <>
                {/* ダッシュボード */}
                {[visibleNavItems.find(n=>n.id===0)].filter(Boolean).map(item=>(
                  <NavButton key={item.id} item={item}/>
                ))}
                {/* 顧客管理グループ */}
                <CustomerGroupHeader/>
                {customerGroupOpen && groupItems.map(item=>(
                  <NavButton key={item.id} item={item} sub={true}/>
                ))}
                {/* カレンダー〜設定 */}

                  <NavButton key={item.id} item={item}/>
                ))}
              </>
            )}
          </nav>

          {/* User */}
          {!isTablet && (
            <div style={{ padding:"14px 12px", borderTop:"1px solid #1a2540" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 12px", marginBottom:8 }}>
                {user.picture
                  ? <img src={user.picture} style={{ width:32, height:32, borderRadius:"50%", objectFit:"cover", border:"2px solid #6c5ce744" }} alt=""/>
                  : <div style={{ width:32, height:32, borderRadius:"50%", background:isAdmin?"linear-gradient(135deg,#6c5ce7,#a78bfa)":"#1a2540", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"#fff", border:"2px solid #6c5ce744" }}>{user.name.slice(0,2)}</div>
                }
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, color:"#94a3b8", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{user.name}</div>
                  <div style={{ display:"flex", alignItems:"center", gap:4, marginTop:1 }}>
                    {isAdmin?<Shield size={10} color="#a78bfa"/>:<User size={10} color="#6c5ce7"/>}
                    <span style={{ fontSize:10, color:isAdmin?"#a78bfa":"#6c5ce7" }}>{user.label}</span>

                </div>
              </div>
              <button onClick={onLogout} style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"8px", background:"none", border:"1px solid #1a2540", borderRadius:9, color:"#4a5568", fontSize:12, cursor:"pointer", fontFamily:"'Noto Sans JP',sans-serif", transition:"border-color 0.15s" }}>
                <LogOut size={13}/>ログアウト
              </button>
            </div>
          )}
          {isTablet && (
            <div style={{ padding:"12px 0", borderTop:"1px solid #1a2540", display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
              <div style={{ width:28, height:28, borderRadius:"50%", background:isAdmin?"linear-gradient(135deg,#6c5ce7,#a78bfa)":"#1a2540", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, color:"#fff" }}>{user.name.slice(0,2)}</div>

              <div>
                <div style={{ fontSize:13, fontWeight:800, color:"#002e3b" }}>Gakusapo</div>
                <div style={{ fontSize:9, color:"#94a3b8", letterSpacing:"0.12em", fontWeight:600 }}>CRM SYSTEM</div>

            </div>
            <button onClick={()=>setMobileMenuOpen(false)} style={{ background:"none", border:"none", cursor:"pointer", color:"#4a5568", padding:4 }}>
              <X size={18} color="#4a5568"/>

          <nav style={{ flex:1, padding:"12px 12px", overflowY:"auto" }}>
